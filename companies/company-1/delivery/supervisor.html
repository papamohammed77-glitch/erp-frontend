<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مشرف التوصيل | الروائع ERP</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0d9488">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Tahoma,sans-serif;background:#f1f5f9}
        .auth-container{background:linear-gradient(135deg,#134e4a 0%,#0f766e 40%,#0d9488 100%)}
        .input-field:focus{border-color:#0d9488;box-shadow:0 0 0 3px rgba(13,148,136,0.1)}
        .card{background:#fff;border-radius:20px;padding:1.25rem;box-shadow:0 4px 15px rgba(0,0,0,0.05)}
        .stat-card{background:#fff;border-radius:16px;padding:1rem;box-shadow:0 4px 6px rgba(0,0,0,0.02);transition:transform 0.2s;cursor:pointer}
        .stat-card:active{transform:scale(0.98)}
        .pulse{animation:pulse 2s infinite}
        @keyframes pulse{0%{opacity:1}50%{opacity:0.6}100%{opacity:1}}
        .kpi-up{color:#10b981}.kpi-down{color:#ef4444}
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<div id="loginScreen" class="fixed inset-0 z-[100] flex items-center justify-center auth-container p-4">
    <div class="bg-white rounded-[32px] shadow-2xl p-6 w-[92%] max-w-md">
        <div class="text-center mb-6"><div class="w-20 h-20 bg-gradient-to-br from-teal-600 to-teal-800 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4"><i class="fa-solid fa-truck-fast text-white text-3xl"></i></div><h1 class="font-black text-2xl text-gray-800">الروائع</h1><p class="text-xs text-gray-400">مشرف التوصيل</p></div>
        <h2 class="text-lg font-bold text-gray-700 text-center mb-4">تسجيل الدخول</h2>
        <div class="space-y-3"><div><input id="loginEmail" type="email" placeholder="البريد الإلكتروني" class="input-field w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-200 focus:border-teal-600 outline-none font-bold text-sm"></div><div class="relative"><input id="loginPass" type="password" placeholder="كلمة السر" class="input-field w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-200 focus:border-teal-600 outline-none font-bold text-sm pr-12"><button type="button" onclick="App.togglePass()" class="absolute left-2 top-1/2 -translate-y-1/2 p-2 text-gray-400"><i id="passIcon" class="fa-solid fa-eye"></i></button></div></div>
        <button onclick="App.doLogin()" class="w-full bg-gradient-to-r from-teal-600 to-teal-700 text-white py-3.5 rounded-xl font-black text-sm shadow-lg mt-4">تسجيل الدخول</button>
        <p id="loginMsg" class="text-center text-xs text-red-500 font-bold mt-3 hidden"></p>
    </div>
</div>

<div id="mainApp" class="hidden flex flex-col h-full">
    <header class="bg-teal-700 text-white p-4 flex items-center justify-between sticky top-0 z-30 shadow-md flex-shrink-0">
        <span class="font-black text-sm">مشرف التوصيل</span>
        <div class="flex items-center gap-2"><span class="text-xs font-bold" id="headerUserName"></span><button onclick="App.doLogout()" class="bg-white/10 w-8 h-8 rounded-full"><i class="fa-solid fa-arrow-right-from-bracket text-xs"></i></button></div>
    </header>
    <div class="flex gap-1 p-2 bg-white border-b overflow-x-auto flex-shrink-0">
        <button onclick="App.switchTab('dashboard')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm bg-teal-600 text-white" id="tab-dashboard">📊 KPI</button>
        <button onclick="App.switchTab('team')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm text-gray-500" id="tab-team">👥 السائقين</button>
        <button onclick="App.switchTab('live')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm text-gray-500" id="tab-live">🔴 الحي</button>
    </div>
    <main id="mainContent" class="flex-1 overflow-y-auto p-4"></main>
</div>

<script>
var SUPABASE_URL = 'https://fiilmooggumokxanwiyx.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpaWxtb29nZ3Vtb2t4YW53aXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDkwOTIsImV4cCI6MjA5NDI4NTA5Mn0.LZScCxnCiRrTSCCBmTryszQpY1AwBgR2dkTBbC5kOc4';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var db = new Dexie('RW_DelSupervisor'); db.version(1).stores({ meta: 'key' });
function byId(id) { return document.getElementById(id); }
function safeText(el, text) { if (el) el.textContent = text; }
function safeHTML(el, html) { if (el) el.innerHTML = html; }
function fmtNum(n) { return Number(n || 0).toLocaleString('ar-EG', {minimumFractionDigits: 2}); }
function toast(m, t) { Swal.fire({ toast: true, position: 'top', icon: t || 'info', title: m, showConfirmButton: false, timer: 2000 }); }

var App = {
    currentUser: null, charts: {},
    togglePass: function(){var p=byId('loginPass'),i=byId('passIcon');if(p.type==='password'){p.type='text';i.className='fa-solid fa-eye-slash';}else{p.type='password';i.className='fa-solid fa-eye';}},
    doLogin: function(){var e=byId('loginEmail').value.trim(),p=byId('loginPass').value.trim();if(!e||!p){byId('loginMsg').innerText='أدخل البيانات';byId('loginMsg').classList.remove('hidden');return;}byId('loginMsg').classList.add('hidden');var s=this;Swal.showLoading();supabase.auth.signInWithPassword({email:e,password:p}).then(function(r){Swal.close();if(r.error){byId('loginMsg').innerText=r.error.message;byId('loginMsg').classList.remove('hidden');}else{s.init();}}).catch(function(){Swal.close();});},
    init: function(){var s=this;supabase.auth.getSession().then(function(r){if(r.data&&r.data.session){s.currentUser=r.data.session.user;var m=s.currentUser.user_metadata||{},isO=(m.isOwner===true||m.isOwner==='true'),perms=m.permissions||[],has=isO||(Array.isArray(perms)&&perms.indexOf('delivery_supervisor')!==-1);if(!has){Swal.fire({title:'غير مصرح',icon:'error'});supabase.auth.signOut();return;}safeText(byId('headerUserName'),m.name||s.currentUser.email);s.enterApp();}});},
    enterApp: function(){byId('loginScreen').classList.add('hidden');byId('mainApp').classList.remove('hidden');this.switchTab('dashboard');},
    doLogout: function(){supabase.auth.signOut().then(function(){byId('mainApp').classList.add('hidden');byId('loginScreen').classList.remove('hidden');});},
    switchTab: function(t){['dashboard','team','live'].forEach(function(x){var b=byId('tab-'+x);if(b){b.classList.remove('bg-teal-600','text-white');b.classList.add('text-gray-500');}});var a=byId('tab-'+t);if(a){a.classList.add('bg-teal-600','text-white');a.classList.remove('text-gray-500');}if(t==='dashboard')this.renderDashboard();else if(t==='team')this.renderTeam();else if(t==='live')this.renderLive();},
    destroyCharts: function(){for(var k in this.charts){if(this.charts.hasOwnProperty(k)&&this.charts[k]){this.charts[k].destroy();this.charts[k]=null;}}},

    renderDashboard: function(){
        var s=this; safeHTML(byId('mainContent'),'<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin"></i></div>');
        var today=new Date().toISOString().split('T')[0],firstDay=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().split('T')[0];
        Promise.all([supabase.from('runsheets').select('status,total_amount').gte('run_date',firstDay).lte('run_date',today),supabase.from('users').select('email').in('role',['سائق','مندوب'])]).then(function(r){
            var rs=r[0].data||[],users=r[1].data||[];var total=0,delivered=0,returning=0,loaded=0;
            for(var i=0;i<rs.length;i++){total+=Number(rs[i].total_amount)||0;if(rs[i].status==='Delivered')delivered++;else if(rs[i].status==='Returning')returning++;else if(rs[i].status==='Loaded'||rs[i].status==='Delivering')loaded++;}
            s.destroyCharts();
            var html='<h2 class="text-lg font-black mb-4">📊 مؤشرات التوصيل – الشهر</h2>';
            html+='<div class="grid grid-cols-2 gap-3 mb-4">';
            html+='<div class="stat-card"><p class="text-xs text-gray-400">إجمالي الرحلات</p><p class="text-2xl font-black text-teal-600">'+rs.length+'</p></div>';
            html+='<div class="stat-card"><p class="text-xs text-gray-400">القيمة الإجمالية</p><p class="text-2xl font-black text-teal-600">'+fmtNum(total)+' ج.م</p></div>';
            html+='<div class="stat-card"><p class="text-xs text-gray-400">✅ تم التوصيل</p><p class="text-2xl font-black text-green-600">'+delivered+'</p></div>';
            html+='<div class="stat-card"><p class="text-xs text-gray-400">⏳ جارية</p><p class="text-2xl font-black text-amber-600">'+loaded+'</p></div>';
            html+='</div><div class="grid grid-cols-2 gap-3 mb-4">';
            html+='<div class="stat-card"><p class="text-xs text-gray-400">↩️ مرتجعات</p><p class="text-2xl font-black text-red-600">'+returning+'</p></div>';
            html+='<div class="stat-card"><p class="text-xs text-gray-400">👥 السائقين</p><p class="text-2xl font-black text-indigo-600">'+users.length+'</p></div>';
            html+='</div><button onclick="App.switchTab(\'team\')" class="w-full bg-teal-600 text-white py-4 rounded-xl font-black text-lg"><i class="fa-solid fa-users ml-2"></i> أداء السائقين</button>';
            safeHTML(byId('mainContent'),html);
        });
    },

    renderTeam: function(){
        var s=this; safeHTML(byId('mainContent'),'<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin"></i></div>');
        var today=new Date().toISOString().split('T')[0],firstDay=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().split('T')[0];
        supabase.from('users').select('email,name').in('role',['سائق','مندوب']).then(function(uR){var users=uR.data||[];
        supabase.from('runsheets').select('driver_id,status,total_amount').gte('run_date',firstDay).lte('run_date',today).then(function(rR){var rs=rR.data||[],stats={};
        for(var i=0;i<rs.length;i++){var d=rs[i].driver_id||'';if(!stats[d])stats[d]={count:0,total:0,delivered:0};stats[d].count++;stats[d].total+=Number(rs[i].total_amount)||0;if(rs[i].status==='Delivered')stats[d].delivered++;}
        var html='<h2 class="text-lg font-black mb-4">👥 أداء السائقين</h2>';
        for(var j=0;j<users.length;j++){var u=users[j],st=stats[u.email]||{count:0,total:0,delivered:0},rate=st.count>0?Math.round((st.delivered/st.count)*100):0,has=st.count>0;
        html+='<div class="card mb-3 '+(has?'border-teal-200':'border-gray-100 bg-gray-50')+'"><div class="flex justify-between mb-2"><span class="font-bold">'+(u.name||u.email)+'</span>'+(has?'<span class="px-2 py-0.5 bg-teal-100 text-teal-700 rounded-full text-xs font-bold pulse">🟢 نشط</span>':'<span class="px-2 py-0.5 bg-gray-100 text-gray-400 rounded-full text-xs">⚪ غير نشط</span>')+'</div><div class="grid grid-cols-3 gap-2 text-center"><div><p class="text-xs text-gray-400">رحلات</p><p class="font-black">'+st.count+'</p></div><div><p class="text-xs text-gray-400">القيمة</p><p class="font-black text-teal-600">'+fmtNum(st.total)+'</p></div><div><p class="text-xs text-gray-400">توصيل</p><p class="font-black text-green-600">'+rate+'%</p></div></div></div>';}
        safeHTML(byId('mainContent'),html);});});
    },

    renderLive: function(){
        var s=this; safeHTML(byId('mainContent'),'<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin"></i></div>');
        supabase.from('runsheets').select('runsheet_code,driver_id,status,run_date').in('status',['Delivering','Loaded']).order('run_date',{ascending:false}).limit(20).then(function(r){var rs=r.data||[],html='<h2 class="text-lg font-black mb-4">🔴 الرحلات الجارية</h2>';
        if(!rs.length){html+='<div class="text-center text-gray-400 py-10">لا توجد رحلات جارية</div>';}else{for(var i=0;i<rs.length;i++){html+='<div class="card mb-2"><div class="flex justify-between"><span class="font-bold">'+rs[i].runsheet_code+'</span><span class="px-2 py-0.5 rounded-full text-xs font-bold '+(rs[i].status==='Delivering'?'bg-sky-100 text-sky-700':'bg-amber-100 text-amber-700')+'">'+(rs[i].status==='Delivering'?'جاري التوصيل':'محمّلة')+'</span></div><p class="text-xs text-gray-400">'+rs[i].driver_id+' | '+rs[i].run_date+'</p></div>';}}
        safeHTML(byId('mainContent'),html);});
    }
};
if('serviceWorker' in navigator){navigator.serviceWorker.register('../sw.js').catch(function(){});}
document.addEventListener('DOMContentLoaded',function(){App.init();});
</script>
</body>
</html>
