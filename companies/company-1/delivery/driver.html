<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مندوب التوصيل | الروائع ERP</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0284c7">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Tahoma,sans-serif;background:#f1f5f9}
        .auth-container{background:linear-gradient(135deg,#0c4a6e 0%,#0369a1 40%,#0284c7 100%)}
        .input-field:focus{border-color:#0284c7;box-shadow:0 0 0 3px rgba(2,132,199,0.1)}
        .card{background:#fff;border-radius:20px;padding:1.25rem;box-shadow:0 4px 15px rgba(0,0,0,0.05)}
        .btn-primary{background:#0284c7;color:#fff;padding:0.75rem 1.5rem;border-radius:12px;font-weight:700;border:none;cursor:pointer;width:100%}
        .accordion-content{max-height:0;overflow:hidden;transition:max-height 0.3s ease-out}
        .accordion-content.open{max-height:2000px}
        .map-btn{background:#10b981;color:#fff;padding:0.5rem 1rem;border-radius:10px;font-weight:700;border:none;cursor:pointer;font-size:0.75rem}
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<div id="loginScreen" class="fixed inset-0 z-[100] flex items-center justify-center auth-container p-4">
    <div class="bg-white rounded-[32px] shadow-2xl p-6 w-[92%] max-w-md">
        <div class="text-center mb-6"><div class="w-20 h-20 bg-gradient-to-br from-sky-600 to-sky-800 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4"><i class="fa-solid fa-motorcycle text-white text-3xl"></i></div><h1 class="font-black text-2xl text-gray-800">الروائع</h1><p class="text-xs text-gray-400">مندوب التوصيل</p></div>
        <h2 class="text-lg font-bold text-gray-700 text-center mb-4">تسجيل الدخول</h2>
        <div class="space-y-3"><div><input id="loginEmail" type="email" placeholder="البريد الإلكتروني" class="input-field w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-200 focus:border-sky-600 outline-none font-bold text-sm"></div><div class="relative"><input id="loginPass" type="password" placeholder="كلمة السر" class="input-field w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-200 focus:border-sky-600 outline-none font-bold text-sm pr-12"><button type="button" onclick="App.togglePass()" class="absolute left-2 top-1/2 -translate-y-1/2 p-2 text-gray-400"><i id="passIcon" class="fa-solid fa-eye"></i></button></div></div>
        <button onclick="App.doLogin()" class="w-full bg-gradient-to-r from-sky-600 to-sky-700 text-white py-3.5 rounded-xl font-black text-sm shadow-lg mt-4">تسجيل الدخول</button>
        <p id="loginMsg" class="text-center text-xs text-red-500 font-bold mt-3 hidden"></p>
    </div>
</div>

<div id="mainApp" class="hidden flex flex-col h-full">
    <header class="bg-sky-700 text-white p-4 flex items-center justify-between sticky top-0 z-30 shadow-md flex-shrink-0">
        <span class="font-black text-sm">🛵 مندوب التوصيل</span>
        <div class="flex items-center gap-2"><span class="text-xs font-bold" id="headerUserName"></span><button onclick="App.doLogout()" class="bg-white/10 w-8 h-8 rounded-full"><i class="fa-solid fa-arrow-right-from-bracket text-xs"></i></button></div>
    </header>
    <div class="flex gap-1 p-2 bg-white border-b overflow-x-auto flex-shrink-0">
        <button onclick="App.switchTab('runsheets')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm bg-sky-600 text-white" id="tab-runsheets">📋 رحلاتي</button>
        <button onclick="App.switchTab('map')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm text-gray-500" id="tab-map">🗺️ الخريطة</button>
        <button onclick="App.switchTab('returns')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm text-gray-500" id="tab-returns">↩️ مرتجعات</button>
        <button onclick="App.switchTab('balance')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm text-gray-500" id="tab-balance">⚖️ رصيدي</button>
    </div>
    <main id="mainContent" class="flex-1 overflow-y-auto p-4"></main>
</div>

<script>
var SUPABASE_URL = 'https://fiilmooggumokxanwiyx.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpaWxtb29nZ3Vtb2t4YW53aXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDkwOTIsImV4cCI6MjA5NDI4NTA5Mn0.LZScCxnCiRrTSCCBmTryszQpY1AwBgR2dkTBbC5kOc4';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var db = new Dexie('RW_Driver'); db.version(1).stores({ runsheets: 'runsheet_code', orders: 'order_code', meta: 'key' });
function byId(id) { return document.getElementById(id); }
function safeText(el, text) { if (el) el.textContent = text; }
function safeHTML(el, html) { if (el) el.innerHTML = html; }
function fmtNum(n) { return Number(n || 0).toLocaleString('ar-EG', {minimumFractionDigits: 2}); }
function toast(m, t) { Swal.fire({ toast: true, position: 'top', icon: t || 'info', title: m, showConfirmButton: false, timer: 2000 }); }

var App = {
    currentUser: null, currentTab: 'runsheets', runsheets: [], orders: [],

    togglePass: function(){var p=byId('loginPass'),i=byId('passIcon');if(p.type==='password'){p.type='text';i.className='fa-solid fa-eye-slash';}else{p.type='password';i.className='fa-solid fa-eye';}},
    doLogin: function(){var e=byId('loginEmail').value.trim(),p=byId('loginPass').value.trim();if(!e||!p){byId('loginMsg').innerText='أدخل البيانات';byId('loginMsg').classList.remove('hidden');return;}byId('loginMsg').classList.add('hidden');var s=this;Swal.showLoading();supabase.auth.signInWithPassword({email:e,password:p}).then(function(r){Swal.close();if(r.error){byId('loginMsg').innerText=r.error.message;byId('loginMsg').classList.remove('hidden');}else{s.init();}}).catch(function(){Swal.close();});},
    init: function(){var s=this;supabase.auth.getSession().then(function(r){if(r.data&&r.data.session){s.currentUser=r.data.session.user;var m=s.currentUser.user_metadata||{},isO=(m.isOwner===true||m.isOwner==='true'),perms=m.permissions||[],has=isO||(Array.isArray(perms)&&perms.indexOf('delivery')!==-1);if(!has){Swal.fire({title:'غير مصرح',icon:'error'});supabase.auth.signOut();return;}safeText(byId('headerUserName'),m.name||s.currentUser.email);s.enterApp();}});},
    enterApp: function(){byId('loginScreen').classList.add('hidden');byId('mainApp').classList.remove('hidden');this.switchTab('runsheets');},
    doLogout: function(){supabase.auth.signOut().then(function(){byId('mainApp').classList.add('hidden');byId('loginScreen').classList.remove('hidden');});},
    switchTab: function(t){this.currentTab=t;['runsheets','map','returns','balance'].forEach(function(x){var b=byId('tab-'+x);if(b){b.classList.remove('bg-sky-600','text-white');b.classList.add('text-gray-500');}});var a=byId('tab-'+t);if(a){a.classList.add('bg-sky-600','text-white');a.classList.remove('text-gray-500');}if(t==='runsheets')this.renderRunsheets();else if(t==='map')this.renderMap();else if(t==='returns')this.renderReturns();else if(t==='balance')this.renderBalance();},

    // ==================== رحلاتي ====================
    renderRunsheets: function(){
        var s=this; safeHTML(byId('mainContent'),'<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin"></i></div>');
        supabase.from('runsheets').select('runsheet_code,status,run_date,driver_id,vehicle_id').eq('driver_id',this.currentUser.email).in('status',['Loaded','Delivering','Delivered','Returning']).order('run_date',{ascending:false}).then(function(r){s.runsheets=r.data||[];s.renderRunsheetList();});
    },

    renderRunsheetList: function(){
        if(!this.runsheets.length){safeHTML(byId('mainContent'),'<div class="text-center py-10 text-gray-400"><i class="fa-solid fa-clipboard-list text-4xl mb-3"></i><p>لا توجد رحلات</p></div>');return;}
        var html='<h2 class="text-lg font-black mb-4">📋 رحلاتي</h2>';
        for(var i=0;i<this.runsheets.length;i++){var rs=this.runsheets[i],sc=rs.status==='Delivered'?'bg-green-100 text-green-700':rs.status==='Delivering'?'bg-sky-100 text-sky-700':rs.status==='Returning'?'bg-red-100 text-red-700':'bg-amber-100 text-amber-700',sl=rs.status==='Delivered'?'تم التوصيل':rs.status==='Delivering'?'جاري التوصيل':rs.status==='Returning'?'مرتجعات':'محمّلة';
        html+='<div class="card mb-3" onclick="App.showRunsheetOrders(\''+rs.runsheet_code+'\')"><div class="flex justify-between items-center"><div><span class="font-bold text-lg">'+rs.runsheet_code+'</span><p class="text-xs text-gray-400">'+rs.run_date+' | '+rs.vehicle_id+'</p></div><span class="px-2 py-1 rounded-full text-xs font-bold '+sc+'">'+sl+'</span></div></div>';}
        safeHTML(byId('mainContent'),html);
    },

    showRunsheetOrders: function(rsCode){
        var s=this;Swal.showLoading();
        supabase.from('orders').select('order_code,customer_name,customer_phone,total_amount,area,order_status').eq('runsheet_id',rsCode).neq('order_status','Cancelled').then(function(r){Swal.close();var orders=r.data||[];if(!orders.length){toast('لا توجد أوردرات','info');return;}
        var html='<div class="text-right"><h3 class="font-bold mb-3">'+rsCode+'</h3>';
        for(var i=0;i<orders.length;i++){var o=orders[i];html+='<div class="card mb-2"><div class="flex justify-between"><span class="font-bold">'+o.order_code+'</span><span class="font-black text-sky-600">'+fmtNum(o.total_amount)+' ج.م</span></div><p class="text-sm">'+o.customer_name+' | '+o.area+'</p><div class="flex gap-2 mt-2"><a href="tel:'+(o.customer_phone||'')+'" class="bg-green-500 text-white px-3 py-1 rounded-lg text-xs font-bold"><i class="fa-solid fa-phone ml-1"></i></a><a href="https://wa.me/'+(o.customer_phone||'').replace(/\\D/g,'')+'" target="_blank" class="bg-emerald-500 text-white px-3 py-1 rounded-lg text-xs font-bold"><i class="fa-brands fa-whatsapp ml-1"></i></a><a href="https://www.google.com/maps?q='+encodeURIComponent(o.customer_name||'')+'" target="_blank" class="map-btn"><i class="fa-solid fa-map-location-dot ml-1"></i> خريطة</a></div></div>';}
        html+='</div>';Swal.fire({title:'تفاصيل الرحلة',html:html,width:'600px',showCloseButton:true,showConfirmButton:false});});
    },

    // ==================== الخريطة ====================
    renderMap: function(){
        var s=this; safeHTML(byId('mainContent'),'<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin"></i></div>');
        supabase.from('orders').select('customer_name,area,customer_phone').eq('created_by',this.currentUser.email).neq('order_status','Cancelled').order('order_date',{ascending:false}).then(function(r){var orders=r.data||[];var custMap={};
        for(var i=0;i<orders.length;i++){var nm=orders[i].customer_name||'';if(nm&&!custMap[nm])custMap[nm]=orders[i];}
        var html='<h2 class="text-lg font-black mb-4">🗺️ خريطة العملاء</h2><p class="text-xs text-gray-500 mb-4">اضغط لفتح موقع العميل</p><div class="space-y-2">';
        for(var k in custMap){if(custMap.hasOwnProperty(k)){var c=custMap[k];html+='<a href="https://www.google.com/maps?q='+encodeURIComponent(c.customer_name+' '+c.area)+'" target="_blank" class="card block hover:bg-sky-50 cursor-pointer"><div class="flex justify-between items-center"><span class="font-bold">'+c.customer_name+'</span><i class="fa-solid fa-location-dot text-sky-600"></i></div><p class="text-xs text-gray-400">'+c.area+'</p></a>';}}
        html+='</div>';safeHTML(byId('mainContent'),html);});
    },

    // ==================== مرتجعات ====================
    renderReturns: function(){
        var s=this; safeHTML(byId('mainContent'),'<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin"></i></div>');
        supabase.from('runsheets').select('runsheet_code,run_date').eq('driver_id',this.currentUser.email).eq('status','Returning').then(function(r){var rs=r.data||[];var html='<h2 class="text-lg font-black mb-4">↩️ مرتجعاتي</h2>';
        if(!rs.length){html+='<div class="text-center text-gray-400 py-10">لا توجد مرتجعات</div>';}else{for(var i=0;i<rs.length;i++){html+='<div class="card mb-2"><span class="font-bold">'+rs[i].runsheet_code+'</span><p class="text-xs text-gray-400">'+rs[i].run_date+'</p></div>';}}
        safeHTML(byId('mainContent'),html);});
    },

    // ==================== رصيدي ====================
    renderBalance: function(){
        var s=this; safeHTML(byId('mainContent'),'<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin"></i></div>');
        supabase.from('driver_ledger').select('*').eq('driver_email',this.currentUser.email).order('entry_date',{ascending:false}).then(function(r){var rows=r.data||[],tD=0,tC=0;
        for(var i=0;i<rows.length;i++){tD+=Number(rows[i].debit)||0;tC+=Number(rows[i].credit)||0;}
        var bal=tD-tC,badge=bal<=0?'bg-green-100 text-green-700':'bg-red-100 text-red-700',txt=bal<=0?'🟢 أنا ملتزم':'🔴 عليّ مستحقات';
        var html='<div class="card text-center mb-4"><p class="text-gray-500 text-sm mb-1">المطلوب مني للشركة</p><p class="text-4xl font-black '+(bal<=0?'text-green-600':'text-red-600')+'">'+fmtNum(Math.abs(bal))+' ج.م</p><div class="mt-2"><span class="px-3 py-1 rounded-full text-sm font-bold '+badge+'">'+txt+'</span></div></div>';
        html+='<div class="card"><h3 class="font-bold mb-3">📊 تفاصيل رصيدي</h3><div class="space-y-2 max-h-60 overflow-y-auto">';
        for(var j=rows.length-1;j>=0;j--){var rw=rows[j],sign=rw.debit>0?'+':'-',color=rw.debit>0?'text-red-600':'text-green-600';html+='<div class="flex justify-between p-2 bg-gray-50 rounded-lg"><span class="text-xs text-gray-400">'+rw.entry_date+'</span><span class="font-bold text-sm">'+rw.description+'</span><span class="font-bold '+color+'">'+sign+fmtNum(rw.debit||rw.credit)+'</span></div>';}
        html+='</div><div class="flex justify-between font-black text-lg pt-3 border-t mt-3"><span>📋 الصافي:</span><span class="'+(bal<=0?'text-green-600':'text-red-600')+'">'+fmtNum(Math.abs(bal))+' ج.م</span></div></div>';
        safeHTML(byId('mainContent'),html);});
    }
};
if('serviceWorker' in navigator){navigator.serviceWorker.register('../sw.js').catch(function(){});}
document.addEventListener('DOMContentLoaded',function(){App.init();});
</script>
</body>
</html>
