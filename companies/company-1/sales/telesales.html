<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>التلي سيلز | الروائع ERP</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#1e40af">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="التلي سيلز">
    <meta name="format-detection" content="telephone=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Cairo',sans-serif;background:#f1f5f9;-webkit-tap-highlight-color:transparent;overscroll-behavior-y:none;touch-action:manipulation;-webkit-touch-callout:none}
        :root{--sat:env(safe-area-inset-top);--sar:env(safe-area-inset-right);--sab:env(safe-area-inset-bottom);--sal:env(safe-area-inset-left)}
        .auth-container{background:linear-gradient(135deg,#1e3a8a 0%,#1e40af 40%,#2563eb 100%)}
        .input-field:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
        .no-scrollbar::-webkit-scrollbar{display:none}
        .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .animate-slide-up{animation:slideUp 0.3s ease-out}
        @keyframes pulse-badge{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
        .pulse-badge{animation:pulse-badge 0.3s ease-in-out}
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<!-- ============================================================ -->
<!-- شاشة الدخول -->
<!-- ============================================================ -->
<div id="loginScreen" class="fixed inset-0 z-[100] flex items-center justify-center auth-container p-4">
    <div class="bg-white rounded-[32px] shadow-2xl p-6 w-[92%] max-w-md">
        <div class="text-center mb-6">
            <div class="w-20 h-20 bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4">
                <i class="fa-solid fa-headset text-white text-3xl"></i>
            </div>
            <h1 class="font-black text-2xl text-gray-800">الروائع</h1>
            <p class="text-xs text-gray-400 font-bold mt-1">التلي سيلز</p>
        </div>
        <h2 class="text-lg font-bold text-gray-700 text-center mb-4">تسجيل الدخول إلى حسابك</h2>
        <div class="space-y-3">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">البريد الإلكتروني <span class="text-red-500">*</span></label>
                <input id="loginEmail" type="email" placeholder="example@domain.com" class="input-field w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-200 focus:border-blue-600 focus:bg-white outline-none font-bold text-sm transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">كلمة السر <span class="text-red-500">*</span></label>
                <div class="relative">
                    <input id="loginPass" type="password" placeholder="••••••••" class="input-field w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-200 focus:border-blue-600 focus:bg-white outline-none font-bold text-sm transition-all pr-12">
                    <button type="button" onclick="App.togglePass()" class="absolute left-2 top-1/2 -translate-y-1/2 p-2 text-gray-400 hover:text-gray-600">
                        <i id="passIcon" class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="flex justify-between items-center text-sm">
                <label class="flex items-center gap-1 cursor-pointer">
                    <input type="checkbox" id="rememberMe" class="accent-blue-600 w-4 h-4"> 
                    <span class="text-xs text-gray-600 font-bold">تذكرني</span>
                </label>
                <button onclick="App.forgotPassword()" class="text-blue-600 font-bold text-xs hover:underline">نسيت كلمة المرور؟</button>
            </div>
        </div>
        <button onclick="App.doLogin()" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-3.5 rounded-xl font-black text-sm shadow-lg shadow-blue-200 hover:shadow-xl transition-all mt-4">
            تسجيل الدخول
        </button>
        <p id="loginMsg" class="text-center text-xs text-red-500 font-bold mt-3 hidden"></p>
    </div>
</div>

<!-- ============================================================ -->
<!-- التطبيق الرئيسي -->
<!-- ============================================================ -->
<div id="mainApp" class="hidden flex flex-col h-full bg-gray-100">

    <!-- الهيدر -->
    <header class="bg-blue-700 text-white px-4 flex items-center justify-between sticky top-0 z-30 shadow-md flex-shrink-0" style="padding-top:max(12px,var(--sat));min-height:56px">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-headset"></i>
            <span class="font-black text-sm">التلي سيلز</span>
        </div>
        <div class="flex items-center gap-3">
            <span id="connDot" class="w-2.5 h-2.5 rounded-full bg-emerald-400"></span>
            <span id="connLabel" class="text-[11px] font-bold">متصل</span>
            <button onclick="App.syncNow()" class="bg-white/10 w-8 h-8 rounded-full flex items-center justify-center">
                <i class="fa-solid fa-rotate text-xs"></i>
            </button>
            <button onclick="App.doLogout()" class="bg-white/10 w-8 h-8 rounded-full flex items-center justify-center">
                <i class="fa-solid fa-arrow-right-from-bracket text-xs"></i>
            </button>
        </div>
    </header>

    <!-- شريط تنبيه الحد الائتماني -->
    <div id="creditBanner" class="hidden text-center py-2 text-sm font-bold flex-shrink-0"></div>

    <!-- المحتوى الرئيسي -->
    <main id="mainContent" class="flex-1 overflow-hidden flex flex-col"></main>

    <!-- شريط السلة العائم (يظهر عند وجود منتجات في السلة) -->
    <div id="floatingCart" class="hidden mx-3 mb-2 bg-gray-900 text-white p-4 rounded-2xl shadow-2xl flex justify-between items-center cursor-pointer active:scale-[0.98] transition-transform z-20 flex-shrink-0" onclick="App.openCartModal()">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 w-10 h-10 rounded-full flex items-center justify-center font-black text-sm" id="cartBadgeCount">0</div>
            <div>
                <div class="font-bold text-sm">سلة المشتريات</div>
                <div class="text-xs text-gray-400" id="cartBadgeSummary">لا توجد أصناف</div>
            </div>
        </div>
        <div class="text-left">
            <div class="text-xs text-gray-400">الإجمالي</div>
            <div class="font-black text-lg" id="cartBadgeTotal">0.00</div>
        </div>
    </div>

    <!-- الشريط السفلي (3 تبويبات) -->
    <nav class="bg-white border-t flex justify-around items-center flex-shrink-0 z-30 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]" style="padding-bottom:max(8px,var(--sab));min-height:60px">
        <button onclick="App.switchTab('new-order')" class="tab-btn flex flex-col items-center justify-center py-1 px-3 text-blue-600" data-tab="new-order">
            <i class="fa-solid fa-cart-plus text-xl mb-0.5"></i>
            <span class="text-[10px] font-bold">أوردر جديد</span>
        </button>
        <button onclick="App.switchTab('my-orders')" class="tab-btn flex flex-col items-center justify-center py-1 px-3 text-gray-400 relative" data-tab="my-orders">
            <i class="fa-solid fa-clipboard-list text-xl mb-0.5"></i>
            <span class="text-[10px] font-bold">أوردراتي</span>
            <span id="pendingBadge" class="hidden absolute -top-1 right-0 bg-red-500 text-white text-[9px] w-5 h-5 rounded-full flex items-center justify-center font-black">0</span>
        </button>
        <button onclick="App.switchTab('more')" class="tab-btn flex flex-col items-center justify-center py-1 px-3 text-gray-400" data-tab="more">
            <i class="fa-solid fa-ellipsis text-xl mb-0.5"></i>
            <span class="text-[10px] font-bold">المزيد</span>
        </button>
    </nav>
</div>

<!-- مودال السلة للمراجعة والحفظ -->
<div id="cartModal" class="fixed inset-0 z-50 hidden flex flex-col justify-end">
    <div class="absolute inset-0 bg-black/50" onclick="App.closeCartModal()"></div>
    <div class="bg-white rounded-t-3xl flex flex-col animate-slide-up" style="max-height:85vh">
        <div class="p-4 border-b flex justify-between items-center flex-shrink-0">
            <h2 class="font-black text-lg">مراجعة الأوردر</h2>
            <button onclick="App.closeCartModal()" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="cartModalBody" class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar"></div>
        <div class="p-4 border-t bg-gray-50 flex-shrink-0">
            <div class="flex justify-between font-bold text-lg mb-3">
                <span>الإجمالي النهائي:</span>
                <span class="text-emerald-600" id="cartModalTotal">0.00</span>
            </div>
            <button onclick="App.submitOrder()" class="w-full bg-emerald-600 text-white py-3.5 rounded-xl font-black text-sm shadow-lg active:scale-[0.98] transition">
                <i class="fa-solid fa-check ml-2"></i> حفظ الأوردر
            </button>
        </div>
    </div>
</div>

<script>
// ============================================================
// تهيئة Supabase و Dexie
// ============================================================
var SUPABASE_URL = 'https://fiilmooggumokxanwiyx.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpaWxtb29nZ3Vtb2t4YW53aXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDkwOTIsImV4cCI6MjA5NDI4NTA5Mn0.LZScCxnCiRrTSCCBmTryszQpY1AwBgR2dkTBbC5kOc4';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var db = new Dexie('RW_Telesales');
db.version(2).stores({
    customers: 'customer_code, name, area, phone, visit_day',
    items: 'item_code, name, sales_price, unit, max_qty, barcode, category, image_url',
    stock: '[item_id+branch_id], qty, allocated_qty',
    branches: 'branch_code, name',
    meta: 'key',
    orders: '++id, status, created_at',
    pending_updates: '++id, type, status'
});

function byId(id) { return document.getElementById(id); }
function safeText(el, text) { if (el) el.textContent = text; }
function safeHTML(el, html) { if (el) el.innerHTML = html; }
function fmtNum(n) { return Number(n || 0).toLocaleString('ar-EG', {minimumFractionDigits: 2}); }
function toast(m, t) { Swal.fire({ toast: true, position: 'top', icon: t || 'info', title: m, showConfirmButton: false, timer: 2000 }); }

// ============================================================
// التطبيق الرئيسي
// ============================================================
var App = {
    currentUser: null,
    cart: [],
    selCust: null,
    selBranch: null,
    branchMap: {},
    delFee: 0,
    taxRate: 0,
    minAmt: 0,
    currentTab: 'new-order',
    isListView: true,

    togglePass: function() {
        var passInput = byId('loginPass');
        var icon = byId('passIcon');
        if (passInput.type === 'password') { passInput.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
        else { passInput.type = 'password'; icon.className = 'fa-solid fa-eye'; }
    },

    forgotPassword: function() {
        var email = byId('loginEmail').value.trim();
        if (!email) { toast('أدخل بريدك الإلكتروني أولاً', 'warning'); return; }
        Swal.showLoading();
        supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/reset-password' }).then(function(res) {
            Swal.close();
            if (res.error) toast(res.error.message, 'error');
            else toast('تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك', 'success');
        }).catch(function() { Swal.close(); toast('فشل الاتصال بالخادم', 'error'); });
    },

    doLogin: function() {
        var email = byId('loginEmail').value.trim();
        var pass = byId('loginPass').value.trim();
        if (!email || !pass) { byId('loginMsg').innerText = 'أدخل البريد الإلكتروني وكلمة المرور'; byId('loginMsg').classList.remove('hidden'); return; }
        byId('loginMsg').classList.add('hidden');
        var self = this;
        Swal.showLoading();
        supabase.auth.signInWithPassword({ email: email, password: pass }).then(function(res) {
            Swal.close();
            if (res.error) { byId('loginMsg').innerText = res.error.message; byId('loginMsg').classList.remove('hidden'); }
            else {
                if (byId('rememberMe').checked) localStorage.setItem('telesales_remember_email', email);
                else localStorage.removeItem('telesales_remember_email');
                self.init();
            }
        }).catch(function() { Swal.close(); byId('loginMsg').innerText = 'فشل الاتصال بالخادم'; byId('loginMsg').classList.remove('hidden'); });
    },

    init: function() {
        var self = this;
        var remembered = localStorage.getItem('telesales_remember_email');
        if (remembered) { byId('loginEmail').value = remembered; byId('rememberMe').checked = true; }

        supabase.auth.getSession().then(function(res) {
            if (res.data && res.data.session) {
                self.currentUser = res.data.session.user;
                var meta = self.currentUser.user_metadata || {};
                var isOwner = (meta.isOwner === true || meta.isOwner === 'true' || meta.role === 'owner' || meta.role === 'مالك');
                var perms = meta.permissions || [];
                var hasAccess = isOwner || (Array.isArray(perms) && (perms.indexOf('orders') !== -1 || perms.indexOf('telesales') !== -1 || perms.indexOf('*') !== -1));

                if (!hasAccess) { Swal.fire({ title: 'غير مصرح', text: 'ليس لديك صلاحية التلي سيلز', icon: 'error' }); supabase.auth.signOut(); return; }

                supabase.from('app_settings').select('*').limit(1).single().then(function(sRes) {
                    if (sRes.data) { self.delFee = Number(sRes.data.delivery_fee) || 0; self.taxRate = Number(sRes.data.tax_rate) || 0; self.minAmt = Number(sRes.data.min_invoice_amount) || 0; }
                });

                self.enterApp();
            }
        });
    },

    enterApp: function() {
        byId('loginScreen').classList.add('hidden');
        byId('mainApp').classList.remove('hidden');
        this.updateConnectionStatus();
        window.addEventListener('online', function() { App.updateConnectionStatus(); App.syncPendingOrders(); });
        window.addEventListener('offline', function() { App.updateConnectionStatus(); });
        this.syncDown().then(function() { App.loadBranches(); });
        this.switchTab('new-order');
    },

    doLogout: function() {
        var self = this;
        supabase.auth.signOut().then(function() {
            self.cart = []; self.selCust = null;
            byId('mainApp').classList.add('hidden');
            byId('loginScreen').classList.remove('hidden');
            byId('loginEmail').value = ''; byId('loginPass').value = '';
            byId('loginMsg').classList.add('hidden');
        });
    },

    updateConnectionStatus: function() {
        var dot = byId('connDot'), label = byId('connLabel');
        if (navigator.onLine) { dot.className = 'w-2.5 h-2.5 rounded-full bg-emerald-400'; label.innerText = 'متصل'; }
        else { dot.className = 'w-2.5 h-2.5 rounded-full bg-red-500'; label.innerText = 'غير متصل'; }
    },

    syncDown: function() {
        return Promise.all([
            supabase.from('customers').select('*').then(function(r) { return db.customers.clear().then(function() { return db.customers.bulkPut(r.data || []); }); }),
            supabase.from('items').select('*').then(function(r) { return db.items.clear().then(function() { return db.items.bulkPut(r.data || []); }); }),
            supabase.from('stock_branches').select('*').then(function(r) { return db.stock.clear().then(function() { return db.stock.bulkPut(r.data || []); }); }),
            supabase.from('branches').select('*').then(function(r) { return db.branches.clear().then(function() { return db.branches.bulkPut(r.data || []); }); })
        ]);
    },

    syncNow: function() {
        if (!navigator.onLine) { toast('لا يوجد اتصال', 'warning'); return; }
        var self = this;
        Swal.showLoading();
        this.syncDown().then(function() { Swal.close(); self.loadBranches(); self.syncPendingOrders(); toast('تمت المزامنة', 'success'); }).catch(function() { Swal.close(); toast('فشلت المزامنة', 'error'); });
    },

    // ==================== التنقل بين التبويبات ====================
    switchTab: function(tab) {
        this.currentTab = tab;
        var btns = document.querySelectorAll('.tab-btn');
        for (var i = 0; i < btns.length; i++) {
            btns[i].classList.remove('text-blue-600');
            btns[i].classList.add('text-gray-400');
            if (btns[i].getAttribute('data-tab') === tab) {
                btns[i].classList.remove('text-gray-400');
                btns[i].classList.add('text-blue-600');
            }
        }
        var floatingCart = byId('floatingCart');
        if (tab === 'new-order') {
            if (floatingCart && this.cart.length > 0) floatingCart.classList.remove('hidden');
            this.renderNewOrderView();
        } else if (tab === 'my-orders') {
            if (floatingCart) floatingCart.classList.add('hidden');
            this.renderOrdersView();
        } else if (tab === 'more') {
            if (floatingCart) floatingCart.classList.add('hidden');
            this.renderMoreView();
        }
    },

    // ==================== شاشة: أوردر جديد ====================
    renderNewOrderView: function() {
        var html = '<div class="flex-1 flex flex-col overflow-hidden">';
        // قسم العميل
        html += '<div class="bg-white p-3 shadow-sm flex-shrink-0">';
        html += '<div id="recentCustomersRow" class="flex gap-2 overflow-x-auto pb-2 mb-2 no-scrollbar"></div>';
        html += '<div class="relative">';
        html += '<input type="text" id="custSearch" oninput="App.searchCustomers(this.value)" onfocus="App.showRecentCustomers()" placeholder="🔍 ابحث عن عميل بالاسم أو الهاتف..." class="w-full p-2.5 pr-10 bg-gray-50 border border-gray-200 rounded-xl text-sm font-bold focus:border-blue-500 outline-none">';
        html += '<i class="fa-solid fa-magnifying-glass absolute right-3 top-3 text-gray-400"></i>';
        html += '</div>';
        html += '<div id="custResults" class="mt-1 space-y-1 max-h-48 overflow-y-auto no-scrollbar"></div>';
        html += '</div>';
        // معلومات العميل المختار
        html += '<div id="selectedCustInfo" class="hidden bg-blue-50 p-3 border-b border-blue-100 flex-shrink-0"></div>';
        // شريط الفرع والتصنيفات
        html += '<div class="bg-white px-3 py-2 border-b flex items-center gap-2 flex-shrink-0">';
        html += '<select id="branchSel" onchange="App.onBranchChange(this.value)" class="p-2 bg-gray-50 border rounded-lg text-sm font-bold flex-1"><option value="">-- اختر الفرع --</option></select>';
        html += '<button onclick="App.toggleViewMode()" class="p-2 bg-gray-100 border rounded-lg text-gray-500"><i id="viewModeIcon" class="fa-solid fa-list"></i></button>';
        html += '</div>';
        // شبكة/قائمة المنتجات
        html += '<div id="productsContainer" class="flex-1 overflow-y-auto p-3 no-scrollbar"><div class="text-center text-gray-400 py-10">اختر فرعاً ثم ابحث عن المنتجات</div></div>';
        html += '</div>';
        safeHTML(byId('mainContent'), html);
        this.loadBranches();
        this.showRecentCustomers();
        this.updateFloatingCart();
    },

    toggleViewMode: function() {
        this.isListView = !this.isListView;
        var icon = byId('viewModeIcon');
        if (this.isListView) icon.className = 'fa-solid fa-list';
        else icon.className = 'fa-solid fa-grip';
        this.searchItems(byId('itemSearch') ? byId('itemSearch').value : '');
    },

    // ==================== آخر العملاء ====================
    showRecentCustomers: function() {
        var self = this;
        var row = byId('recentCustomersRow');
        if (!row) return;
        db.orders.orderBy('created_at').reverse().limit(10).toArray().then(function(orders) {
            var codes = [];
            for (var i = 0; i < orders.length; i++) {
                if (orders[i].customer_code && codes.indexOf(orders[i].customer_code) === -1) codes.push(orders[i].customer_code);
                if (codes.length >= 5) break;
            }
            if (!codes.length) { safeHTML(row, '<span class="text-xs text-gray-400 py-1">لا يوجد عملاء سابقون</span>'); return; }
            db.customers.where('customer_code').anyOf(codes).toArray().then(function(custs) {
                var html = '';
                for (var j = 0; j < custs.length; j++) {
                    var c = custs[j];
                    html += '<button onclick="App.selectCustomer(\'' + c.customer_code + '\')" class="whitespace-nowrap bg-blue-50 text-blue-700 px-3 py-1.5 rounded-full text-xs font-bold active:bg-blue-100 flex-shrink-0"><i class="fa-solid fa-clock-rotate-left ml-1 text-blue-400"></i>' + (c.name || c.customer_code) + '</button>';
                }
                safeHTML(row, html);
            });
        });
    },

    // ==================== البحث عن العملاء ====================
    searchCustomers: function(q) {
        var results = byId('custResults');
        if (!results) return;
        if (!q || !q.trim()) { safeHTML(results, ''); return; }
        var s = q.toLowerCase();
        var self = this;
        db.customers.toArray().then(function(all) {
            var filtered = [];
            for (var i = 0; i < all.length; i++) {
                var c = all[i];
                if ((c.name || '').toLowerCase().indexOf(s) !== -1 || (c.customer_code || '').toLowerCase().indexOf(s) !== -1 || (c.phone || '').indexOf(s) !== -1 || (c.area || '').toLowerCase().indexOf(s) !== -1) filtered.push(c);
                if (filtered.length >= 10) break;
            }
            if (!filtered.length) { safeHTML(results, '<div class="text-center text-gray-400 p-3 bg-white rounded-xl text-sm">لا توجد نتائج</div>'); return; }
            var html = '';
            for (var j = 0; j < filtered.length; j++) {
                var cu = filtered[j];
                var debtClass = Number(cu.debt) > 0 ? 'text-red-500' : 'text-green-600';
                html += '<div onclick="App.selectCustomer(\'' + cu.customer_code + '\')" class="bg-white p-3 rounded-xl shadow-sm border cursor-pointer hover:bg-blue-50 active:bg-blue-100">';
                html += '<div class="font-bold text-sm">' + (cu.name || '') + '</div>';
                html += '<div class="text-xs text-gray-400">' + (cu.customer_code || '') + ' - ' + (cu.area || '') + ' | الرصيد: <span class="' + debtClass + ' font-bold">' + fmtNum(cu.debt) + '</span></div>';
                html += '</div>';
            }
            safeHTML(results, html);
        });
    },

    selectCustomer: function(code) {
        var self = this;
        db.customers.get(code).then(function(c) {
            if (!c) return;
            self.selCust = c;
            var limit = Number(c.credit_limit) || 0, debt = Number(c.debt) || 0, pct = limit > 0 ? (debt / limit) * 100 : 0;
            var banner = byId('creditBanner');
            if (pct >= 100) {
                banner.className = 'text-center py-2 text-sm font-bold flex-shrink-0 bg-red-500 text-white';
                banner.innerHTML = '⛔ العميل تجاوز الحد الائتماني (' + fmtNum(debt) + ' / ' + fmtNum(limit) + ')';
            } else if (pct >= 75) {
                banner.className = 'text-center py-2 text-sm font-bold flex-shrink-0 bg-yellow-100 text-yellow-800 border-b border-yellow-200';
                banner.innerHTML = '⚠️ العميل يقترب من الحد الائتماني (' + Math.round(pct) + '%)';
            } else {
                banner.className = 'hidden';
            }
            var infoDiv = byId('selectedCustInfo');
            if (infoDiv) {
                infoDiv.classList.remove('hidden');
                infoDiv.innerHTML = '<div class="flex justify-between items-center"><div><span class="font-black text-blue-800">' + (c.name || '') + '</span><span class="text-xs text-blue-500 mr-2">' + (c.area || '') + '</span></div><button onclick="App.clearCustomer()" class="text-xs text-red-500 font-bold">✕ تغيير</button></div>';
            }
            byId('custSearch').value = '';
            safeHTML(byId('custResults'), '');
            toast('تم اختيار: ' + (c.name || code), 'success');
        });
    },

    clearCustomer: function() {
        this.selCust = null;
        byId('creditBanner').className = 'hidden';
        var infoDiv = byId('selectedCustInfo');
        if (infoDiv) infoDiv.classList.add('hidden');
        toast('تم إلغاء اختيار العميل', 'info');
    },

    // ==================== المنتجات ====================
    loadBranches: function() {
        var self = this;
        db.branches.toArray().then(function(br) {
            self.branchMap = {};
            var html = '<option value="">-- اختر الفرع --</option>';
            for (var i = 0; i < br.length; i++) { self.branchMap[br[i].branch_code] = br[i].id; html += '<option value="' + br[i].branch_code + '">' + (br[i].name || br[i].branch_code) + '</option>'; }
            var sel = byId('branchSel'); if (sel) safeHTML(sel, html);
        });
    },

    onBranchChange: function(v) { this.selBranch = v || null; this.renderAllProducts(); },

    getAvail: function(itemId) {
        var self = this;
        var bid = this.selBranch ? this.branchMap[this.selBranch] : null;
        return db.stock.where('item_id').equals(itemId).toArray().then(function(r) {
            if (bid) { for (var i = 0; i < r.length; i++) { if (r[i].branch_id === bid) return Math.max(0, (Number(r[i].qty) || 0) - (Number(r[i].allocated_qty) || 0)); } return 0; }
            var t = 0; for (var j = 0; j < r.length; j++) t += Math.max(0, (Number(r[j].qty) || 0) - (Number(r[j].allocated_qty) || 0)); return t;
        });
    },

    renderAllProducts: function() {
        var container = byId('productsContainer');
        if (!container) return;
        if (!this.selBranch) { safeHTML(container, '<div class="text-center text-amber-500 py-10 bg-white rounded-xl">اختر فرعاً أولاً</div>'); return; }
        safeHTML(container, '<div class="text-center text-gray-400 py-10">جاري التحميل...</div>');
        var self = this;
        db.items.toArray().then(function(items) {
            if (!items.length) { safeHTML(container, '<div class="text-center text-gray-400 py-10">لا توجد منتجات</div>'); return; }
            var promises = [];
            for (var i = 0; i < items.length; i++) promises.push(self.getAvail(items[i].id));
            Promise.all(promises).then(function(avails) {
                var html = '';
                if (self.isListView) html += '<div class="space-y-2">';
                else html += '<div class="grid grid-cols-2 gap-2">';
                for (var k = 0; k < items.length; k++) {
                    var it = items[k], avail = avails[k];
                    html += self.renderProductCard(it, avail);
                }
                html += '</div>';
                safeHTML(container, html);
            });
        });
    },

    renderProductCard: function(it, avail) {
        var self = this;
        var inCart = 0;
        for (var x = 0; x < self.cart.length; x++) { if (self.cart[x].code === it.item_code) { inCart = self.cart[x].qty; break; } }
        var stockColor = avail > 10 ? 'bg-green-500' : avail > 0 ? 'bg-yellow-500' : 'bg-red-500';
        var stockText = avail > 10 ? 'متوفر' : avail > 0 ? 'ينفذ (باقي ' + avail + ')' : 'نافد';

        if (this.isListView) {
            // عرض قائمة (List View)
            var html = '<div class="bg-white p-3 rounded-xl shadow-sm border flex items-center gap-3">';
            html += '<div class="w-12 h-12 bg-gray-100 rounded-lg overflow-hidden flex-shrink-0"><img src="' + (it.image_url || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22150%22%3E%3Crect fill=%22%23e2e8f0%22 width=%22150%22 height=%22150%22/%3E%3Ctext fill=%22%2394a3b8%22 font-size=%2214%22 x=%2250%25%22 y=%2250%25%22%3E📦%3C/text%3E%3C/svg%3E') + '" class="w-full h-full object-cover" onerror="this.style.display=\'none\'"></div>';
            html += '<div class="flex-1 min-w-0"><div class="font-bold text-sm truncate">' + (it.name || '') + '</div><div class="text-xs text-gray-400">' + (it.item_code || '') + '</div><div class="flex items-center gap-1 mt-1"><span class="w-2 h-2 rounded-full ' + stockColor + '"></span><span class="text-[10px] text-gray-500">' + stockText + '</span></div></div>';
            html += '<div class="text-left"><div class="font-black text-blue-700 text-sm">' + fmtNum(it.sales_price) + '</div>';
            if (inCart > 0) {
                html += '<div class="flex items-center gap-1 mt-1"><button onclick="event.stopPropagation();App.decCart(\'' + it.item_code + '\')" class="w-6 h-6 bg-gray-100 rounded-full text-xs font-black">-</button><span class="text-xs font-black w-5 text-center">' + inCart + '</span><button onclick="event.stopPropagation();App.addToCart(\'' + it.item_code + '\')" class="w-6 h-6 bg-blue-600 text-white rounded-full text-xs font-black">+</button></div>';
            } else {
                html += '<button onclick="event.stopPropagation();App.addToCart(\'' + it.item_code + '\')" class="mt-1 w-8 h-8 bg-blue-600 text-white rounded-full text-xs flex items-center justify-center"><i class="fa-solid fa-plus"></i></button>';
            }
            html += '</div></div>';
            return html;
        } else {
            // عرض شبكي (Grid View)
            var html = '<div class="bg-white rounded-xl shadow-sm border overflow-hidden">';
            html += '<div class="aspect-square bg-gray-100 relative"><img src="' + (it.image_url || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22150%22%3E%3Crect fill=%22%23e2e8f0%22 width=%22150%22 height=%22150%22/%3E%3Ctext fill=%22%2394a3b8%22 font-size=%2214%22 x=%2250%25%22 y=%2250%25%22%3E📦%3C/text%3E%3C/svg%3E') + '" class="w-full h-full object-cover"><span class="absolute top-1 right-1 w-3 h-3 rounded-full ' + stockColor + ' border border-white"></span></div>';
            html += '<div class="p-2"><div class="font-bold text-xs truncate">' + (it.name || '') + '</div><div class="flex justify-between items-center mt-1"><span class="font-black text-blue-700 text-xs">' + fmtNum(it.sales_price) + '</span>';
            if (inCart > 0) {
                html += '<div class="flex items-center gap-1"><button onclick="event.stopPropagation();App.decCart(\'' + it.item_code + '\')" class="w-5 h-5 bg-gray-100 rounded-full text-[10px] font-black">-</button><span class="text-[10px] font-black">' + inCart + '</span><button onclick="event.stopPropagation();App.addToCart(\'' + it.item_code + '\')" class="w-5 h-5 bg-blue-600 text-white rounded-full text-[10px] font-black">+</button></div>';
            } else {
                html += '<button onclick="event.stopPropagation();App.addToCart(\'' + it.item_code + '\')" class="w-6 h-6 bg-blue-600 text-white rounded-full text-[10px] flex items-center justify-center"><i class="fa-solid fa-plus"></i></button>';
            }
            html += '</div></div></div>';
            return html;
        }
    },

    // ==================== إدارة السلة ====================
    addToCart: function(code) {
        var self = this;
        db.items.get(code).then(function(it) {
            if (!it) return;
            self.getAvail(it.id).then(function(avail) {
                var existing = null;
                for (var i = 0; i < self.cart.length; i++) { if (self.cart[i].code === code) { existing = self.cart[i]; break; } }
                var cur = existing ? existing.qty : 0, nq = cur + 1;
                var mx = it.max_qty ? Number(it.max_qty) : 0;
                if (mx > 0 && nq > mx) { toast('الحد الأقصى: ' + mx, 'warning'); return; }
                if (nq > avail) { toast('المتاح: ' + avail, 'warning'); return; }
                if (existing) { existing.qty = nq; }
                else { self.cart.push({ code: it.item_code, name: it.name, price: Number(it.sales_price) || 0, unit: it.unit || 'حبة', qty: 1 }); }
                self.updateFloatingCart();
                self.renderAllProducts();
                if (navigator.vibrate) navigator.vibrate(30);
            });
        });
    },

    decCart: function(code) {
        for (var i = 0; i < this.cart.length; i++) { if (this.cart[i].code === code) { this.cart[i].qty--; if (this.cart[i].qty <= 0) this.cart.splice(i, 1); break; } }
        this.updateFloatingCart();
        this.renderAllProducts();
    },

    calcTotals: function() {
        var sub = 0;
        for (var i = 0; i < this.cart.length; i++) sub += this.cart[i].price * this.cart[i].qty;
        if (sub === 0) return { sub: 0, del: 0, tax: 0, total: 0 };
        var d = this.delFee, beforeTax = sub + d, tx = Math.round(beforeTax * this.taxRate) / 100;
        return { sub: sub, del: d, tax: tx, total: beforeTax + tx };
    },

    updateFloatingCart: function() {
        var bar = byId('floatingCart');
        if (!bar) return;
        var t = this.calcTotals();
        if (this.cart.length === 0) { bar.classList.add('hidden'); return; }
        bar.classList.remove('hidden');
        byId('cartBadgeCount').innerText = this.cart.length;
        byId('cartBadgeSummary').innerText = this.cart.length === 1 ? this.cart[0].name : (this.cart.length + ' أصناف');
        byId('cartBadgeTotal').innerText = fmtNum(t.total);
    },

    openCartModal: function() {
        if (this.cart.length === 0) return;
        byId('cartModal').classList.remove('hidden');
        this.renderCartModalBody();
    },

    closeCartModal: function() {
        byId('cartModal').classList.add('hidden');
    },

    renderCartModalBody: function() {
        var html = '';
        var t = this.calcTotals();
        for (var i = 0; i < this.cart.length; i++) {
            var item = this.cart[i];
            html += '<div class="flex items-center justify-between bg-gray-50 p-3 rounded-xl">';
            html += '<div class="flex-1 min-w-0"><div class="font-bold text-sm">' + item.name + '</div><div class="text-xs text-gray-400">' + fmtNum(item.price) + ' × ' + item.qty + '</div></div>';
            html += '<div class="flex items-center gap-2 mr-3"><button onclick="App.decCart(\'' + item.code + '\');App.renderCartModalBody()" class="w-7 h-7 bg-red-100 text-red-600 rounded-full text-xs font-black">-</button><span class="text-sm font-black w-6 text-center">' + item.qty + '</span><button onclick="App.addToCart(\'' + item.code + '\');App.renderCartModalBody()" class="w-7 h-7 bg-blue-600 text-white rounded-full text-xs font-black">+</button></div>';
            html += '</div>';
        }
        safeHTML(byId('cartModalBody'), html || '<div class="text-center text-gray-400 py-10">السلة فارغة</div>');
        byId('cartModalTotal').innerText = fmtNum(t.total);
    },

    // ==================== حفظ الأوردر ====================
    submitOrder: function() {
        if (!this.selCust) { toast('اختر عميلاً أولاً', 'warning'); return; }
        if (!this.cart.length) { toast('السلة فارغة', 'warning'); return; }
        if (!this.selBranch) { toast('اختر فرعاً', 'warning'); return; }
        var t = this.calcTotals();
        if (this.minAmt > 0 && t.total < this.minAmt) { toast('الحد الأدنى للفاتورة: ' + fmtNum(this.minAmt), 'warning'); return; }
        var items = [];
        for (var i = 0; i < this.cart.length; i++) { items.push({ code: this.cart[i].code, name: this.cart[i].name, price: this.cart[i].price, qty: this.cart[i].qty, unit: this.cart[i].unit }); }
        var hdr = { customer_code: this.selCust.customer_code, custName: this.selCust.name, area: this.selCust.area || '', total: t.total, deliveryFees: t.del, status: 'Confirmed', paymentType: this.selCust.payment_type || 'أجل', taxAmount: t.tax, taxRate: this.taxRate };
        var self = this;
        this.closeCartModal();
        Swal.showLoading();
        supabase.auth.getSession().then(function(ses) {
            var token = (ses && ses.data && ses.data.session) ? ses.data.session.access_token : null;
            return fetch(SUPABASE_URL + '/functions/v1/save-sales-invoice', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token }, body: JSON.stringify({ orderHeader: hdr, itemsList: items, branchCode: self.selBranch }) });
        }).then(function(r) { return r.json(); }).then(function(json) {
            Swal.close();
            if (json.success) { toast('تم الحفظ: ' + (json.orderID || ''), 'success'); self.cart = []; self.selCust = null; self.clearCustomer(); self.updateFloatingCart(); self.switchTab('new-order'); }
            else { toast(json.msg || 'فشل الحفظ', 'error'); }
        }).catch(function() { Swal.close(); toast('فشل الاتصال', 'error'); });
    },

    // ==================== شاشة: أوردراتي ====================
    renderOrdersView: function() {
        var self = this;
        var html = '<div class="flex-1 overflow-y-auto p-4 no-scrollbar">';
        html += '<h2 class="text-lg font-black mb-4">📋 أوردراتي</h2>';
        html += '<div class="bg-white p-3 rounded-2xl shadow-sm border mb-4"><div class="flex gap-2 flex-wrap">';
        html += '<select id="orderStatusFilter" onchange="App.renderOrdersList()" class="p-2 bg-gray-50 border rounded-lg text-sm font-bold"><option value="">كل الحالات</option><option value="Draft">مسودة</option><option value="Confirmed">مؤكد</option><option value="Pending">قيد الانتظار</option><option value="Invoiced">مفوتر</option><option value="Delivered">تم التوصيل</option><option value="Cancelled">ملغي</option></select>';
        html += '<input type="date" id="orderDateFilter" onchange="App.renderOrdersList()" class="p-2 bg-gray-50 border rounded-lg text-sm font-bold">';
        html += '<button onclick="byId(\'orderStatusFilter\').value=\'\';byId(\'orderDateFilter\').value=\'\';App.renderOrdersList();" class="p-2 bg-gray-100 border rounded-lg text-sm font-bold">إعادة تعيين</button>';
        html += '</div></div>';
        html += '<div id="ordersListContainer" class="space-y-3"><div class="text-center text-gray-400 py-8">جاري التحميل...</div></div>';
        html += '</div>';
        safeHTML(byId('mainContent'), html);
        this.renderOrdersList();
    },

    renderOrdersList: function() {
        var self = this;
        var container = byId('ordersListContainer');
        if (!container) return;
        safeHTML(container, '<div class="text-center text-gray-400 py-8">جاري التحميل...</div>');
        var query = supabase.from('orders').select('*').eq('created_by', this.currentUser.email).order('order_date', { ascending: false }).limit(50);
        var statusFilter = byId('orderStatusFilter') ? byId('orderStatusFilter').value : '';
        var dateFilter = byId('orderDateFilter') ? byId('orderDateFilter').value : '';
        if (statusFilter) query = query.eq('order_status', statusFilter);
        if (dateFilter) query = query.eq('order_date', dateFilter);
        query.then(function(res) {
            var orders = res.data || [];
            if (!orders.length) { safeHTML(container, '<div class="text-center text-gray-400 py-8 bg-white rounded-2xl">لا توجد أوردرات</div>'); return; }
            var html = '';
            for (var i = 0; i < orders.length; i++) {
                var o = orders[i];
                var sc = ''; var sl = o.order_status || '';
                if (o.order_status === 'Draft') { sc = 'bg-yellow-100 text-yellow-700'; sl = 'مسودة'; }
                else if (o.order_status === 'Confirmed') { sc = 'bg-blue-100 text-blue-700'; sl = 'مؤكد'; }
                else if (o.order_status === 'Pending') { sc = 'bg-purple-100 text-purple-700'; sl = 'قيد الانتظار'; }
                else if (o.order_status === 'Invoiced') { sc = 'bg-green-100 text-green-700'; sl = 'مفوتر'; }
                else if (o.order_status === 'Delivered') { sc = 'bg-emerald-100 text-emerald-700'; sl = 'تم التوصيل'; }
                else if (o.order_status === 'Cancelled') { sc = 'bg-red-100 text-red-700'; sl = 'ملغي'; }
                else { sc = 'bg-gray-100 text-gray-700'; }
                html += '<div class="bg-white p-4 rounded-2xl shadow-sm border cursor-pointer hover:bg-blue-50" onclick="App.repeatOrder(\'' + o.id + '\')">';
                html += '<div class="flex justify-between items-start mb-2"><div><span class="font-black text-blue-600 text-sm">' + (o.order_code || '') + '</span><span class="text-xs text-gray-400 mr-2">' + (o.order_date ? new Date(o.order_date).toLocaleDateString('ar-EG') : '') + '</span></div><span class="px-2 py-1 rounded-full text-xs font-bold ' + sc + '">' + sl + '</span></div>';
                html += '<div class="flex justify-between items-center"><div><span class="font-bold text-sm">' + (o.customer_name || '') + '</span></div><span class="font-black text-emerald-600 text-sm">' + fmtNum(o.total_amount) + ' EGP</span></div>';
                html += '<div class="flex gap-1 mt-2"><button onclick="event.stopPropagation();App.repeatOrder(\'' + o.id + '\')" class="text-xs bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-bold">🔄 إعادة الطلب</button></div>';
                html += '</div>';
            }
            safeHTML(container, html);
        }).catch(function() { safeHTML(container, '<div class="text-center text-red-400 py-8 bg-white rounded-2xl">فشل تحميل الأوردرات</div>'); });
    },

    repeatOrder: function(orderId) {
        var self = this;
        Swal.showLoading();
        supabase.from('orders').select('*').eq('id', orderId).single().then(function(oRes) {
            var order = oRes.data;
            if (!order) { Swal.close(); toast('الأوردر غير موجود', 'error'); return; }
            supabase.from('order_details').select('*').eq('order_id', order.id).then(function(dRes) {
                Swal.close();
                var details = dRes.data || [];
                self.cart = [];
                for (var i = 0; i < details.length; i++) {
                    self.cart.push({ code: details[i].item_code, name: details[i].item_name, price: Number(details[i].unit_price) || 0, unit: details[i].unit || 'حبة', qty: Number(details[i].qty) || 1 });
                }
                if (order.customer_id) {
                    db.customers.where('customer_code').equals(order.customer_id).first().then(function(c) {
                        if (c) { self.selCust = c; self.selectCustomer(c.customer_code); }
                    });
                }
                self.updateFloatingCart();
                self.switchTab('new-order');
                toast('تم نسخ الأوردر للسلة (ابحث عن العميل يدوياً)', 'success');
            });
        }).catch(function() { Swal.close(); });
    },

    // ==================== شاشة: المزيد ====================
    renderMoreView: function() {
        var html = '<div class="flex-1 overflow-y-auto p-4 no-scrollbar">';
        html += '<h2 class="text-lg font-black mb-4">⚙️ المزيد</h2>';
        html += '<div class="space-y-3">';
        html += '<button onclick="App.syncNow()" class="w-full bg-white p-4 rounded-2xl shadow-sm border flex items-center gap-3"><i class="fa-solid fa-rotate text-blue-600 text-xl"></i><div class="text-right"><div class="font-bold">مزامنة البيانات</div><div class="text-xs text-gray-400">تحديث العملاء والمنتجات والمخزون</div></div></button>';
        html += '<button onclick="App.doLogout()" class="w-full bg-white p-4 rounded-2xl shadow-sm border flex items-center gap-3"><i class="fa-solid fa-right-from-bracket text-red-500 text-xl"></i><div class="text-right"><div class="font-bold text-red-500">تسجيل الخروج</div><div class="text-xs text-gray-400">العودة إلى شاشة الدخول</div></div></button>';
        html += '</div></div>';
        safeHTML(byId('mainContent'), html);
    },

    syncPendingOrders: function() {
        db.pending_updates.where('status').equals('pending').toArray().then(function(ops) {
            var badge = byId('pendingBadge');
            if (badge) { if (ops.length > 0) { badge.classList.remove('hidden'); badge.innerText = ops.length; } else { badge.classList.add('hidden'); } }
        });
    }
};
