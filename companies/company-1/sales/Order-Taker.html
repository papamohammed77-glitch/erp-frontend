<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مندوب المبيعات | الروائع ERP</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#7c3aed">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Cairo',sans-serif;background:#f1f5f9;-webkit-tap-highlight-color:transparent}
        .cart-sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -10px 30px rgba(0,0,0,.1);transform:translateY(105%);transition:transform .25s;z-index:50;max-height:70vh;display:flex;flex-direction:column}
        .cart-sheet.open{transform:translateY(0)}
        .cart-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:45;display:none}
        .cart-overlay.show{display:block}
        .credit-green{background:#dcfce7;color:#166534;border:1px solid #86efac}
        .credit-yellow{background:#fef9c3;color:#854d0e;border:1px solid #fde047}
        .credit-red{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .animate-fadeIn{animation:fadeIn .3s}
        .auth-container{background:linear-gradient(135deg,#4c1d95 0%,#6d28d9 40%,#7c3aed 100%)}
        .input-field:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,0.1)}
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<!-- ============================================================ -->
<!-- شاشة الدخول -->
<!-- ============================================================ -->
<div id="loginScreen" class="fixed inset-0 z-[100] flex items-center justify-center auth-container p-4">
    <div class="bg-white rounded-[32px] shadow-2xl p-6 w-[92%] max-w-md">
        <div class="text-center mb-6">
            <div class="w-20 h-20 bg-gradient-to-br from-purple-600 to-purple-800 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4">
                <i class="fa-solid fa-user-tie text-white text-3xl"></i>
            </div>
            <h1 class="font-black text-2xl text-gray-800">الروائع</h1>
            <p class="text-xs text-gray-400 font-bold mt-1">مندوب المبيعات</p>
        </div>
        <h2 class="text-lg font-bold text-gray-700 text-center mb-4">تسجيل الدخول إلى حسابك</h2>
        <div class="space-y-3">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">البريد الإلكتروني <span class="text-red-500">*</span></label>
                <input id="loginEmail" type="email" placeholder="example@domain.com" class="input-field w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-200 focus:border-purple-600 focus:bg-white outline-none font-bold text-sm transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">كلمة السر <span class="text-red-500">*</span></label>
                <div class="relative">
                    <input id="loginPass" type="password" placeholder="••••••••" class="input-field w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-200 focus:border-purple-600 focus:bg-white outline-none font-bold text-sm transition-all pr-12">
                    <button type="button" onclick="App.togglePass()" class="absolute left-2 top-1/2 -translate-y-1/2 p-2 text-gray-400 hover:text-gray-600">
                        <i id="passIcon" class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="flex justify-between items-center text-sm">
                <label class="flex items-center gap-1 cursor-pointer">
                    <input type="checkbox" id="rememberMe" class="accent-purple-600 w-4 h-4"> 
                    <span class="text-xs text-gray-600 font-bold">تذكرني</span>
                </label>
                <button onclick="App.forgotPassword()" class="text-purple-600 font-bold text-xs hover:underline">نسيت كلمة المرور؟</button>
            </div>
        </div>
        <button onclick="App.doLogin()" class="w-full bg-gradient-to-r from-purple-600 to-purple-700 text-white py-3.5 rounded-xl font-black text-sm shadow-lg shadow-purple-200 hover:shadow-xl transition-all mt-4">
            تسجيل الدخول
        </button>
        <p id="loginMsg" class="text-center text-xs text-red-500 font-bold mt-3 hidden"></p>
    </div>
</div>

<!-- ============================================================ -->
<!-- التطبيق الرئيسي -->
<!-- ============================================================ -->
<div id="mainApp" class="hidden flex flex-col h-full">

    <header class="bg-purple-700 text-white p-4 flex items-center justify-between sticky top-0 z-30 shadow-md flex-shrink-0">
        <span class="font-black text-sm">👔 مندوب المبيعات</span>
        <div class="flex items-center gap-2">
            <span id="connDot" class="w-2.5 h-2.5 rounded-full bg-emerald-400"></span>
            <span id="connLabel" class="text-[11px] font-bold">متصل</span>
            <button onclick="App.syncData()" class="relative bg-white/10 w-8 h-8 rounded-full"><i class="fa-solid fa-rotate text-xs"></i></button>
            <button onclick="App.doLogout()" class="bg-white/10 w-8 h-8 rounded-full"><i class="fa-solid fa-arrow-right-from-bracket text-xs"></i></button>
        </div>
    </header>

    <div id="creditBanner" class="hidden text-center py-2 text-sm font-bold flex-shrink-0"></div>
    <main id="mainContent" class="flex-1 overflow-y-auto pb-20"></main>

    <nav id="bottomNav" class="bg-white border-t fixed bottom-0 left-0 right-0 z-30 h-16 flex justify-around items-center text-gray-400 text-xs flex-shrink-0">
        <button onclick="App.showView('customers')" class="flex flex-col items-center p-2 text-purple-600" id="nav-customers"><i class="fa-solid fa-users text-lg mb-1"></i><span>عملائي</span></button>
        <button onclick="App.showView('catalog')" class="flex flex-col items-center p-2" id="nav-catalog"><i class="fa-solid fa-box text-lg mb-1"></i><span>المنتجات</span></button>
        <button onclick="App.showView('review')" class="flex flex-col items-center p-2" id="nav-review"><i class="fa-solid fa-cart-shopping text-lg mb-1"></i><span>أوردر</span></button>
        <button onclick="App.showView('orders')" class="flex flex-col items-center p-2" id="nav-orders"><i class="fa-solid fa-list-check text-lg mb-1"></i><span>أوردراتي</span></button>
    </nav>

    <div class="cart-overlay" id="cartOverlay" onclick="App.closeCart()"></div>
    <div class="cart-sheet" id="cartSheet">
        <div class="p-4 border-b flex justify-between items-center"><span class="font-black">السلة</span><button onclick="App.closeCart()" class="w-8 h-8 bg-gray-100 rounded-full"><i class="fa-solid fa-xmark"></i></button></div>
        <div id="cartBody" class="p-4 overflow-y-auto flex-1"></div>
        <div class="p-4 border-t"><button onclick="App.closeCart();App.goToReview()" class="w-full bg-purple-700 text-white py-3 rounded-xl font-black">مراجعة وإتمام</button></div>
    </div>

</div>

<script>
// ============================================================
// تهيئة Supabase و Dexie
// ============================================================
var SUPABASE_URL = 'https://fiilmooggumokxanwiyx.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpaWxtb29nZ3Vtb2t4YW53aXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDkwOTIsImV4cCI6MjA5NDI4NTA5Mn0.LZScCxnCiRrTSCCBmTryszQpY1AwBgR2dkTBbC5kOc4';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var db = new Dexie('RW_OrderTaker');
db.version(2).stores({
    customers: 'customer_code, name, area, phone, visit_day',
    items: 'item_code, name, sales_price, unit, max_qty, barcode, category, image_url',
    stock: '[item_id+branch_id], qty, allocated_qty',
    branches: 'branch_code, name',
    meta: 'key',
    orders: '++id, status, created_at',
    pending_updates: '++id, type, status'
});

function byId(id) { return document.getElementById(id); }
function safeText(el, text) { if (el) el.textContent = text; }
function safeHTML(el, html) { if (el) el.innerHTML = html; }
function fmtNum(n) { return Number(n || 0).toLocaleString('ar-EG', {minimumFractionDigits: 2}); }
function toast(m, t) { Swal.fire({ toast: true, position: 'top', icon: t || 'info', title: m, showConfirmButton: false, timer: 2000 }); }

// ============================================================
// التطبيق
// ============================================================
var App = {
    currentUser: null,
    cart: [],
    selCust: null,
    selBranch: null,
    branchMap: {},
    delFee: 0,
    taxRate: 0,
    minAmt: 0,
    companyName: 'الروائع',
    currentCategory: 'الكل',
    allowedAreas: [],
    restrictToVisitDay: true,
    todayName: '',

    togglePass: function() {
        var passInput = byId('loginPass');
        var icon = byId('passIcon');
        if (passInput.type === 'password') { passInput.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
        else { passInput.type = 'password'; icon.className = 'fa-solid fa-eye'; }
    },

    forgotPassword: function() {
        var email = byId('loginEmail').value.trim();
        if (!email) { toast('أدخل بريدك الإلكتروني أولاً', 'warning'); return; }
        Swal.showLoading();
        supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/reset-password' }).then(function(res) {
            Swal.close();
            if (res.error) toast(res.error.message, 'error');
            else toast('تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك', 'success');
        }).catch(function() { Swal.close(); toast('فشل الاتصال بالخادم', 'error'); });
    },

    doLogin: function() {
        var email = byId('loginEmail').value.trim();
        var pass = byId('loginPass').value.trim();
        if (!email || !pass) { byId('loginMsg').innerText = 'أدخل البريد الإلكتروني وكلمة المرور'; byId('loginMsg').classList.remove('hidden'); return; }
        byId('loginMsg').classList.add('hidden');
        var self = this;
        Swal.showLoading();
        supabase.auth.signInWithPassword({ email: email, password: pass }).then(function(res) {
            Swal.close();
            if (res.error) { byId('loginMsg').innerText = res.error.message; byId('loginMsg').classList.remove('hidden'); }
            else { if (byId('rememberMe').checked) localStorage.setItem('ot_remember_email', email); else localStorage.removeItem('ot_remember_email'); self.init(); }
        }).catch(function() { Swal.close(); byId('loginMsg').innerText = 'فشل الاتصال بالخادم'; byId('loginMsg').classList.remove('hidden'); });
    },

    init: function() {
        var self = this;
        var remembered = localStorage.getItem('ot_remember_email');
        if (remembered) { byId('loginEmail').value = remembered; byId('rememberMe').checked = true; }

        // حساب اسم اليوم
        var dayNames = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
        this.todayName = dayNames[new Date().getDay()];

        supabase.auth.getSession().then(function(res) {
            if (res.data && res.data.session) {
                self.currentUser = res.data.session.user;
                var meta = self.currentUser.user_metadata || {};
                var isOwner = (meta.isOwner === true || meta.isOwner === 'true' || meta.role === 'owner' || meta.role === 'مالك');
                var perms = meta.permissions || [];
                var hasAccess = isOwner || (Array.isArray(perms) && (perms.indexOf('orders') !== -1 || perms.indexOf('*') !== -1));

                if (!hasAccess) { Swal.fire({ title: 'غير مصرح', text: 'ليس لديك صلاحية مندوب المبيعات', icon: 'error' }); supabase.auth.signOut(); return; }

                // جلب بيانات المستخدم من users (إذا سمحت RLS)
                if (!isOwner) {
                    supabase.from('users').select('allowed_branch_ids, restrict_to_visit_day, allow_all_customers').eq('email', self.currentUser.email).maybeSingle().then(function(uRes) {
                        var userData = uRes.data || {};
                        self.restrictToVisitDay = (userData.restrict_to_visit_day !== false);
                        self.allowAllCustomers = (userData.allow_all_customers === true);
                        var branches = userData.allowed_branch_ids || [];
                        self.allowedAreas = Array.isArray(branches) ? branches : (typeof branches === 'string' ? branches.split(',') : []);
                        self.enterApp();
                    }).catch(function() { self.enterApp(); });
                } else {
                    self.restrictToVisitDay = false;
                    self.allowAllCustomers = true;
                    self.enterApp();
                }
            }
        });
    },

    enterApp: function() {
        byId('loginScreen').classList.add('hidden');
        byId('mainApp').classList.remove('hidden');
        this.updateConnectionStatus();
        window.addEventListener('online', function() { App.updateConnectionStatus(); });
        window.addEventListener('offline', function() { App.updateConnectionStatus(); });
        this.syncDown().then(function() { App.loadBranches(); });
        this.showView('customers');
    },

    doLogout: function() {
        var self = this;
        supabase.auth.signOut().then(function() {
            self.cart = []; self.selCust = null;
            byId('mainApp').classList.add('hidden');
            byId('loginScreen').classList.remove('hidden');
            byId('loginEmail').value = ''; byId('loginPass').value = ''; byId('loginMsg').classList.add('hidden');
        });
    },

    updateConnectionStatus: function() {
        var dot = byId('connDot'), label = byId('connLabel');
        if (navigator.onLine) { dot.className = 'w-2.5 h-2.5 rounded-full bg-emerald-400'; label.innerText = 'متصل'; }
        else { dot.className = 'w-2.5 h-2.5 rounded-full bg-red-500'; label.innerText = 'غير متصل'; }
    },

    syncDown: function() {
        return Promise.all([
            supabase.from('customers').select('*').then(function(r) { return db.customers.clear().then(function() { return db.customers.bulkPut(r.data || []); }); }),
            supabase.from('items').select('*').then(function(r) { return db.items.clear().then(function() { return db.items.bulkPut(r.data || []); }); }),
            supabase.from('stock_branches').select('*').then(function(r) { return db.stock.clear().then(function() { return db.stock.bulkPut(r.data || []); }); }),
            supabase.from('branches').select('*').then(function(r) { return db.branches.clear().then(function() { return db.branches.bulkPut(r.data || []); }); })
        ]);
    },

    syncData: function() {
        if (!navigator.onLine) { toast('لا يوجد اتصال', 'warning'); return; }
        var self = this;
        Swal.showLoading();
        this.syncDown().then(function() { Swal.close(); self.loadBranches(); toast('تمت المزامنة', 'success'); }).catch(function() { Swal.close(); toast('فشلت المزامنة', 'error'); });
    },

    showView: function(view) {
        var btns = document.querySelectorAll('#bottomNav button');
        for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('text-purple-600'); btns[i].classList.add('text-gray-400'); }
        var activeBtn = byId('nav-' + view);
        if (activeBtn) { activeBtn.classList.remove('text-gray-400'); activeBtn.classList.add('text-purple-600'); }
        if (view === 'customers') this.renderCustomerView();
        else if (view === 'catalog') this.renderCatalogView();
        else if (view === 'review') this.renderReviewView();
        else if (view === 'orders') this.renderOrdersView();
    },

    // ==================== العملاء ====================
    renderCustomerView: function() {
        var html = '<div class="p-4 animate-fadeIn"><h2 class="text-xl font-bold mb-2">عملائي</h2>';
        html += '<p class="text-xs text-gray-400 mb-4">' + (this.restrictToVisitDay ? 'يوم الزيارة: ' + this.todayName : 'جميع العملاء') + '</p>';
        html += '<input type="text" id="custSearch" oninput="App.searchCustomers(this.value)" placeholder="ابحث باسم، كود، هاتف..." class="w-full p-3 bg-white rounded-xl border-2 border-transparent focus:border-purple-600 outline-none font-bold text-sm mb-4">';
        html += '<div id="custResults" class="space-y-2"></div></div>';
        safeHTML(byId('mainContent'), html);
    },

    searchCustomers: function(q) {
        if (!q || !q.trim()) { safeHTML(byId('custResults'), ''); return; }
        var s = q.toLowerCase();
        var self = this;
        db.customers.toArray().then(function(all) {
            var filtered = [];
            for (var i = 0; i < all.length; i++) {
                var c = all[i];
                // ✅ تصفية: تقييد بيوم الزيارة (إذا كان مفعّلاً)
                if (self.restrictToVisitDay && c.visit_day && c.visit_day !== self.todayName) continue;
                if ((c.name || '').toLowerCase().indexOf(s) !== -1 || (c.customer_code || '').toLowerCase().indexOf(s) !== -1 || (c.phone || '').indexOf(s) !== -1 || (c.area || '').toLowerCase().indexOf(s) !== -1) { filtered.push(c); }
                if (filtered.length >= 15) break;
            }
            var html = '';
            if (!filtered.length) { html = '<div class="text-center text-gray-400 p-4">لا توجد نتائج</div>'; }
            else {
                for (var j = 0; j < filtered.length; j++) {
                    var cu = filtered[j];
                    var debtClass = Number(cu.debt) > 0 ? 'text-red-500' : 'text-green-600';
                    html += '<div onclick="App.selectCustomer(\'' + cu.customer_code + '\')" class="bg-white p-4 rounded-xl shadow-sm border cursor-pointer hover:bg-purple-50">';
                    html += '<div class="font-bold">' + (cu.name || '') + '</div><div class="text-xs text-gray-400">' + (cu.customer_code || '') + ' - ' + (cu.area || '') + '</div>';
                    html += '<div class="text-xs ' + debtClass + ' font-bold mt-1">الرصيد: ' + fmtNum(cu.debt) + ' EGP</div></div>';
                }
            }
            safeHTML(byId('custResults'), html);
        });
    },

    selectCustomer: function(code) {
        var self = this;
        db.customers.get(code).then(function(c) {
            if (!c) return;
            self.selCust = c;
            var limit = Number(c.credit_limit) || 0, debt = Number(c.debt) || 0, pct = limit > 0 ? (debt / limit) * 100 : 0;
            var banner = byId('creditBanner');
            if (pct >= 90) { banner.className = 'text-center py-2 text-sm font-bold credit-red'; banner.innerHTML = '⚠️ تحذير: تجاوز الحد الائتماني (' + fmtNum(debt) + ' / ' + fmtNum(limit) + ')'; banner.classList.remove('hidden'); }
            else if (pct >= 60) { banner.className = 'text-center py-2 text-sm font-bold credit-yellow'; banner.innerHTML = 'تنبيه: اقترب من الحد الائتماني (' + fmtNum(debt) + ' / ' + fmtNum(limit) + ')'; banner.classList.remove('hidden'); }
            else { banner.classList.add('hidden'); }
            toast('تم اختيار: ' + (c.name || code), 'success');
        });
    },

    // ==================== المنتجات ====================
    renderCatalogView: function() {
        var html = '<div class="p-4 animate-fadeIn"><h2 class="text-xl font-bold mb-4">المنتجات</h2>';
        html += '<div class="mb-3"><select id="branchSel" onchange="App.onBranchChange(this.value)" class="w-full p-3 bg-white rounded-xl border-2 border-transparent focus:border-purple-600 outline-none font-bold text-sm"><option value="">-- اختر الفرع --</option></select></div>';
        html += '<input type="text" id="itemSearch" oninput="App.searchItems(this.value)" placeholder="ابحث بالاسم أو الباركود..." class="w-full p-3 bg-white rounded-xl border-2 border-transparent focus:border-purple-600 outline-none font-bold text-sm mb-4">';
        html += '<div id="itemResults" class="grid grid-cols-2 gap-2"></div></div>';
        safeHTML(byId('mainContent'), html);
        this.loadBranches();
    },

    loadBranches: function() {
        var self = this;
        db.branches.toArray().then(function(br) {
            self.branchMap = {};
            var html = '<option value="">-- اختر الفرع --</option>';
            for (var i = 0; i < br.length; i++) { self.branchMap[br[i].branch_code] = br[i].id; html += '<option value="' + br[i].branch_code + '">' + (br[i].name || br[i].branch_code) + '</option>'; }
            var sel = byId('branchSel'); if (sel) safeHTML(sel, html);
        });
    },

    onBranchChange: function(v) { this.selBranch = v || null; this.searchItems(byId('itemSearch') ? byId('itemSearch').value : ''); },

    getAvail: function(itemId) {
        var self = this;
        var bid = this.selBranch ? this.branchMap[this.selBranch] : null;
        return db.stock.where('item_id').equals(itemId).toArray().then(function(r) {
            if (bid) { for (var i = 0; i < r.length; i++) { if (r[i].branch_id === bid) return Math.max(0, (Number(r[i].qty) || 0) - (Number(r[i].allocated_qty) || 0)); } return 0; }
            var t = 0; for (var j = 0; j < r.length; j++) t += Math.max(0, (Number(r[j].qty) || 0) - (Number(r[j].allocated_qty) || 0)); return t;
        });
    },

    searchItems: function(q) {
        if (!this.selBranch) { safeHTML(byId('itemResults'), '<div class="col-span-2 text-center text-amber-500 p-4 bg-white rounded-xl">اختر فرعاً أولاً</div>'); return; }
        var self = this;
        db.items.toArray().then(function(all) {
            var filtered = all;
            if (q && q.trim()) { var s = q.toLowerCase(); filtered = []; for (var i = 0; i < all.length; i++) { var it = all[i]; if ((it.name || '').toLowerCase().indexOf(s) !== -1 || (it.item_code || '').toLowerCase().indexOf(s) !== -1 || (it.barcode || '').indexOf(s) !== -1) { filtered.push(it); } } }
            filtered = filtered.slice(0, 24);
            var promises = [];
            for (var j = 0; j < filtered.length; j++) promises.push(self.getAvail(filtered[j].id));
            Promise.all(promises).then(function(avails) {
                var html = '';
                if (!filtered.length) { html = '<div class="col-span-2 text-center text-gray-400 p-4">لا توجد منتجات</div>'; }
                else {
                    for (var k = 0; k < filtered.length; k++) {
                        var it = filtered[k], avail = avails[k];
                        var inCart = 0;
                        for (var x = 0; x < self.cart.length; x++) { if (self.cart[x].code === it.item_code) { inCart = self.cart[x].qty; break; } }
                        var imgSrc = it.image_url || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22150%22%3E%3Crect fill=%22%23e2e8f0%22 width=%22150%22 height=%22150%22/%3E%3Ctext fill=%22%2394a3b8%22 font-family=%22Arial%22 font-size=%2214%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3E📦%3C/text%3E%3C/svg%3E';
                        html += '<div class="bg-white p-3 rounded-2xl shadow-sm border flex flex-col"><div class="w-full h-24 bg-gray-100 rounded-xl mb-2 overflow-hidden"><img src="' + imgSrc + '" class="w-full h-full object-cover cursor-pointer" onerror="this.src=\'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22150%22%3E%3Crect fill=%22%23e2e8f0%22 width=%22150%22 height=%22150%22/%3E%3Ctext fill=%22%2394a3b8%22 font-family=%22Arial%22 font-size=%2214%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3E📦%3C/text%3E%3C/svg%3E\'"></div>';
                        html += '<div class="font-black text-sm text-slate-700 leading-snug mb-1">' + (it.name || '') + '</div><div class="text-[11px] text-slate-400 font-bold mb-2">' + (it.item_code || '') + '</div>';
                        html += '<div class="flex justify-between items-center mt-auto"><div><span class="text-purple-600 font-black">' + fmtNum(it.sales_price) + '</span><span class="text-[10px] text-gray-400 block">متاح: ' + avail + '</span></div>';
                        if (inCart > 0) { html += '<div class="flex items-center gap-1"><button onclick="event.stopPropagation();App.decCart(\'' + it.item_code + '\')" class="w-7 h-7 bg-gray-100 rounded-full font-black">-</button><span class="w-5 text-center font-black">' + inCart + '</span><button onclick="event.stopPropagation();App.addToCart(\'' + it.item_code + '\')" class="w-7 h-7 bg-purple-600 text-white rounded-full font-black">+</button></div>'; }
                        else { html += '<button onclick="event.stopPropagation();App.addToCart(\'' + it.item_code + '\')" class="w-8 h-8 bg-purple-600 text-white rounded-full"><i class="fa-solid fa-plus"></i></button>'; }
                        html += '</div></div>';
                    }
                }
                safeHTML(byId('itemResults'), html);
            });
        });
    },

    addToCart: function(code) {
        var self = this;
        db.items.get(code).then(function(it) {
            if (!it) return;
            self.getAvail(it.id).then(function(avail) {
                var existing = null;
                for (var i = 0; i < self.cart.length; i++) { if (self.cart[i].code === code) { existing = self.cart[i]; break; } }
                var cur = existing ? existing.qty : 0, nq = cur + 1;
                var mx = it.max_qty ? Number(it.max_qty) : 0;
                if (mx > 0 && nq > mx) { toast('الحد الأقصى: ' + mx, 'warning'); return; }
                if (nq > avail) { toast('المتاح: ' + avail, 'warning'); return; }
                if (existing) { existing.qty = nq; }
                else { self.cart.push({ code: it.item_code, name: it.name, price: Number(it.sales_price) || 0, unit: it.unit || 'حبة', qty: 1 }); }
                self.searchItems(byId('itemSearch') ? byId('itemSearch').value : '');
            });
        });
    },

    decCart: function(code) {
        for (var i = 0; i < this.cart.length; i++) { if (this.cart[i].code === code) { this.cart[i].qty--; if (this.cart[i].qty <= 0) this.cart.splice(i, 1); break; } }
        this.searchItems(byId('itemSearch') ? byId('itemSearch').value : '');
    },

    calcTotals: function() {
        var sub = 0;
        for (var i = 0; i < this.cart.length; i++) sub += this.cart[i].price * this.cart[i].qty;
        if (sub === 0) return { sub: 0, del: 0, tax: 0, total: 0 };
        var d = this.delFee, beforeTax = sub + d, tx = Math.round(beforeTax * this.taxRate) / 100;
        return { sub: sub, del: d, tax: tx, total: beforeTax + tx };
    },

    openCart: function() { this.renderCartContent(); byId('cartSheet').classList.add('open'); byId('cartOverlay').classList.add('show'); },
    closeCart: function() { byId('cartSheet').classList.remove('open'); byId('cartOverlay').classList.remove('show'); },

    renderCartContent: function() {
        var html = '';
        for (var i = 0; i < this.cart.length; i++) { var item = this.cart[i]; html += '<div class="flex justify-between items-center bg-white p-3 rounded-xl border mb-2"><div><div class="font-black text-sm">' + item.name + '</div><div class="text-xs text-gray-400">' + fmtNum(item.price) + ' × ' + item.qty + '</div></div><div class="flex items-center gap-1"><button onclick="App.decCart(\'' + item.code + '\');App.renderCartContent()" class="w-7 h-7 bg-gray-100 rounded-full font-black">-</button><span class="w-5 text-center font-black">' + item.qty + '</span><button onclick="App.addToCart(\'' + item.code + '\');App.renderCartContent()" class="w-7 h-7 bg-purple-600 text-white rounded-full font-black">+</button></div></div>'; }
        safeHTML(byId('cartBody'), html || '<div class="text-center text-gray-400 p-4">السلة فارغة</div>');
    },

    goToReview: function() { this.showView('review'); },

    // ==================== المراجعة والحفظ ====================
    renderReviewView: function() {
        var self = this;
        var t = this.calcTotals();
        var html = '<div class="p-4 animate-fadeIn"><h2 class="text-xl font-bold mb-4">مراجعة الأوردر</h2>';
        if (this.selCust) { html += '<div class="bg-purple-50 p-4 rounded-2xl mb-4"><div class="font-black text-purple-800">' + (this.selCust.name || '') + '</div><div class="text-sm text-purple-600">' + (this.selCust.customer_code || '') + ' - ' + (this.selCust.area || '') + '</div></div>'; }
        html += '<div class="bg-white p-4 rounded-2xl shadow-sm border mb-4"><h3 class="font-bold text-sm text-gray-500 mb-3">الأصناف</h3>';
        if (!this.cart.length) { html += '<div class="text-center text-gray-400 py-4">السلة فارغة</div>'; }
        else { for (var i = 0; i < this.cart.length; i++) { var item = this.cart[i]; var lineTotal = item.price * item.qty; html += '<div class="flex items-center justify-between py-3 border-b last:border-b-0"><div class="flex-1 min-w-0"><div class="font-black text-sm text-gray-800">' + item.name + '</div><div class="text-xs text-gray-400">' + fmtNum(item.price) + ' × ' + item.qty + ' = <span class="font-bold text-purple-600">' + fmtNum(lineTotal) + '</span></div></div><div class="flex items-center gap-2 mr-3"><button onclick="App.decCart(\'' + item.code.replace(/'/g, "\\'") + '\');App.renderReviewView();" class="w-8 h-8 bg-gray-100 hover:bg-gray-200 rounded-full font-black text-gray-600 flex items-center justify-center text-sm">−</button><span class="w-6 text-center font-black text-sm">' + item.qty + '</span><button onclick="App.addToCart(\'' + item.code.replace(/'/g, "\\'") + '\');App.renderReviewView();" class="w-8 h-8 bg-purple-600 hover:bg-purple-700 rounded-full font-black text-white flex items-center justify-center text-sm">+</button></div></div>'; } }
        html += '</div><div class="bg-white p-4 rounded-2xl shadow-sm border space-y-2"><div class="flex justify-between"><span>المجموع:</span><span>' + fmtNum(t.sub) + '</span></div><div class="flex justify-between"><span>التوصيل:</span><span class="text-purple-600">' + fmtNum(t.del) + '</span></div><div class="flex justify-between"><span>الضريبة:</span><span class="text-red-600">' + fmtNum(t.tax) + '</span></div><div class="flex justify-between font-black text-lg pt-2 border-t"><span>الإجمالي:</span><span class="text-emerald-600">' + fmtNum(t.total) + '</span></div></div>';
        html += '<button onclick="App.submitOrder()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-black mt-4">حفظ الأوردر</button></div>';
        safeHTML(byId('mainContent'), html);
    },

    submitOrder: function() {
        if (!this.selCust) { toast('اختر عميلاً', 'warning'); return; }
        if (!this.cart.length) { toast('السلة فارغة', 'warning'); return; }
        if (!this.selBranch) { toast('اختر فرعاً', 'warning'); return; }
        var t = this.calcTotals();
        if (this.minAmt > 0 && t.total < this.minAmt) { toast('الحد الأدنى للفاتورة: ' + fmtNum(this.minAmt), 'warning'); return; }
        var items = []; for (var i = 0; i < this.cart.length; i++) { items.push({ code: this.cart[i].code, name: this.cart[i].name, price: this.cart[i].price, qty: this.cart[i].qty, unit: this.cart[i].unit }); }
        var hdr = { customer_code: this.selCust.customer_code, custName: this.selCust.name, area: this.selCust.area || '', total: t.total, deliveryFees: t.del, status: 'Confirmed', paymentType: this.selCust.payment_type || 'أجل', taxAmount: t.tax, taxRate: this.taxRate };
        var self = this;
        Swal.showLoading();
        supabase.auth.getSession().then(function(ses) { var token = (ses && ses.data && ses.data.session) ? ses.data.session.access_token : null; return fetch(SUPABASE_URL + '/functions/v1/save-sales-invoice', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token }, body: JSON.stringify({ orderHeader: hdr, itemsList: items, branchCode: self.selBranch }) }); }).then(function(r) { return r.json(); }).then(function(json) { Swal.close(); if (json.success) { toast('تم الحفظ: ' + (json.orderID || ''), 'success'); self.cart = []; self.selCust = null; byId('creditBanner').classList.add('hidden'); self.showView('customers'); } else { toast(json.msg || 'فشل الحفظ', 'error'); } }).catch(function() { Swal.close(); toast('فشل الاتصال', 'error'); });
    },

    // ==================== أوردراتي ====================
    renderOrdersView: function() {
        var self = this;
        var html = '<div class="p-4 animate-fadeIn"><h2 class="text-xl font-bold mb-4">أوردراتي</h2>';
        html += '<div class="bg-white p-3 rounded-2xl shadow-sm border mb-4"><div class="flex gap-2 flex-wrap"><select id="orderStatusFilter" onchange="App.renderOrdersList()" class="p-2 bg-gray-50 border rounded-lg text-sm font-bold"><option value="">كل الحالات</option><option value="Draft">مسودة</option><option value="Confirmed">مؤكد</option><option value="Pending">قيد الانتظار</option><option value="Invoiced">مفوتر</option><option value="Delivered">تم التوصيل</option><option value="Cancelled">ملغي</option></select><input type="date" id="orderDateFilter" onchange="App.renderOrdersList()" class="p-2 bg-gray-50 border rounded-lg text-sm font-bold"><button onclick="byId(\'orderStatusFilter\').value=\'\';byId(\'orderDateFilter\').value=\'\';App.renderOrdersList();" class="p-2 bg-gray-100 border rounded-lg text-sm font-bold">إعادة تعيين</button></div></div>';
        html += '<div id="ordersListContainer" class="space-y-3"><div class="text-center text-gray-400 py-8">جاري التحميل...</div></div></div>';
        safeHTML(byId('mainContent'), html);
        this.renderOrdersList();
    },

    renderOrdersList: function() {
        var self = this;
        var container = byId('ordersListContainer'); if (!container) return;
        safeHTML(container, '<div class="text-center text-gray-400 py-8">جاري التحميل...</div>');
        var query = supabase.from('orders').select('*').eq('created_by', this.currentUser.email).order('order_date', { ascending: false }).limit(50);
        var st = byId('orderStatusFilter') ? byId('orderStatusFilter').value : '';
        var dt = byId('orderDateFilter') ? byId('orderDateFilter').value : '';
        if (st) query = query.eq('order_status', st);
        if (dt) query = query.eq('order_date', dt);
        query.then(function(res) {
            var orders = res.data || [];
            if (!orders.length) { safeHTML(container, '<div class="text-center text-gray-400 py-8 bg-white rounded-2xl">لا توجد أوردرات</div>'); return; }
            var html = '';
            for (var i = 0; i < orders.length; i++) {
                var o = orders[i]; var sc = '', sl = o.order_status || '';
                if (o.order_status === 'Draft') { sc = 'bg-yellow-100 text-yellow-700'; sl = 'مسودة'; }
                else if (o.order_status === 'Confirmed') { sc = 'bg-blue-100 text-blue-700'; sl = 'مؤكد'; }
                else if (o.order_status === 'Pending') { sc = 'bg-purple-100 text-purple-700'; sl = 'قيد الانتظار'; }
                else if (o.order_status === 'Invoiced') { sc = 'bg-green-100 text-green-700'; sl = 'مفوتر'; }
                else if (o.order_status === 'Delivered') { sc = 'bg-emerald-100 text-emerald-700'; sl = 'تم التوصيل'; }
                else if (o.order_status === 'Cancelled') { sc = 'bg-red-100 text-red-700'; sl = 'ملغي'; }
                else { sc = 'bg-gray-100 text-gray-700'; }
                html += '<div onclick="App.showOrderDetail(\'' + o.id + '\')" class="bg-white p-4 rounded-2xl shadow-sm border cursor-pointer hover:bg-purple-50 transition"><div class="flex justify-between items-start mb-2"><div><span class="font-black text-purple-600 text-sm">' + (o.order_code || '') + '</span><span class="text-xs text-gray-400 mr-2">' + (o.order_date ? new Date(o.order_date).toLocaleDateString('ar-EG') : '') + '</span></div><span class="px-2 py-1 rounded-full text-xs font-bold ' + sc + '">' + sl + '</span></div><div class="flex justify-between items-center"><div><span class="font-bold text-sm">' + (o.customer_name || '') + '</span><span class="text-xs text-gray-400 mr-2">' + (o.area || '') + '</span></div><span class="font-black text-emerald-600 text-sm">' + fmtNum(o.total_amount) + ' EGP</span></div>';
                if (o.order_status === 'Draft') { html += '<div class="flex gap-2 mt-2 pt-2 border-t"><button onclick="event.stopPropagation();App.confirmOrder(\'' + o.order_code + '\')" class="flex-1 bg-blue-600 text-white text-xs py-1.5 rounded-lg font-bold">تأكيد</button><button onclick="event.stopPropagation();App.cancelOrder(\'' + o.order_code + '\')" class="flex-1 bg-red-100 text-red-600 text-xs py-1.5 rounded-lg font-bold">إلغاء</button></div>'; }
                else if (o.order_status === 'Confirmed') { html += '<div class="flex gap-2 mt-2 pt-2 border-t"><button onclick="event.stopPropagation();App.cancelOrder(\'' + o.order_code + '\')" class="flex-1 bg-red-100 text-red-600 text-xs py-1.5 rounded-lg font-bold">إلغاء</button></div>'; }
                html += '</div>';
            }
            safeHTML(container, html);
        }).catch(function() { safeHTML(container, '<div class="text-center text-red-400 py-8 bg-white rounded-2xl">فشل تحميل الأوردرات</div>'); });
    },

    showOrderDetail: function(orderId) {
        Swal.showLoading();
        supabase.from('orders').select('*').eq('id', orderId).single().then(function(oRes) {
            var order = oRes.data; if (!order) { Swal.close(); toast('الأوردر غير موجود', 'error'); return; }
            supabase.from('order_details').select('*').eq('order_id', order.id).then(function(dRes) {
                Swal.close(); var details = dRes.data || [];
                var sl = order.order_status || '';
                if (order.order_status === 'Draft') sl = 'مسودة'; else if (order.order_status === 'Confirmed') sl = 'مؤكد'; else if (order.order_status === 'Pending') sl = 'قيد الانتظار'; else if (order.order_status === 'Invoiced') sl = 'مفوتر'; else if (order.order_status === 'Delivered') sl = 'تم التوصيل'; else if (order.order_status === 'Cancelled') sl = 'ملغي';
                var html = '<div class="text-right"><div class="bg-gray-50 p-4 rounded-xl mb-4"><div class="flex justify-between mb-2"><span class="font-black text-lg">' + (order.order_code || '') + '</span><span class="text-sm font-bold">' + sl + '</span></div><p><strong>العميل:</strong> ' + (order.customer_name || '') + '</p><p><strong>المنطقة:</strong> ' + (order.area || '') + '</p><p><strong>التاريخ:</strong> ' + (order.order_date ? new Date(order.order_date).toLocaleDateString('ar-EG') : '') + '</p><p><strong>طريقة الدفع:</strong> ' + (order.payment_type || '') + '</p></div>';
                if (details.length > 0) { html += '<div class="overflow-x-auto"><table class="w-full text-sm border"><thead class="bg-gray-100"><tr><th class="p-2">الصنف</th><th class="p-2 text-center">الكمية</th><th class="p-2 text-center">السعر</th><th class="p-2 text-center">الإجمالي</th></tr></thead><tbody>'; var total = 0; for (var i = 0; i < details.length; i++) { var d = details[i]; var lt = Number(d.line_amount) || (Number(d.qty) * Number(d.unit_price)); total += lt; html += '<tr><td class="p-2 font-semibold">' + (d.item_name || '') + '</td><td class="p-2 text-center">' + d.qty + '</td><td class="p-2 text-center">' + fmtNum(d.unit_price) + '</td><td class="p-2 text-center font-bold">' + fmtNum(lt) + '</td></tr>'; } html += '</tbody></table></div><div class="mt-3 text-left font-bold text-lg">الإجمالي: ' + fmtNum(order.total_amount || total) + ' EGP</div>'; }
                Swal.fire({ title: 'تفاصيل الأوردر', html: html, width: '700px', showCloseButton: true, showConfirmButton: false });
            });
        }).catch(function() { Swal.close(); });
    },

    confirmOrder: function(orderCode) {
        var self = this;
        Swal.fire({ title: 'تأكيد الأوردر', text: 'تحويل ' + orderCode + ' إلى مؤكد؟', icon: 'question', showCancelButton: true, confirmButtonText: 'تأكيد', cancelButtonText: 'إلغاء' }).then(function(cf) { if (!cf.isConfirmed) return; Swal.showLoading(); supabase.auth.getSession().then(function(ses) { var t = ses.data.session && ses.data.session.access_token; return fetch(SUPABASE_URL + '/functions/v1/confirm-order', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + t }, body: JSON.stringify({ order_code: orderCode }) }).then(function(r) { return r.json(); }); }).then(function(json) { Swal.close(); if (json.success) { toast('تم التأكيد', 'success'); self.renderOrdersList(); } else toast(json.msg || 'فشل التأكيد', 'error'); }).catch(function() { Swal.close(); toast('فشل الاتصال', 'error'); }); });
    },

    cancelOrder: function(orderCode) {
        var self = this;
        Swal.fire({ title: 'إلغاء الأوردر', text: 'إلغاء ' + orderCode + '؟', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'نعم', cancelButtonText: 'تراجع' }).then(function(cf) { if (!cf.isConfirmed) return; Swal.showLoading(); supabase.auth.getSession().then(function(ses) { var t = ses.data.session && ses.data.session.access_token; return fetch(SUPABASE_URL + '/functions/v1/delete-order', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + t }, body: JSON.stringify({ order_code: orderCode }) }).then(function(r) { return r.json(); }); }).then(function(json) { Swal.close(); if (json.success) { toast('تم الإلغاء', 'success'); self.renderOrdersList(); } else toast(json.msg || 'فشل الإلغاء', 'error'); }).catch(function() { Swal.close(); toast('فشل الاتصال', 'error'); }); });
    }
};

// ============================================================
// بدء التشغيل
// ============================================================
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('../sw.js').catch(function() {}); }
document.addEventListener('DOMContentLoaded', function() { App.init(); });
</script>
