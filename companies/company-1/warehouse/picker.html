<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>محضّر | الروائع ERP</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Tahoma,sans-serif;background:#f1f5f9;-webkit-tap-highlight-color:transparent}
        .auth-container{background:linear-gradient(135deg,#312e81 0%,#4338ca 40%,#4f46e5 100%)}
        .input-field:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,0.1)}
        .card{background:#fff;border-radius:20px;padding:1.25rem;box-shadow:0 4px 15px rgba(0,0,0,0.05)}
        .btn-primary{background:#4f46e5;color:#fff;padding:0.75rem 1.5rem;border-radius:12px;font-weight:700;border:none;cursor:pointer;width:100%}
        .btn-primary:active{background:#4338ca}
        .pulse{animation:pulse 2s infinite}
        @keyframes pulse{0%{opacity:1}50%{opacity:0.6}100%{opacity:1}}
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<!-- ============================================================ -->
<!-- شاشة الدخول -->
<!-- ============================================================ -->
<div id="loginScreen" class="fixed inset-0 z-[100] flex items-center justify-center auth-container p-4">
    <div class="bg-white rounded-[32px] shadow-2xl p-6 w-[92%] max-w-md">
        <div class="text-center mb-6">
            <div class="w-20 h-20 bg-gradient-to-br from-indigo-600 to-indigo-800 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4"><i class="fa-solid fa-clipboard-list text-white text-3xl"></i></div>
            <h1 class="font-black text-2xl text-gray-800">الروائع</h1><p class="text-xs text-gray-400 font-bold mt-1">المحضّر</p>
        </div>
        <h2 class="text-lg font-bold text-gray-700 text-center mb-4">تسجيل الدخول</h2>
        <div class="space-y-3">
            <div><label class="block text-xs font-bold text-gray-600 mb-1">البريد الإلكتروني</label><input id="loginEmail" type="email" placeholder="example@domain.com" class="input-field w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-200 focus:border-indigo-600 focus:bg-white outline-none font-bold text-sm"></div>
            <div><label class="block text-xs font-bold text-gray-600 mb-1">كلمة السر</label><div class="relative"><input id="loginPass" type="password" placeholder="••••••••" class="input-field w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-200 focus:border-indigo-600 focus:bg-white outline-none font-bold text-sm pr-12"><button type="button" onclick="App.togglePass()" class="absolute left-2 top-1/2 -translate-y-1/2 p-2 text-gray-400"><i id="passIcon" class="fa-solid fa-eye"></i></button></div></div>
        </div>
        <button onclick="App.doLogin()" class="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 text-white py-3.5 rounded-xl font-black text-sm shadow-lg mt-4">تسجيل الدخول</button>
        <p id="loginMsg" class="text-center text-xs text-red-500 font-bold mt-3 hidden"></p>
    </div>
</div>

<!-- ============================================================ -->
<!-- التطبيق الرئيسي -->
<!-- ============================================================ -->
<div id="mainApp" class="hidden flex flex-col h-full">
    <header class="bg-indigo-700 text-white p-4 flex items-center justify-between sticky top-0 z-30 shadow-md flex-shrink-0">
        <span class="font-black text-sm">📋 المحضّر</span>
        <div class="flex items-center gap-2"><span class="text-xs font-bold" id="headerUserName"></span><button onclick="App.doLogout()" class="bg-white/10 w-8 h-8 rounded-full"><i class="fa-solid fa-arrow-right-from-bracket text-xs"></i></button></div>
    </header>

    <div class="flex gap-1 p-2 bg-white border-b overflow-x-auto flex-shrink-0">
        <button onclick="App.switchTab('pending')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm bg-indigo-600 text-white" id="tab-pending">📋 قيد التحضير</button>
        <button onclick="App.switchTab('completed')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm text-gray-500" id="tab-completed">✅ مكتملة</button>
        <button onclick="App.switchTab('account')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm text-gray-500" id="tab-account">⚙️ حسابي</button>
    </div>

    <main id="mainContent" class="flex-1 overflow-y-auto p-4"></main>
</div>

<script>
var SUPABASE_URL = 'https://fiilmooggumokxanwiyx.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpaWxtb29nZ3Vtb2t4YW53aXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDkwOTIsImV4cCI6MjA5NDI4NTA5Mn0.LZScCxnCiRrTSCCBmTryszQpY1AwBgR2dkTBbC5kOc4';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var db = new Dexie('RW_Picker');
db.version(1).stores({ runsheets: 'runsheet_code', details: '++id,runsheet_code', session: 'runsheet_code' });

function byId(id) { return document.getElementById(id); }
function safeText(el, text) { if (el) el.textContent = text; }
function safeHTML(el, html) { if (el) el.innerHTML = html; }
function toast(m, t) { Swal.fire({ toast: true, position: 'top', icon: t || 'info', title: m, showConfirmButton: false, timer: 2000 }); }

var App = {
    currentUser: null, currentTab: 'pending', currentRS: null, session: null, timerInterval: null,

    togglePass: function(){var p=byId('loginPass'),i=byId('passIcon');if(p.type==='password'){p.type='text';i.className='fa-solid fa-eye-slash';}else{p.type='password';i.className='fa-solid fa-eye';}},
    doLogin: function(){var e=byId('loginEmail').value.trim(),p=byId('loginPass').value.trim();if(!e||!p){byId('loginMsg').innerText='أدخل البريد الإلكتروني وكلمة المرور';byId('loginMsg').classList.remove('hidden');return;}byId('loginMsg').classList.add('hidden');var s=this;Swal.showLoading();supabase.auth.signInWithPassword({email:e,password:p}).then(function(r){Swal.close();if(r.error){byId('loginMsg').innerText=r.error.message;byId('loginMsg').classList.remove('hidden');}else{s.init();}}).catch(function(){Swal.close();byId('loginMsg').innerText='فشل الاتصال';byId('loginMsg').classList.remove('hidden');});},

    init: function() {
        var self = this;
        supabase.auth.getSession().then(function(res) {
            if (res.data && res.data.session) {
                self.currentUser = res.data.session.user;
                var meta = self.currentUser.user_metadata || {};
                var isOwner = (meta.isOwner === true || meta.isOwner === 'true' || meta.role === 'owner' || meta.role === 'مالك');
                var perms = meta.permissions || [];
                var hasAccess = isOwner || (Array.isArray(perms) && perms.indexOf('warehouse') !== -1);

                if (!hasAccess) {
                    Swal.fire({ title: 'غير مصرح', text: 'ليس لديك صلاحية المخازن', icon: 'error' });
                    supabase.auth.signOut();
                    return;
                }

                var userName = meta.name || self.currentUser.email;

                if (isOwner) {
                    safeText(byId('headerUserName'), userName);
                    self.enterApp();
                    return;
                }

                supabase.from('users').select('active_warehouse_role, name').eq('email', self.currentUser.email).maybeSingle().then(function(uRes) {
                    var userData = uRes.data || {};
                    var activeRole = userData.active_warehouse_role || '';
                    userName = userData.name || userName;

                    if (activeRole !== 'تحضير') {
                        Swal.fire({ title: 'تنبيه', text: 'دورك النشط حالياً هو "' + (activeRole || 'غير محدد') + '". الرجاء التواصل مع مشرف المخازن لتعيينك كمحضّر.', icon: 'warning' });
                        supabase.auth.signOut();
                        return;
                    }
                    safeText(byId('headerUserName'), userName);
                    self.enterApp();
                }).catch(function() {
                    console.warn('تعذر جلب active_warehouse_role من users (RLS). استخدام user_metadata.');
                    var metaRole = meta.active_warehouse_role || '';
                    if (metaRole !== 'تحضير' && !isOwner) {
                        Swal.fire({ title: 'تنبيه', text: 'تعذر التحقق من دورك النشط.', icon: 'warning' });
                        supabase.auth.signOut();
                        return;
                    }
                    safeText(byId('headerUserName'), userName);
                    self.enterApp();
                });
            }
        });
    },

    enterApp: function() {
        byId('loginScreen').classList.add('hidden');
        byId('mainApp').classList.remove('hidden');
        this.checkSession();
    },

    checkSession: function() {
        var self = this;
        db.session.toArray().then(function(sessions) {
            if (sessions.length > 0 && sessions[0].runsheet_code) {
                var s = sessions[0];
                Swal.fire({
                    title: 'جلسة سابقة',
                    text: 'لديك جلسة تحضير سابقة للرانشيت ' + s.runsheet_code + '. هل تريد استئنافها؟',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: 'نعم، استئناف',
                    cancelButtonText: 'لا، ابدأ من جديد'
                }).then(function(r) {
                    if (r.isConfirmed) {
                        self.session = s;
                        self.renderActiveSession();
                    } else {
                        db.session.clear();
                        self.switchTab('pending');
                    }
                });
            } else {
                self.switchTab('pending');
            }
        });
    },

    switchTab: function(tab) {
        this.currentTab = tab;
        var tabs = ['pending', 'completed', 'account'];
        for (var i = 0; i < tabs.length; i++) {
            var btn = byId('tab-' + tabs[i]);
            if (btn) { btn.classList.remove('bg-indigo-600', 'text-white'); btn.classList.add('text-gray-500'); }
        }
        var activeBtn = byId('tab-' + tab);
        if (activeBtn) { activeBtn.classList.add('bg-indigo-600', 'text-white'); activeBtn.classList.remove('text-gray-500'); }

        if (tab === 'pending') this.loadPending();
        else if (tab === 'completed') this.loadCompleted();
        else if (tab === 'account') this.renderAccount();
    },

    // ==================== تبويب قيد التحضير ====================
    loadPending: function() {
        var self = this;
        safeHTML(byId('mainContent'), '<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>');

        supabase.from('runsheets').select('runsheet_code,driver_id,status,run_date').in('status', ['Open', 'Picking']).order('run_date', { ascending: false }).then(function(res) {
            var runsheets = res.data || [];
            var html = '<div class="mb-4"><input type="text" id="searchRunsheet" placeholder="🔍 بحث عن رانشيت..." class="w-full p-3 bg-white rounded-xl border-2 border-gray-200 focus:border-indigo-600 outline-none font-bold text-sm" oninput="App.filterRunsheets()"></div>';
            html += '<h2 class="text-lg font-black mb-4">📋 الرانشيتات المعلقة</h2>';
            html += '<div id="runsheetList"></div>';
            safeHTML(byId('mainContent'), html);
            window._pendingRunsheets = runsheets;
            self.renderRunsheetList(runsheets);
        }).catch(function() {
            safeHTML(byId('mainContent'), '<div class="text-center py-10 text-red-500">فشل التحميل</div>');
        });
    },

    filterRunsheets: function() {
        var q = (byId('searchRunsheet') ? byId('searchRunsheet').value : '').toLowerCase();
        var all = window._pendingRunsheets || [];
        var filtered = all;
        if (q) {
            filtered = all.filter(function(rs) { return (rs.runsheet_code || '').toLowerCase().indexOf(q) !== -1; });
        }
        this.renderRunsheetList(filtered);
    },

    renderRunsheetList: function(list) {
        if (!list || !list.length) {
            safeHTML(byId('runsheetList'), '<div class="text-center py-10 text-gray-400"><i class="fa-solid fa-clipboard-check text-4xl mb-3"></i><p>لا توجد رانشيتات</p></div>');
            return;
        }
        var html = '';
        for (var i = 0; i < list.length; i++) {
            var rs = list[i];
            var isOpen = rs.status === 'Open';
            html += '<div class="card mb-3"><div class="flex justify-between items-center" onclick="App.openRunsheet(\'' + rs.runsheet_code + '\')"><div><span class="font-bold text-lg">' + rs.runsheet_code + '</span><p class="text-xs text-gray-400">' + rs.run_date + ' | السائق: ' + (rs.driver_id || '---') + '</p></div><i class="fa-solid fa-chevron-left text-gray-400"></i></div></div>';
        }
        safeHTML(byId('runsheetList'), html);
    },

    // ==================== فتح رانشيت (بدون بدء) ====================
    openRunsheet: function(code) {
        var self = this;
        safeHTML(byId('mainContent'), '<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>');
        supabase.from('runsheets').select('*').eq('runsheet_code', code).maybeSingle().then(function(rsRes) {
            if (!rsRes.data) { toast('الرانشيت غير موجود', 'error'); self.loadPending(); return; }
            var rs = rsRes.data;
            supabase.from('run_sheet_details').select('*').eq('runsheet_id', rs.id).then(function(detRes) {
                var items = detRes.data || [];
                var html = '<div class="flex items-center gap-2 mb-4"><button onclick="App.loadPending()" class="text-indigo-600"><i class="fa-solid fa-arrow-right text-xl"></i></button><span class="font-black text-lg">' + code + '</span></div>';
                html += '<p class="text-xs text-gray-500 mb-4">اضغط على الصنف لرؤية التفاصيل</p>';

                for (var i = 0; i < items.length; i++) {
                    var it = items[i];
                    html += '<div class="card mb-2 cursor-pointer" onclick="App.showItemDetail(\'' + it.item_code + '\', \'' + (it.item_name || '').replace(/'/g, "\\'") + '\', \'' + (it.unit || 'حبة') + '\', ' + (it.qty_ordered || 0) + ', \'' + (it.description || '').replace(/'/g, "\\'") + '\')">';
                    html += '<div class="flex items-center gap-3"><div class="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-box"></i></div><div><p class="font-bold text-sm">' + (it.item_name || '') + '</p><p class="text-xs text-gray-400">' + (it.unit || 'حبة') + ' | الكمية: ' + (it.qty_ordered || 0) + '</p></div></div></div>';
                }

                if (rs.status === 'Open') {
                    html += '<button onclick="App.startPicking(\'' + code + '\')" class="btn-primary mt-4"><i class="fa-solid fa-play ml-2"></i> بدء التحضير</button>';
                } else if (rs.status === 'Picking') {
                    html += '<button onclick="App.resumePicking(\'' + code + '\')" class="btn-primary mt-4"><i class="fa-solid fa-play ml-2"></i> متابعة التحضير</button>';
                }

                safeHTML(byId('mainContent'), html);
            });
        });
    },

    // ==================== تفاصيل صنف (Modal) ====================
    showItemDetail: function(code, name, unit, qty, desc) {
        var html = '<div class="text-right"><p class="font-bold text-lg mb-2">' + name + '</p><p class="text-xs text-gray-400 mb-2">الكود: ' + code + '</p><p class="text-sm mb-2">الوحدة: <strong>' + unit + '</strong></p><p class="text-sm mb-2">الكمية المطلوبة: <strong>' + qty + '</strong></p><p class="text-sm text-gray-500">' + (desc || 'لا يوجد وصف') + '</p></div>';
        Swal.fire({ title: 'تفاصيل الصنف', html: html, width: '400px', showCloseButton: true, showConfirmButton: false });
    },

    // ==================== بدء التحضير ====================
    startPicking: function(code) {
        var self = this;
        Swal.showLoading();
        supabase.auth.getSession().then(function(se) {
            var t = se.data.session ? se.data.session.access_token : null;
            return fetch(SUPABASE_URL + '/functions/v1/start-picking', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + t }, body: JSON.stringify({ runsheet_code: code }) });
        }).then(function(r) { return r.json(); }).then(function(j) {
            Swal.close();
            if (!j.success) { toast(j.msg || 'فشل بدء التحضير', 'error'); return; }
            self.createSession(code);
        }).catch(function() { Swal.close(); toast('فشل الاتصال', 'error'); });
    },

    createSession: function(code) {
        var self = this;
        supabase.from('run_sheet_details').select('*').eq('runsheet_code', code).then(function(detRes) {
            var items = detRes.data || [];
            var session = { runsheet_code: code, start_time: new Date().toISOString(), items: [] };
            for (var i = 0; i < items.length; i++) {
                session.items.push({
                    item_code: items[i].item_code,
                    item_name: items[i].item_name || '',
                    unit: items[i].unit || 'حبة',
                    qty_ordered: items[i].qty_ordered || 0,
                    qty_picked: items[i].qty_ordered || 0,
                    notes: ''
                });
            }
            db.session.clear().then(function() {
                db.session.put(session).then(function() {
                    self.session = session;
                    self.renderActiveSession();
                });
            });
        });
    },

    // ==================== استئناف جلسة ====================
    resumePicking: function(code) {
        var self = this;
        db.session.get(code).then(function(s) {
            if (s) {
                self.session = s;
                self.renderActiveSession();
            } else {
                self.createSession(code);
            }
        });
    },

    // ==================== شاشة الجلسة النشطة ====================
    renderActiveSession: function() {
        var self = this;
        if (!this.session) { this.loadPending(); return; }
        var s = this.session;
        var elapsed = '00:00';
        if (s.start_time) {
            var diff = Math.floor((new Date() - new Date(s.start_time)) / 1000);
            var m = Math.floor(diff / 60), sec = diff % 60;
            elapsed = String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
        }

        var html = '<div class="flex items-center justify-between mb-4"><span class="font-black text-lg">' + s.runsheet_code + '</span><span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold pulse">⏱️ ' + elapsed + '</span></div>';
        html += '<p class="text-xs text-gray-500 mb-4">اضغط على الصنف لإدخال الكمية المحضّرة</p>';

        for (var i = 0; i < s.items.length; i++) {
            var it = s.items[i];
            html += '<div class="card mb-2 cursor-pointer" onclick="App.editPickedItem(' + i + ')"><div class="flex items-center justify-between"><div><p class="font-bold text-sm">' + (it.item_name || '') + '</p><p class="text-xs text-gray-400">' + (it.unit || 'حبة') + ' | مطلوب: ' + (it.qty_ordered || 0) + ' | محضّر: <span class="font-bold text-indigo-600">' + (it.qty_picked || 0) + '</span></p>' + (it.notes ? '<p class="text-xs text-amber-600 mt-1">📝 ' + it.notes + '</p>' : '') + '</div><i class="fa-solid fa-pen text-gray-400 text-xs"></i></div></div>';
        }
        html += '<button onclick="App.completePicking()" class="btn-primary mt-4"><i class="fa-solid fa-check ml-2"></i> إنهاء التحضير</button>';
        safeHTML(byId('mainContent'), html);
        this.startTimer();
    },

    startTimer: function() {
        var self = this;
        if (this.timerInterval) clearInterval(this.timerInterval);
        this.timerInterval = setInterval(function() {
            if (self.session && self.session.start_time) {
                var diff = Math.floor((new Date() - new Date(self.session.start_time)) / 1000);
                var m = Math.floor(diff / 60), sec = diff % 60;
                var el = document.querySelector('.pulse');
                if (el) safeText(el, '⏱️ ' + String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0'));
            }
        }, 1000);
    },

    // ==================== تعديل كمية محضّرة ====================
    editPickedItem: function(index) {
        var self = this;
        var it = this.session.items[index];
        Swal.fire({
            title: it.item_name,
            html: '<div class="text-right"><p class="text-sm text-gray-500 mb-2">الكمية المطلوبة: <strong>' + it.qty_ordered + '</strong></p><label class="block text-xs font-bold mb-1">الكمية المحضّرة</label><input id="swal-qty" type="number" class="swal2-input" value="' + it.qty_picked + '" min="0" max="' + it.qty_ordered + '"><label class="block text-xs font-bold mb-1 mt-3">ملاحظات</label><input id="swal-notes" class="swal2-input" value="' + (it.notes || '') + '" placeholder="سبب النقص..."></div>',
            showCancelButton: true,
            confirmButtonText: 'حفظ',
            cancelButtonText: 'إلغاء',
            preConfirm: function() {
                return { qty: parseInt(document.getElementById('swal-qty').value) || 0, notes: document.getElementById('swal-notes').value.trim() };
            }
        }).then(function(r) {
            if (r.isConfirmed) {
                self.session.items[index].qty_picked = r.value.qty;
                self.session.items[index].notes = r.value.notes;
                db.session.put(self.session).then(function() {
                    self.renderActiveSession();
                });
            }
        });
    },

    // ==================== إنهاء التحضير ====================
    completePicking: function() {
        var self = this;
        if (!this.session) return;
        var items = [];
        for (var i = 0; i < this.session.items.length; i++) {
            items.push({ itemCode: this.session.items[i].item_code, pickedQty: this.session.items[i].qty_picked, notes: this.session.items[i].notes });
        }
        Swal.showLoading();
        supabase.auth.getSession().then(function(se) {
            var t = se.data.session ? se.data.session.access_token : null;
            return fetch(SUPABASE_URL + '/functions/v1/complete-picking', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + t }, body: JSON.stringify({ runsheet_code: self.session.runsheet_code, items: items }) });
        }).then(function(r) { return r.json(); }).then(function(j) {
            Swal.close();
            if (j.success) {
                toast('تم إنهاء التحضير بنجاح', 'success');
                db.session.clear();
                self.session = null;
                if (self.timerInterval) clearInterval(self.timerInterval);
                self.loadPending();
            } else {
                toast(j.msg || 'فشل إنهاء التحضير', 'error');
            }
        }).catch(function() { Swal.close(); toast('فشل الاتصال', 'error'); });
    },

    // ==================== تبويب مكتملة ====================
    loadCompleted: function() {
        var self = this;
        safeHTML(byId('mainContent'), '<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>');
        supabase.from('runsheets').select('runsheet_code,run_date').eq('status', 'Picked').order('run_date', { ascending: false }).limit(30).then(function(res) {
            var list = res.data || [];
            if (!list.length) {
                safeHTML(byId('mainContent'), '<div class="text-center py-10 text-gray-400"><i class="fa-solid fa-check-circle text-4xl mb-3"></i><p>لا توجد رانشيتات مكتملة</p></div>');
                return;
            }
            var html = '<h2 class="text-lg font-black mb-4">✅ الرانشيتات المكتملة</h2>';
            for (var i = 0; i < list.length; i++) {
                html += '<div class="card mb-3"><div class="flex justify-between items-center"><div><span class="font-bold text-lg">' + list[i].runsheet_code + '</span><p class="text-xs text-gray-400">' + list[i].run_date + '</p></div><span class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-xs font-bold">✓ مكتمل</span></div></div>';
            }
            safeHTML(byId('mainContent'), html);
        });
    },

    // ==================== تبويب حسابي ====================
    renderAccount: function() {
        var html = '<h2 class="text-lg font-black mb-4">⚙️ حسابي</h2>';
        html += '<div class="card mb-3"><p class="text-sm"><strong>الاسم:</strong> ' + (this.currentUser.user_metadata.name || this.currentUser.email) + '</p></div>';
        html += '<div class="card mb-3"><p class="text-sm"><strong>البريد:</strong> ' + this.currentUser.email + '</p></div>';
        html += '<div class="card mb-3"><p class="text-sm"><strong>الدور:</strong> محضّر (تحضير)</p></div>';
        html += '<button onclick="App.doLogout()" class="btn-primary bg-red-500 mt-4"><i class="fa-solid fa-arrow-right-from-bracket ml-2"></i> تسجيل الخروج</button>';
        safeHTML(byId('mainContent'), html);
    },

    doLogout: function() {
        var self = this;
        if (this.timerInterval) clearInterval(this.timerInterval);
        supabase.auth.signOut().then(function() {
            self.currentUser = null;
            byId('mainApp').classList.add('hidden');
            byId('loginScreen').classList.remove('hidden');
        });
    }
};

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('../sw.js').catch(function() {}); }
document.addEventListener('DOMContentLoaded', function() { App.init(); });
</script>
</body>
</html>
