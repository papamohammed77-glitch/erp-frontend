    reportDiscrepancy: function(index, remaining, actualQty, diff, notes) {
        var self = this;
        var it = this.session.items[index];

        if (!actualQty) {
            actualQty = parseInt(byId('ret-qty-' + index).value) || 0;
            diff = actualQty - remaining;
        }

        // بناء قائمة الأصناف من ALL_ITEMS_LIST
        var itemsOptionsHtml = '';
        for (var i = 0; i < ALL_ITEMS_LIST.length; i++) {
            var item = ALL_ITEMS_LIST[i];
            var selected = (item.item_code === it.item_code) ? ' selected' : '';
            itemsOptionsHtml += '<option value="' + item.item_code + '"' + selected + '>' + (item.name || item.item_code) + ' (' + item.item_code + ')</option>';
        }

        var html = '<div style="text-align:right;font-family:sans-serif;direction:rtl">';
        html += '<p style="font-size:14px;color:#334155">الصنف الحالي: <strong>' + (it.item_name || '') + '</strong></p>';
        html += '<p style="font-size:13px;color:#64748b">المتوقع: <strong>' + remaining + '</strong></p>';
        html += '<p style="font-size:13px;color:#ea580c">الموجود: <strong>' + actualQty + '</strong></p>';
        html += '<p style="font-size:13px;color:' + (diff > 0 ? '#16a34a' : (diff < 0 ? '#dc2626' : '#64748b')) + '">الفرق: <strong>' + (diff > 0 ? '+' : '') + diff + '</strong></p>';

        // نوع الاختلاف
        html += '<div style="margin-top:12px"><label style="display:block;font-size:12px;font-weight:700;color:#64748b;margin-bottom:6px">نوع الاختلاف</label>';
        html += '<select id="discType" style="width:100%;padding:10px;border:2px solid #e2e8f0;border-radius:12px;font-size:13px;outline:none;color:#1e293b;background:white">';
        html += '<option value="surplus">زيادة - كمية أكثر من المتوقع</option>';
        html += '<option value="shortage">نقص - كمية أقل من المتوقع</option>';
        html += '<option value="wrong_item">صنف مختلف</option>';
        html += '<option value="other">سبب آخر</option>';
        html += '</select></div>';

        // حقول إضافية لـ "صنف مختلف"
        html += '<div id="discrepancyExtraFields" class="discrepancy-extra-fields">';
        html += '<div style="margin-top:12px"><label style="display:block;font-size:12px;font-weight:700;color:#64748b;margin-bottom:6px">الصنف الموجود (الفعلي)</label>';
        html += '<select id="actualItemCode" style="width:100%;padding:10px;border:2px solid #e2e8f0;border-radius:12px;font-size:13px;outline:none;color:#1e293b;background:white">';
        html += itemsOptionsHtml;
        html += '</select></div>';
        html += '<div style="margin-top:12px"><label style="display:block;font-size:12px;font-weight:700;color:#64748b;margin-bottom:6px">الصنف المتوقع (في النظام)</label>';
        html += '<select id="expectedItemCode" style="width:100%;padding:10px;border:2px solid #e2e8f0;border-radius:12px;font-size:13px;outline:none;color:#1e293b;background:white">';
        html += itemsOptionsHtml;
        html += '</select></div>';
        html += '</div>';

        // ملاحظات إضافية
        html += '<div style="margin-top:12px"><label style="display:block;font-size:12px;font-weight:700;color:#64748b;margin-bottom:6px">ملاحظات إضافية</label>';
        html += '<textarea id="discNotes" rows="2" style="width:100%;padding:10px;border:2px solid #e2e8f0;border-radius:12px;font-size:13px;outline:none;font-family:sans-serif;color:#1e293b">' + (notes || '') + '</textarea></div>';

        html += '<p style="font-size:12px;color:#dc2626;margin-top:12px">⚠️ سيتم إبلاغ المشرف. الرانشيت سيبقى معلقاً حتى التحقيق.</p>';
        html += '</div>';

        Swal.fire({
            title: '🚨 إبلاغ عن اختلاف',
            html: html,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'إبلاغ المشرف',
            cancelButtonText: 'إلغاء',
            customClass: {
                popup: '!rounded-3xl !p-5',
                confirmButton: '!rounded-xl !bg-orange-600 !px-8',
                cancelButton: '!rounded-xl !px-8'
            },
            didOpen: function() {
                // تفعيل/إخفاء الحقول الإضافية
                App._toggleDiscrepancyFields();
                // إضافة مستمع لتغيير النوع
                var discTypeEl = document.getElementById('discType');
                if (discTypeEl) {
                    discTypeEl.addEventListener('change', function() {
                        App._toggleDiscrepancyFields();
                    });
                }
            },
            preConfirm: function() {
                var discTypeEl = document.getElementById('discType');
                var actualItemCodeEl = document.getElementById('actualItemCode');
                var expectedItemCodeEl = document.getElementById('expectedItemCode');
                var discNotesEl = document.getElementById('discNotes');

                var discType = discTypeEl ? discTypeEl.value : 'other';
                var actualItemCode = actualItemCodeEl ? actualItemCodeEl.value : null;
                var expectedItemCode = expectedItemCodeEl ? expectedItemCodeEl.value : null;
                var notesText = discNotesEl ? discNotesEl.value : '';

                if (discType === 'wrong_item') {
                    if (!actualItemCode || !expectedItemCode) {
                        Swal.showValidationMessage('يرجى اختيار الصنف الموجود والمتوقع');
                        return false;
                    }
                    if (actualItemCode === expectedItemCode) {
                        Swal.showValidationMessage('الصنف الموجود والمتوقع متماثلان. يرجى اختيار صنفين مختلفين.');
                        return false;
                    }
                }

                return {
                    discType: discType,
                    actualItemCode: actualItemCode,
                    expectedItemCode: expectedItemCode,
                    notesText: notesText
                };
            }
        }).then(function(result) {
            if (!result.isConfirmed) { return; }

            var discType = result.value.discType;
            var actualItemCode = result.value.actualItemCode;
            var expectedItemCode = result.value.expectedItemCode;
            var notesText = result.value.notesText;

            var payload = {
                runsheet_id: self.session.runsheet_id,
                item_code: it.item_code,
                item_name: it.item_name || '',
                expected_qty: remaining,
                actual_qty: actualQty,
                difference_qty: diff,
                discrepancy_type: discType,
                notes: notesText
            };

            if (discType === 'wrong_item') {
                payload.actual_item_code = actualItemCode;
                payload.expected_item_code = expectedItemCode;
                for (var k = 0; k < ALL_ITEMS_LIST.length; k++) {
                    if (ALL_ITEMS_LIST[k].item_code === actualItemCode) {
                        payload.actual_item_name = ALL_ITEMS_LIST[k].name || actualItemCode;
                    }
                    if (ALL_ITEMS_LIST[k].item_code === expectedItemCode) {
                        payload.expected_item_name = ALL_ITEMS_LIST[k].name || expectedItemCode;
                    }
                }
            }

            Swal.fire({ title: 'جاري الإبلاغ...', allowOutsideClick: false, didOpen: function() { Swal.showLoading(); } });

            supabase.auth.getSession()
                .then(function(ses) {
                    var t = ses.data.session.access_token;
                    return fetch(SUPABASE_URL + '/functions/v1/report-discrepancy', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + t },
                        body: JSON.stringify(payload)
                    });
                })
                .then(function(r) { return r.json(); })
                .then(function(j) {
                    Swal.close();
                    if (j.success) {
                        var msg = 'تم إبلاغ المشرف بالاختلاف';
                        if (discType === 'wrong_item') {
                            msg += ' (صنف مختلف: ' + (payload.actual_item_name || actualItemCode) + ' بدلاً من ' + (payload.expected_item_name || expectedItemCode) + ')';
                        }
                        toast(msg, 'success');
                        self.session.items[index].qty_returned = remaining;
                        self.session.items[index].notes = 'اختلاف - تم الإبلاغ (' + discType + ')';
                        self.saveReturnItem(index);
                        self.renderActiveSession();
                    } else {
                        toast(j.msg || 'فشل الإبلاغ', 'error');
                    }
                })
                .catch(function() {
                    Swal.close();
                    toast('فشل الاتصال بالخادم', 'error');
                });
        });
    },

    _toggleDiscrepancyFields: function() {
        var discType = document.getElementById('discType');
        var extraFields = document.getElementById('discrepancyExtraFields');
        if (discType && extraFields) {
            if (discType.value === 'wrong_item') {
                extraFields.classList.add('visible');
            } else {
                extraFields.classList.remove('visible');
            }
        }
    },

    completeReturn: function() {
        var self = this;
        if (!this.session) { return; }
        if (!navigator.onLine) { toast('أنت غير متصل', 'warning'); return; }

        supabase.from('stock_discrepancies')
            .select('id')
            .eq('runsheet_id', this.session.runsheet_id)
            .eq('status', 'pending')
            .then(function(discRes) {
                var pendingDisc = discRes.data || [];
                if (pendingDisc.length > 0) {
                    Swal.fire({
                        title: 'لا يمكن الإنهاء',
                        text: 'يوجد ' + pendingDisc.length + ' بلاغات اختلاف معلقة. يجب مراجعة المشرف أولاً.',
                        icon: 'warning',
                        customClass: { popup: '!rounded-3xl' }
                    });
                    return;
                }

                var items = [];
                var hasErrors = false;
                var totalGood = 0, totalDamaged = 0, totalMissing = 0, totalShortageValue = 0;

                for (var i = 0; i < self.session.items.length; i++) {
                    var it = self.session.items[i];
                    var remaining = it.qty_loaded - it.qty_delivered;
                    if (remaining <= 0) { continue; }

                    var returned = it.qty_returned || 0;
                    var condition = it.return_condition || 'good';
                    var notes = it.notes || '';

                    if (returned < remaining && !notes) {
                        hasErrors = true;
                        continue;
                    }

                    if (condition === 'good') { totalGood += returned; }
                    else if (condition === 'damaged') { totalDamaged += returned; }
                    else if (condition === 'missing') { totalMissing += returned; }

                    if (condition === 'missing') {
                        totalShortageValue += (remaining - returned) * (it.unit_price || 0);
                    }

                    items.push({
                        item_code: it.item_code,
                        item_name: it.item_name || '',
                        qty_loaded: it.qty_loaded,
                        qty_delivered: it.qty_delivered,
                        unit_price: it.unit_price || 0,
                        returnedQty: returned,
                        return_condition: condition,
                        notes: notes
                    });
                }

                if (hasErrors) {
                    Swal.fire({
                        title: 'تنبيه',
                        text: 'هناك أصناف لم تكتمل. يجب ذكر سبب النقص لكل صنف لم يُرجع بالكامل.',
                        icon: 'warning',
                        customClass: { popup: '!rounded-3xl' }
                    });
                    return;
                }

                var summaryHtml = '<div style="text-align:right;font-family:sans-serif;direction:rtl">';
                summaryHtml += '<p style="font-size:14px;margin-bottom:12px;color:#334155">مراجعة نهائية للمرتجعات:</p>';
                summaryHtml += '<div style="background:#f0fdf4;padding:10px;border-radius:8px;margin-bottom:6px;border:1px solid #bbf7d0"><span style="color:#166534;font-weight:bold">🟢 سليم:</span> <strong>' + totalGood + '</strong></div>';
                summaryHtml += '<div style="background:#fef2f2;padding:10px;border-radius:8px;margin-bottom:6px;border:1px solid #fecaca"><span style="color:#b91c1c;font-weight:bold">🔴 تالف:</span> <strong>' + totalDamaged + '</strong></div>';
                summaryHtml += '<div style="background:#f8fafc;padding:10px;border-radius:8px;margin-bottom:6px;border:1px solid #e2e8f0"><span style="color:#475569;font-weight:bold">⬛ مفقود:</span> <strong>' + totalMissing + '</strong></div>';
                if (totalShortageValue > 0) {
                    summaryHtml += '<div style="background:#fff7ed;padding:10px;border-radius:8px;margin-top:8px;border:1px solid #fed7aa"><span style="color:#c2410c;font-weight:bold">💰 قيمة العجز:</span> <strong>' + totalShortageValue.toFixed(2) + ' ج.م</strong></div>';
                }
                summaryHtml += '</div>';

                Swal.fire({
                    title: '🎯 تأكيد إنهاء المرتجعات',
                    html: summaryHtml,
                    icon: totalShortageValue > 0 ? 'warning' : 'info',
                    showCancelButton: true,
                    confirmButtonText: '✅ تأكيد وإنهاء',
                    cancelButtonText: '✕ إلغاء',
                    customClass: {
                        popup: '!rounded-3xl',
                        confirmButton: '!rounded-xl !bg-blue-600 !px-8',
                        cancelButton: '!rounded-xl !px-8'
                    }
                }).then(function(result) {
                    if (!result.isConfirmed) { return; }

                    Swal.fire({ title: 'جاري إنهاء المرتجعات...', allowOutsideClick: false, didOpen: function() { Swal.showLoading(); } });

                    supabase.auth.getSession()
                        .then(function(ses) {
                            var t = ses.data.session.access_token;
                            return fetch(SUPABASE_URL + '/functions/v1/complete-return', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + t },
                                body: JSON.stringify({
                                    runsheet_code: self.session.runsheet_code,
                                    items: items
                                })
                            });
                        })
                        .then(function(r) { return r.json(); })
                        .then(function(j) {
                            Swal.close();
                            if (j.success) {
                                db.localChanges.where('runsheet_code').equals(self.session.runsheet_code).delete();
                                toast('🎉 تم إنهاء المرتجعات بنجاح!', 'success');
                                self.session = null;
                                if (self.timerInterval) { clearInterval(self.timerInterval); }
                                self.loadRunsheets();
                            } else {
                                toast(j.msg || 'فشل الإنهاء', 'error');
                            }
                        })
                        .catch(function() {
                            Swal.close();
                            toast('فشل الاتصال بالخادم', 'error');
                        });
                });
            });
    },

    startTimer: function() {
        var self = this;
        if (this.timerInterval) { clearInterval(this.timerInterval); }
        this.timerInterval = setInterval(function() {
            if (self.session && self.session.start_time) {
                var diff = Math.floor((new Date() - new Date(self.session.start_time)) / 1000);
                var m = Math.floor(diff / 60);
                var sec = diff % 60;
                var el = document.querySelector('.bg-blue-50.text-blue-600');
                if (el) {
                    safeText(el, '⏱️ ' + String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0'));
                }
            }
        }, 1000);
    },

    loadCompleted: function() {
        var self = this;
        safeHTML(byId('mainContent'),
            '<div class="space-y-4"><div class="skeleton h-12 w-full"></div><div class="grid grid-cols-2 gap-4"><div class="skeleton h-32 w-full"></div><div class="skeleton h-32 w-full"></div></div></div>'

            .order('run_date', { ascending: false })
            .limit(50)
            .then(function(res) {
                self.completedRunsheets = res.data || [];

                var driverIds = [];
                for (var i = 0; i < self.completedRunsheets.length; i++) {
                    if (self.completedRunsheets[i].driver_id && driverIds.indexOf(self.completedRunsheets[i].driver_id) === -1) {
                        driverIds.push(self.completedRunsheets[i].driver_id);
                    }
                }
                if (driverIds.length > 0) {
                    supabase.from('users').select('id, name').in('id', driverIds)
                        .then(function(uRes) {
                            var userMap = {};
                            var users = uRes.data || [];
                            for (var ui = 0; ui < users.length; ui++) {
                                userMap[users[ui].id] = users[ui].name;
                            }
                            self._driverMap = userMap;
                            self.renderCompletedList(self.completedRunsheets);
                        });
                } else {
                    self.renderCompletedList(self.completedRunsheets);
                }
            })
            .catch(function() {
                safeHTML(byId('mainContent'),
                    '<div class="text-center py-20 text-red-400"><i class="fa-solid fa-circle-exclamation text-3xl mb-3"></i><p>فشل تحميل البيانات</p></div>'
                );

    renderCompletedList: function(list) {
        var self = this;
        var html = '';
        html += '<h2 class="text-sm font-bold text-slate-500 mb-4"><i class="fa-solid fa-check-circle ml-1.5 text-green-500"></i> الرانشيتات المكتملة</h2>';
        html += '<input type="text" id="searchCompleted" placeholder="🔍 ابحث في المكتملة..." class="w-full p-3.5 bg-white rounded-2xl border-2 border-slate-100 focus:border-blue-400 outline-none font-semibold text-sm transition-all shadow-sm mb-4" oninput="App.searchCompleted(this.value)">';

        if (list.length === 0) {
            html += '<div class="text-center py-16 bg-white rounded-3xl border border-slate-100">';
            html += '<div class="text-5xl mb-4">🏆</div>';
            html += '<p class="text-slate-400 font-bold">لم تنهِ أي رانشيت بعد</p>';
            html += '<p class="text-slate-300 text-sm mt-1">العمل الجاد يُؤتي ثماره!</p>';
            html += '</div>';
        } else {
            html += '<div class="grid-cards">';
            for (var i = 0; i < list.length; i++) {
                var rs = list[i];
                var driverName = (self._driverMap && rs.driver_id) ? (self._driverMap[rs.driver_id] || 'غير محدد') : 'غير محدد';
                html += '<div class="card border-2 border-green-200 bg-green-50/20">';
                html += '<div class="flex flex-col items-center text-center">';
                html += '<span class="font-black text-base text-slate-800">' + rs.runsheet_code + '</span>';
                html += '<p class="text-xs text-slate-400 mt-0.5">' + (rs.run_date || '') + '</p>';
                html += '<p class="text-xs text-slate-500 mt-0.5"><i class="fa-solid fa-user ml-1 text-slate-400"></i>' + driverName + '</p>';
                html += '<button onclick="App.reopenReturn(\'' + rs.runsheet_code + '\')" class="btn-warning text-xs py-1.5 px-3 w-full mt-2"><i class="fa-solid fa-pen-to-square ml-1"></i> تعديل المرتجعات</button>';
                html += '</div></div>';
            }
            html += '</div>';
        }
        safeHTML(byId('mainContent'), html);
    },

    searchCompleted: function(query) {
        var filtered = this.completedRunsheets;
        if (query && query.trim()) {
            var q = query.trim().toLowerCase();
            filtered = this.completedRunsheets.filter(function(rs) {
                return (rs.runsheet_code || '').toLowerCase().indexOf(q) !== -1;
            });
        }
        this.renderCompletedList(filtered);
    },

    reopenReturn: function(code) {
        var self = this;
        supabase.from('runsheets')
            .select('status')
            .eq('runsheet_code', code)
            .maybeSingle()
            .then(function(res) {
                if (!res.data || res.data.status !== 'Returned') {
                    Swal.fire({
                        title: 'لا يمكن التعديل',
                        text: 'الرانشيت لم يعد في حالة مكتمل المرتجعات.',
                        icon: 'warning',
                        customClass: { popup: '!rounded-3xl' }
                    });
                    self.loadCompleted();
                    return;
                }
                Swal.fire({
                    title: 'تأكيد التعديل',
                    text: 'سيتم إعادة فتح الرانشيت ' + code + ' لتعديل المرتجعات. متابعة؟',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: 'نعم، تعديل',
                    cancelButtonText: 'إلغاء',
                    customClass: {
                        popup: '!rounded-3xl',
                        confirmButton: '!rounded-xl !bg-amber-500 !px-8',
                        cancelButton: '!rounded-xl !px-8'
                    }
                }).then(function(r) {
                    if (!r.isConfirmed) { return; }
                    Swal.showLoading();
                    supabase.auth.getSession()
                        .then(function(ses) {
                            var t = ses.data.session.access_token;
                            return fetch(SUPABASE_URL + '/functions/v1/reopen-return', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + t },
                                body: JSON.stringify({ runsheet_code: code })
                            });
                        })
                        .then(function(res) {
                            if (!res) { return; }
                            if (!res.ok) { return res.json().then(function(err) { throw new Error(err.msg || 'خطأ'); }); }
                            return res.json();
                        })
                        .then(function(json) {
                            Swal.close();
                            if (json && json.success) {
                                toast('تم إعادة فتح الرانشيت للتعديل', 'success');
                                self.loadRunsheets();
                            } else {
                                toast((json && json.msg) || 'فشل', 'error');
                                self.loadCompleted();
                            }
                        })
                        .catch(function(err) {
                            Swal.close();
                            toast(err.message || 'فشل الاتصال', 'error');
                            self.loadCompleted();
                        });
                });
            });
    },

    // ============================================================
    // تبويب حسابي
    // ============================================================

    renderAccount: function() {
        var self = this;
        var html = '';

        html += '<div class="text-center mb-6 mt-2">';
        html += '<div class="w-20 h-20 bg-gradient-to-br from-blue-400 to-blue-600 rounded-2xl mx-auto flex items-center justify-center text-white text-3xl font-black shadow-lg shadow-blue-200 mb-3">';
        html += (this.currentUser.user_metadata.name || '?').charAt(0);
        html += '</div>';
        html += '<h2 class="font-black text-xl text-slate-800">' + (this.currentUser.user_metadata.name || this.currentUser.email) + '</h2>';
        html += '<p class="text-sm text-slate-400">مسؤول مرتجعات</p>';
        html += '</div>';

        html += '<div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 mb-4">';
        html += '<h3 class="text-sm font-bold text-slate-500 mb-3"><i class="fa-solid fa-chart-simple ml-1.5"></i> إحصائياتي</h3>';

        var today = new Date().toISOString().split('T')[0];
        var weekAgo = new Date();
        weekAgo.setDate(weekAgo.getDate() - 7);
        var weekAgoStr = weekAgo.toISOString().split('T')[0];

        supabase.from('runsheets')
            .select('id, status, run_date, return_start, return_end')
            .eq('return_handler_id', this.pubUserId || this.currentUser.email)
            .gte('run_date', weekAgoStr)
            .order('run_date', { ascending: false })
            .then(function(rsRes) {
                var runsheets = rsRes.data || [];
                var totalRunsheets = runsheets.length;
                var completedRunsheets = runsheets.filter(function(r) { return r.status === 'Returned'; }).length;
                var activeRunsheets = runsheets.filter(function(r) { return r.status === 'Returning'; }).length;

                var totalTime = 0;
                var timeCount = 0;
                for (var i = 0; i < runsheets.length; i++) {
                    var r = runsheets[i];
                    if (r.return_start && r.return_end) {
                        var start = new Date(r.return_start);
                        var end = new Date(r.return_end);
                        var diff = (end - start) / 1000 / 60;
                        if (diff > 0) {
                            totalTime += diff;
                            timeCount++;
                        }
                    }
                }
                var avgTime = timeCount > 0 ? Math.round(totalTime / timeCount) : 0;

                var rsIds = runsheets.map(function(r) { return r.id; });
                if (rsIds.length > 0) {
                    supabase.from('run_sheet_details')
                        .select('runsheet_id, qty_returned, return_condition')
                        .in('runsheet_id', rsIds)
                        .then(function(detRes) {
                            var details = detRes.data || [];
                            var totalGood = 0, totalDamaged = 0, totalMissing = 0;
                            for (var j = 0; j < details.length; j++) {
                                var d = details[j];
                                var qty = Number(d.qty_returned) || 0;
                                if (qty > 0) {
                                    if (d.return_condition === 'good' || !d.return_condition) { totalGood += qty; }
                                    else if (d.return_condition === 'damaged') { totalDamaged += qty; }
                                    else if (d.return_condition === 'missing') { totalMissing += qty; }
                                }
                            }

                            supabase.from('stock_discrepancies')
                                .select('id')
                                .eq('status', 'pending')
                                .then(function(discRes) {
                                    var pendingDisc = discRes.data || [];
                                    self._renderAccountStats(html, totalRunsheets, completedRunsheets, activeRunsheets, totalGood, totalDamaged, totalMissing, avgTime, pendingDisc.length);
                                })
                                .catch(function() {
                                    self._renderAccountStats(html, totalRunsheets, completedRunsheets, activeRunsheets, totalGood, totalDamaged, totalMissing, avgTime, 0);
                                });
                        })
                        .catch(function() {
                            self._renderAccountStats(html, totalRunsheets, completedRunsheets, activeRunsheets, 0, 0, 0, avgTime, 0);
                        });
                } else {
                    self._renderAccountStats(html, totalRunsheets, completedRunsheets, activeRunsheets, 0, 0, 0, avgTime, 0);
                }
            })
            .catch(function() {
                self._renderAccountStats(html, 0, 0, 0, 0, 0, 0, 0, 0);
            });
    },

    _renderAccountStats: function(html, total, completed, active, good, damaged, missing, avgTime, pendingDisc) {
        var finalHtml = html;
        finalHtml += '<div class="grid grid-cols-2 gap-3">';
        finalHtml += '<div class="bg-slate-50 rounded-xl p-3 text-center"><p class="text-xs text-slate-400">الرانشيتات</p><p class="text-xl font-black text-slate-700">' + total + '</p></div>';
        finalHtml += '<div class="bg-slate-50 rounded-xl p-3 text-center"><p class="text-xs text-slate-400">مكتملة</p><p class="text-xl font-black text-green-600">' + completed + '</p></div>';
        finalHtml += '<div class="bg-slate-50 rounded-xl p-3 text-center"><p class="text-xs text-slate-400">قيد العمل</p><p class="text-xl font-black text-amber-600">' + active + '</p></div>';
        finalHtml += '<div class="bg-slate-50 rounded-xl p-3 text-center"><p class="text-xs text-slate-400">متوسط الوقت</p><p class="text-xl font-black text-blue-600">' + avgTime + ' د</p></div>';
        finalHtml += '<div class="bg-green-50 rounded-xl p-3 text-center border border-green-200"><p class="text-xs text-green-600">🟢 سليم</p><p class="text-xl font-black text-green-700">' + good + '</p></div>';
        finalHtml += '<div class="bg-red-50 rounded-xl p-3 text-center border border-red-200"><p class="text-xs text-red-500">🔴 تالف</p><p class="text-xl font-black text-red-700">' + damaged + '</p></div>';
        finalHtml += '<div class="bg-slate-50 rounded-xl p-3 text-center border border-slate-200"><p class="text-xs text-slate-500">⬛ مفقود</p><p class="text-xl font-black text-slate-700">' + missing + '</p></div>';
        finalHtml += '<div class="bg-orange-50 rounded-xl p-3 text-center border border-orange-200"><p class="text-xs text-orange-500">📋 بلاغات</p><p class="text-xl font-black text-orange-600">' + pendingDisc + '</p></div>';
        finalHtml += '</div></div>';

        finalHtml += '<div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 mb-4">';
        finalHtml += '<div class="flex items-center gap-3"><div class="w-10 h-10 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-400"><i class="fa-solid fa-envelope"></i></div><div><p class="text-xs text-slate-400">البريد الإلكتروني</p><p class="font-bold text-sm text-slate-700">' + this.currentUser.email + '</p></div></div>';
        finalHtml += '</div>';

        finalHtml += '<button onclick="App.doLogout()" class="w-full btn-secondary text-red-500 border-2 border-red-200 hover:bg-red-50 transition py-3.5"><i class="fa-solid fa-arrow-right-from-bracket ml-2"></i> تسجيل الخروج</button>';

        safeHTML(byId('mainContent'), finalHtml);
    }
};

// ============================================================
// Service Worker
// ============================================================

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('../sw.js')
        .then(function(reg) {
            reg.addEventListener('updatefound', function() {
                var newWorker = reg.installing;
                newWorker.addEventListener('statechange', function() {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        Swal.fire({
                            title: '🔄 تحديث متاح',
                            text: 'تم تحميل نسخة أحدث من التطبيق.',
                            icon: 'info',
                            confirmButtonText: 'تحديث الآن',
                            customClass: {
                                popup: '!rounded-3xl',
                                confirmButton: '!rounded-xl !bg-blue-600 !px-8'
                            }
                        }).then(function() {
                            newWorker.postMessage({ action: 'skipWaiting' });
                            window.location.reload();
                        });
                    }
                });
            });
        })
        .catch(function() {});
}

// ============================================================
// بدء التشغيل
// ============================================================

document.addEventListener('DOMContentLoaded', function() {
    var remembered = localStorage.getItem('rawaea_remember_email');
    if (remembered) {
        var emailInput = byId('loginEmail');
        if (emailInput) {
            emailInput.value = remembered;
            var check = byId('rememberMe');
            if (check) { check.checked = true; }
        }
    }

    supabase.auth.getSession().then(function(res) {
        if (res.data && res.data.session) {
            App.init();
        }
    });

    App.init();
});
</script>
