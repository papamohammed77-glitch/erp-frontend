<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>المحاسب | الروائع ERP</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#059669">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Tahoma,sans-serif;background:#f1f5f9}
        .auth-container{background:linear-gradient(135deg,#064e3b 0%,#047857 40%,#059669 100%)}
        .input-field:focus{border-color:#059669;box-shadow:0 0 0 3px rgba(5,150,105,0.1)}
        .card{background:#fff;border-radius:20px;padding:1.25rem;box-shadow:0 4px 15px rgba(0,0,0,0.05)}
        .stat-card{background:#fff;border-radius:16px;padding:1rem;box-shadow:0 4px 6px rgba(0,0,0,0.02)}
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<div id="loginScreen" class="fixed inset-0 z-[100] flex items-center justify-center auth-container p-4">
    <div class="bg-white rounded-[32px] shadow-2xl p-6 w-[92%] max-w-md">
        <div class="text-center mb-6"><div class="w-20 h-20 bg-gradient-to-br from-emerald-600 to-emerald-800 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4"><i class="fa-solid fa-coins text-white text-3xl"></i></div><h1 class="font-black text-2xl text-gray-800">الروائع</h1><p class="text-xs text-gray-400">المحاسب</p></div>
        <h2 class="text-lg font-bold text-gray-700 text-center mb-4">تسجيل الدخول</h2>
        <div class="space-y-3"><div><input id="loginEmail" type="email" placeholder="البريد الإلكتروني" class="input-field w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-200 focus:border-emerald-600 outline-none font-bold text-sm"></div><div class="relative"><input id="loginPass" type="password" placeholder="كلمة السر" class="input-field w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-200 focus:border-emerald-600 outline-none font-bold text-sm pr-12"><button type="button" onclick="App.togglePass()" class="absolute left-2 top-1/2 -translate-y-1/2 p-2 text-gray-400"><i id="passIcon" class="fa-solid fa-eye"></i></button></div></div>
        <button onclick="App.doLogin()" class="w-full bg-gradient-to-r from-emerald-600 to-emerald-700 text-white py-3.5 rounded-xl font-black text-sm shadow-lg mt-4">تسجيل الدخول</button>
        <p id="loginMsg" class="text-center text-xs text-red-500 font-bold mt-3 hidden"></p>
    </div>
</div>

<div id="mainApp" class="hidden flex flex-col h-full">
    <header class="bg-emerald-700 text-white p-4 flex items-center justify-between sticky top-0 z-30 shadow-md flex-shrink-0">
        <span class="font-black text-sm">💰 المحاسب</span>
        <div class="flex items-center gap-2"><span class="text-xs font-bold" id="headerUserName"></span><button onclick="App.doLogout()" class="bg-white/10 w-8 h-8 rounded-full"><i class="fa-solid fa-arrow-right-from-bracket text-xs"></i></button></div>
    </header>
    <div class="flex gap-1 p-2 bg-white border-b overflow-x-auto flex-shrink-0">
        <button onclick="App.switchTab('dashboard')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm bg-emerald-600 text-white" id="tab-dashboard">📊 KPI</button>
        <button onclick="App.switchTab('receipts')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm text-gray-500" id="tab-receipts">📥 سندات قبض</button>
        <button onclick="App.switchTab('payments')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm text-gray-500" id="tab-payments">📤 سندات صرف</button>
        <button onclick="App.switchTab('journal')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm text-gray-500" id="tab-journal">📒 قيود</button>
    </div>
    <main id="mainContent" class="flex-1 overflow-y-auto p-4"></main>
</div>

<script>
var SUPABASE_URL = 'https://fiilmooggumokxanwiyx.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpaWxtb29nZ3Vtb2t4YW53aXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDkwOTIsImV4cCI6MjA5NDI4NTA5Mn0.LZScCxnCiRrTSCCBmTryszQpY1AwBgR2dkTBbC5kOc4';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var db = new Dexie('RW_Accountant'); db.version(1).stores({ meta: 'key' });
function byId(id) { return document.getElementById(id); }
function safeText(el, text) { if (el) el.textContent = text; }
function safeHTML(el, html) { if (el) el.innerHTML = html; }
function fmtNum(n) { return Number(n || 0).toLocaleString('ar-EG', {minimumFractionDigits: 2}); }
function toast(m, t) { Swal.fire({ toast: true, position: 'top', icon: t || 'info', title: m, showConfirmButton: false, timer: 2000 }); }

var App = {
    currentUser: null, currentTab: 'dashboard',
    togglePass: function(){var p=byId('loginPass'),i=byId('passIcon');if(p.type==='password'){p.type='text';i.className='fa-solid fa-eye-slash';}else{p.type='password';i.className='fa-solid fa-eye';}},
    doLogin: function(){var e=byId('loginEmail').value.trim(),p=byId('loginPass').value.trim();if(!e||!p){byId('loginMsg').innerText='أدخل البيانات';byId('loginMsg').classList.remove('hidden');return;}byId('loginMsg').classList.add('hidden');var s=this;Swal.showLoading();supabase.auth.signInWithPassword({email:e,password:p}).then(function(r){Swal.close();if(r.error){byId('loginMsg').innerText=r.error.message;byId('loginMsg').classList.remove('hidden');}else{s.init();}}).catch(function(){Swal.close();});},
    init: function(){var s=this;supabase.auth.getSession().then(function(r){if(r.data&&r.data.session){s.currentUser=r.data.session.user;var m=s.currentUser.user_metadata||{},isO=(m.isOwner===true||m.isOwner==='true'),perms=m.permissions||[],has=isO||(Array.isArray(perms)&&perms.indexOf('finance')!==-1);if(!has){Swal.fire({title:'غير مصرح',icon:'error'});supabase.auth.signOut();return;}safeText(byId('headerUserName'),m.name||s.currentUser.email);s.enterApp();}});},
    enterApp: function(){byId('loginScreen').classList.add('hidden');byId('mainApp').classList.remove('hidden');this.switchTab('dashboard');},
    doLogout: function(){supabase.auth.signOut().then(function(){byId('mainApp').classList.add('hidden');byId('loginScreen').classList.remove('hidden');});},
    switchTab: function(t){this.currentTab=t;['dashboard','receipts','payments','journal'].forEach(function(x){var b=byId('tab-'+x);if(b){b.classList.remove('bg-emerald-600','text-white');b.classList.add('text-gray-500');}});var a=byId('tab-'+t);if(a){a.classList.add('bg-emerald-600','text-white');a.classList.remove('text-gray-500');}if(t==='dashboard')this.renderDashboard();else if(t==='receipts')this.renderReceipts();else if(t==='payments')this.renderPayments();else if(t==='journal')this.renderJournal();},

    renderDashboard: function(){
        var s=this; safeHTML(byId('mainContent'),'<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin"></i></div>');
        var today=new Date().toISOString().split('T')[0],firstDay=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().split('T')[0];
        Promise.all([supabase.from('treasury').select('current_balance'),supabase.from('cash_box').select('amount,type').gte('voucher_date',firstDay).lte('voucher_date',today),supabase.from('customers').select('debt')]).then(function(r){
            var treasury=r[0].data||[],cash=r[1].data||[],customers=r[2].data||[];
            var totalTreasury=0;for(var i=0;i<treasury.length;i++)totalTreasury+=Number(treasury[i].current_balance)||0;
            var receipts=0,payments=0;for(var j=0;j<cash.length;j++){if(cash[j].type==='Receipt')receipts+=Number(cash[j].amount)||0;else payments+=Number(cash[j].amount)||0;}
            var totalDebt=0;for(var k=0;k<customers.length;k++)totalDebt+=Number(customers[k].debt)||0;
            var html='<h2 class="text-lg font-black mb-4">💰 المؤشرات المالية</h2>';
            html+='<div class="grid grid-cols-2 gap-3">';
            html+='<div class="stat-card"><p class="text-xs text-gray-400">رصيد الخزائن</p><p class="text-2xl font-black text-emerald-600">'+fmtNum(totalTreasury)+' ج.م</p></div>';
            html+='<div class="stat-card"><p class="text-xs text-gray-400">مقبوضات الشهر</p><p class="text-2xl font-black text-green-600">'+fmtNum(receipts)+' ج.م</p></div>';
            html+='<div class="stat-card"><p class="text-xs text-gray-400">مدفوعات الشهر</p><p class="text-2xl font-black text-red-600">'+fmtNum(payments)+' ج.م</p></div>';
            html+='<div class="stat-card"><p class="text-xs text-gray-400">ذمم العملاء</p><p class="text-2xl font-black text-amber-600">'+fmtNum(totalDebt)+' ج.م</p></div>';
            html+='</div>';safeHTML(byId('mainContent'),html);
        });
    },

    renderReceipts: function(){
        var s=this; safeHTML(byId('mainContent'),'<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin"></i></div>');
        supabase.from('cash_box').select('*').eq('type','Receipt').order('voucher_date',{ascending:false}).limit(30).then(function(r){var data=r.data||[],html='<h2 class="text-lg font-black mb-4">📥 سندات القبض</h2><button onclick="App.newReceipt()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-black mb-4">➕ سند قبض جديد</button>';
        for(var i=0;i<data.length;i++){html+='<div class="card mb-2"><div class="flex justify-between"><span class="font-bold">'+data[i].voucher_date+'</span><span class="font-black text-green-600">'+fmtNum(data[i].amount)+' ج.م</span></div><p class="text-xs text-gray-400">'+data[i].treasury_id+' | '+data[i].reference+'</p></div>';}
        safeHTML(byId('mainContent'),html);});
    },

    newReceipt: function(){
        Swal.fire({title:'سند قبض جديد',html:'<input id="rcptAmt" class="swal2-input" placeholder="المبلغ" type="number"><input id="rcptRef" class="swal2-input" placeholder="المرجع">',showCancelButton:true,confirmButtonText:'حفظ',preConfirm:function(){return{amt:parseFloat(document.getElementById('rcptAmt').value)||0,ref:document.getElementById('rcptRef').value};}}).then(function(r){if(!r.isConfirmed)return;Swal.showLoading();supabase.auth.getSession().then(function(se){var t=se.data.session?se.data.session.access_token:null;return fetch(SUPABASE_URL+'/functions/v1/save-receipt-voucher',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+t},body:JSON.stringify({date:new Date().toISOString().split('T')[0],cashBoxId:'MAIN',mainAccountName:r.value.ref,notes:'',lines:[{accountName:r.value.ref,description:'',amount:r.value.amt}]})});}).then(function(res){return res.json();}).then(function(j){Swal.close();if(j.success){toast('تم الحفظ','success');App.renderReceipts();}else{toast(j.error||'فشل','error');}});});
    },

    renderPayments: function(){
        var s=this; safeHTML(byId('mainContent'),'<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin"></i></div>');
        supabase.from('cash_box').select('*').eq('type','Payment').order('voucher_date',{ascending:false}).limit(30).then(function(r){var data=r.data||[],html='<h2 class="text-lg font-black mb-4">📤 سندات الصرف</h2><button onclick="App.newPayment()" class="w-full bg-red-600 text-white py-3 rounded-xl font-black mb-4">➕ سند صرف جديد</button>';
        for(var i=0;i<data.length;i++){html+='<div class="card mb-2"><div class="flex justify-between"><span class="font-bold">'+data[i].voucher_date+'</span><span class="font-black text-red-600">'+fmtNum(data[i].amount)+' ج.م</span></div><p class="text-xs text-gray-400">'+data[i].treasury_id+' | '+data[i].reference+'</p></div>';}
        safeHTML(byId('mainContent'),html);});
    },

    newPayment: function(){
        Swal.fire({title:'سند صرف جديد',html:'<input id="pmtAmt" class="swal2-input" placeholder="المبلغ" type="number"><input id="pmtRef" class="swal2-input" placeholder="المرجع">',showCancelButton:true,confirmButtonText:'حفظ',preConfirm:function(){return{amt:parseFloat(document.getElementById('pmtAmt').value)||0,ref:document.getElementById('pmtRef').value};}}).then(function(r){if(!r.isConfirmed)return;Swal.showLoading();supabase.auth.getSession().then(function(se){var t=se.data.session?se.data.session.access_token:null;return fetch(SUPABASE_URL+'/functions/v1/save-payment-voucher',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+t},body:JSON.stringify({date:new Date().toISOString().split('T')[0],cashBoxId:'MAIN',mainAccountName:r.value.ref,notes:'',lines:[{accountName:r.value.ref,description:'',amount:r.value.amt}]})});}).then(function(res){return res.json();}).then(function(j){Swal.close();if(j.success){toast('تم الحفظ','success');App.renderPayments();}else{toast(j.error||'فشل','error');}});});
    },

    renderJournal: function(){
        safeHTML(byId('mainContent'),'<div class="text-center py-10 text-gray-400"><i class="fa-solid fa-book text-4xl mb-3"></i><p>القيود اليومية – تُدار من النظام الأم</p><p class="text-sm mt-2">استخدم تطبيق المركز الرئيسي لإدارة القيود المحاسبية</p></div>');
    }
};
if('serviceWorker' in navigator){navigator.serviceWorker.register('../sw.js').catch(function(){});}
document.addEventListener('DOMContentLoaded',function(){App.init();});
</script>
</body>
</html>
