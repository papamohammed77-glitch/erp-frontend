<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مشرف المخازن | الروائع ERP</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Cairo',sans-serif;background:#f3f4f6;-webkit-tap-highlight-color:transparent}
        .card{background:#fff;border-radius:20px;padding:1.25rem;box-shadow:0 4px 15px rgba(0,0,0,0.05)}
        .stat-card{background:#fff;border-radius:16px;padding:1rem;box-shadow:0 4px 6px rgba(0,0,0,0.02);transition:transform 0.2s;cursor:pointer}
        .stat-card:active{transform:scale(0.98)}
        .btn-primary{background:#2563eb;color:#fff;padding:0.75rem 1.5rem;border-radius:12px;font-weight:700;border:none;cursor:pointer;width:100%}
        .btn-primary:active{background:#1d4ed8}
        .role-select{width:100%;padding:0.5rem;border:1px solid #e5e7eb;border-radius:10px;font-weight:600;font-size:0.875rem;background:#f9fafb}
        .auth-container{background:linear-gradient(135deg,#1e3a8a 0%,#1e40af 40%,#2563eb 100%)}
        .input-field:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
        .pulse{animation:pulse 2s infinite}
        @keyframes pulse{0%{opacity:1}50%{opacity:0.6}100%{opacity:1}}
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<!-- ============================================================ -->
<!-- شاشة الدخول -->
<!-- ============================================================ -->
<div id="loginScreen" class="fixed inset-0 z-[100] flex items-center justify-center auth-container p-4">
    <div class="bg-white rounded-[32px] shadow-2xl p-6 w-[92%] max-w-md">
        <div class="text-center mb-6">
            <div class="w-20 h-20 bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4">
                <i class="fa-solid fa-warehouse text-white text-3xl"></i>
            </div>
            <h1 class="font-black text-2xl text-gray-800">الروائع</h1>
            <p class="text-xs text-gray-400 font-bold mt-1">مشرف المخازن</p>
        </div>
        <h2 class="text-lg font-bold text-gray-700 text-center mb-4">تسجيل الدخول إلى حسابك</h2>
        <div class="space-y-3">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">البريد الإلكتروني <span class="text-red-500">*</span></label>
                <input id="loginEmail" type="email" placeholder="example@domain.com" class="input-field w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-200 focus:border-blue-600 focus:bg-white outline-none font-bold text-sm transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">كلمة السر <span class="text-red-500">*</span></label>
                <input id="loginPass" type="password" placeholder="••••••••" class="input-field w-full p-3 bg-gray-50 rounded-xl border-2 border-gray-200 focus:border-blue-600 focus:bg-white outline-none font-bold text-sm transition-all">
            </div>
            <div class="flex justify-between items-center text-sm">
                <label class="flex items-center gap-1 cursor-pointer">
                    <input type="checkbox" id="rememberMe" class="accent-blue-600 w-4 h-4"> 
                    <span class="text-xs text-gray-600 font-bold">تذكرني</span>
                </label>
                <button onclick="App.forgotPassword()" class="text-blue-600 font-bold text-xs hover:underline">نسيت كلمة المرور؟</button>
            </div>
        </div>
        <button onclick="App.doLogin()" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-3.5 rounded-xl font-black text-sm shadow-lg shadow-blue-200 hover:shadow-xl transition-all mt-4">
            تسجيل الدخول
        </button>
        <p id="loginMsg" class="text-center text-xs text-red-500 font-bold mt-3 hidden"></p>
    </div>
</div>

<!-- ============================================================ -->
<!-- التطبيق الرئيسي -->
<!-- ============================================================ -->
<div id="mainApp" class="hidden flex flex-col h-full">
    <header class="bg-blue-700 text-white p-4 flex items-center justify-between sticky top-0 z-30 shadow-md flex-shrink-0">
        <span class="font-black text-sm">مشرف المخازن</span>
        <div class="flex items-center gap-2">
            <span class="text-xs font-bold" id="headerUserName"></span>
            <button onclick="App.doLogout()" class="bg-white/10 w-8 h-8 rounded-full"><i class="fa-solid fa-arrow-right-from-bracket text-xs"></i></button>
        </div>
    </header>

    <div class="flex gap-1 p-2 bg-white border-b overflow-x-auto flex-shrink-0">
        <button onclick="App.switchTab('dashboard')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm bg-blue-600 text-white" id="tab-dashboard">📊 لوحة التحكم</button>
        <button onclick="App.switchTab('roster')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm text-gray-500" id="tab-roster">👥 الفريق</button>
        <button onclick="App.switchTab('live')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm text-gray-500" id="tab-live">🔴 الحي</button>
    </div>

    <main id="mainContent" class="flex-1 overflow-y-auto p-4"></main>
</div>

<script>
// ============================================================
// التهيئة
// ============================================================
var SUPABASE_URL = 'https://fiilmooggumokxanwiyx.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpaWxtb29nZ3Vtb2t4YW53aXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDkwOTIsImV4cCI6MjA5NDI4NTA5Mn0.LZScCxnCiRrTSCCBmTryszQpY1AwBgR2dkTBbC5kOc4';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function byId(id) { return document.getElementById(id); }
function safeHTML(el, html) { if (el) el.innerHTML = html; }
function safeText(el, text) { if (el) el.textContent = text; }
function fmtNum(n) { return Number(n || 0).toLocaleString('ar-EG'); }
function toast(m, t) { Swal.fire({ toast: true, position: 'top', icon: t || 'info', title: m, showConfirmButton: false, timer: 2000 }); }

// ============================================================
// التطبيق
// ============================================================
var App = {
    currentUser: null,
    staffList: [],
    dashboardData: {},
    currentTab: 'dashboard',
    currentLiveCat: 'picking',

    // ==================== نسيت كلمة المرور ====================
    forgotPassword: function() {
        var email = byId('loginEmail').value.trim();
        if (!email) { toast('أدخل بريدك الإلكتروني أولاً', 'warning'); return; }
        Swal.showLoading();
        supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/reset-password' }).then(function(res) {
            Swal.close();
            if (res.error) toast(res.error.message, 'error');
            else toast('تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك', 'success');
        }).catch(function() { Swal.close(); toast('فشل الاتصال بالخادم', 'error'); });
    },

    // ==================== الدخول ====================
    doLogin: function() {
        var email = byId('loginEmail').value.trim();
        var pass = byId('loginPass').value.trim();
        if (!email || !pass) {
            byId('loginMsg').innerText = 'أدخل البريد الإلكتروني وكلمة المرور';
            byId('loginMsg').classList.remove('hidden');
            return;
        }
        byId('loginMsg').classList.add('hidden');
        var self = this;
        Swal.showLoading();
        supabase.auth.signInWithPassword({ email: email, password: pass }).then(function(res) {
            Swal.close();
            if (res.error) {
                byId('loginMsg').innerText = res.error.message;
                byId('loginMsg').classList.remove('hidden');
            } else {
                if (byId('rememberMe').checked) localStorage.setItem('remember_email', email);
                else localStorage.removeItem('remember_email');
                self.init();
            }
        }).catch(function() {
            Swal.close();
            byId('loginMsg').innerText = 'فشل الاتصال بالخادم';
            byId('loginMsg').classList.remove('hidden');
        });
    },

    init: function() {
        var self = this;
        var remembered = localStorage.getItem('remember_email');
        if (remembered) { byId('loginEmail').value = remembered; byId('rememberMe').checked = true; }

        supabase.auth.getSession().then(function(res) {
            if (res.data && res.data.session) {
                self.currentUser = res.data.session.user;
                var meta = self.currentUser.user_metadata || {};
                var role = meta.role || '';
                var isOwner = (meta.isOwner === true || meta.isOwner === 'true' || role === 'owner' || role === 'مالك');

                // ✅ الطريقة الصحيحة: قراءة الصلاحية من user_metadata مباشرة
                var perms = meta.permissions || [];
                var hasAccess = isOwner || (Array.isArray(perms) && perms.indexOf('warehouse_supervisor') !== -1);

                if (hasAccess) {
                    safeText(byId('headerUserName'), meta.name || self.currentUser.email);
                    self.enterApp();
                } else {
                    Swal.fire({ title: 'غير مصرح', text: 'ليس لديك صلاحية مشرف مخازن', icon: 'error' });
                    supabase.auth.signOut();
                }
            }
        });
    },

    enterApp: function() {
        byId('loginScreen').classList.add('hidden');
        byId('mainApp').classList.remove('hidden');
        this.switchTab('dashboard');
    },

    doLogout: function() {
        var self = this;
        supabase.auth.signOut().then(function() {
            self.currentUser = null;
            byId('mainApp').classList.add('hidden');
            byId('loginScreen').classList.remove('hidden');
            byId('loginEmail').value = '';
            byId('loginPass').value = '';
            byId('loginMsg').classList.add('hidden');
        });
    },

    // ==================== التبويبات ====================
    switchTab: function(tab) {
        this.currentTab = tab;
        var tabs = ['dashboard', 'roster', 'live'];
        for (var i = 0; i < tabs.length; i++) {
            var btn = byId('tab-' + tabs[i]);
            if (btn) { btn.classList.remove('bg-blue-600', 'text-white'); btn.classList.add('text-gray-500'); }
        }
        var activeBtn = byId('tab-' + tab);
        if (activeBtn) { activeBtn.classList.add('bg-blue-600', 'text-white'); activeBtn.classList.remove('text-gray-500'); }
        if (tab === 'dashboard') this.renderDashboard();
        else if (tab === 'roster') this.renderRoster();
        else if (tab === 'live') this.renderLiveView();
    },

    // ==================== لوحة التحكم ====================
    renderDashboard: function() {
        var self = this;
        safeHTML(byId('mainContent'), '<div class="text-center py-10 text-gray-400"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>');
        Promise.all([
            supabase.from('purchase_orders').select('id').in('status', ['Sent','Partially Received']),
            supabase.from('runsheets').select('id').eq('status', 'Picking'),
            supabase.from('runsheets').select('id').eq('status', 'Loading'),
            supabase.from('runsheets').select('id').eq('status', 'Returning'),
            supabase.from('runsheets').select('id').eq('status', 'Loaded')
        ]).then(function(results) {
            self.dashboardData = {
                receiving: { count: results[0].data ? results[0].data.length : 0 },
                picking: { count: results[1].data ? results[1].data.length : 0 },
                loading: { count: results[2].data ? results[2].data.length : 0 },
                returns: { count: results[3].data ? results[3].data.length : 0 },
                unloading: { count: results[4].data ? results[4].data.length : 0 }
            };
            var html = '<h2 class="text-lg font-black mb-4">نظرة عامة</h2><div class="grid grid-cols-2 gap-3">';
            var keys = ['receiving', 'picking', 'loading', 'returns', 'unloading'];
            var labels = ['📦 استلام', '📋 تحضير', '🚛 تحميل', '↩️ مرتجعات', '🔄 تفريغ'];
            for (var i = 0; i < keys.length; i++) {
                html += '<div class="stat-card" onclick="App.switchTab(\'live\');App.switchLiveCat(\'' + keys[i] + '\')"><div class="text-2xl mb-1">' + labels[i].split(' ')[0] + '</div><div class="text-2xl font-black">' + self.dashboardData[keys[i]].count + '</div><div class="text-xs text-gray-500">' + labels[i].split(' ')[1] + '</div></div>';
            }
            html += '</div><button onclick="App.switchTab(\'roster\')" class="btn-primary mt-4"><i class="fa-solid fa-users ml-2"></i> إدارة الفريق</button>';
            safeHTML(byId('mainContent'), html);
        }).catch(function() {
            safeHTML(byId('mainContent'), '<div class="text-center py-10 text-red-500">فشل تحميل البيانات</div>');
        });
    },

    // ==================== الفريق ====================
renderRoster: function() {
    var self = this;
    safeHTML(byId('mainContent'), '<div class="text-center py-10 text-gray-400"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>');
    
    // ✅ طريقة مباشرة: جلب كل users ثم تصفيتهم
    supabase.from('users').select('id, name, email, active_warehouse_role').then(function(res) {
        if (res.error) {
            // إذا فشل بسبب RLS، نجرب طريقة مختلفة
            console.error('Users fetch error:', res.error);
            safeHTML(byId('mainContent'), '<div class="text-center py-10 text-red-500">فشل تحميل بيانات الفريق - خطأ في الصلاحيات</div>');
            return;
        }
        
        self.staffList = res.data || [];
        var html = '<h2 class="text-lg font-black mb-4">👥 فريق المخازن</h2><p class="text-sm text-gray-500 mb-4">اختر دوراً جديداً لكل موظف. التغيير فوري.</p>';
        if (!self.staffList.length) {
            html += '<div class="card text-center text-gray-500">لا يوجد موظفون</div>';
        } else {
            var roles = ['استلام', 'تحضير', 'تحميل', 'مرتجعات', 'تفريغ', 'جرد', 'أذونات', 'احتياطي'];
            var icons = { 'استلام':'📦','تحضير':'📋','تحميل':'🚛','مرتجعات':'↩️','تفريغ':'🔄','جرد':'🔍','أذونات':'📄','احتياطي':'🪑' };
            for (var i = 0; i < self.staffList.length; i++) {
                var emp = self.staffList[i];
                var role = emp.active_warehouse_role || 'احتياطي';
                html += '<div class="card mb-3"><div class="flex justify-between items-center mb-3"><div><span class="font-bold">' + emp.name + '</span><br><span class="text-xs text-gray-400">' + emp.email + '</span></div><span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold">' + (icons[role]||'') + ' ' + role + '</span></div><select class="role-select" onchange="App.updateRole(\'' + emp.id + '\', this.value)">';
                for (var j = 0; j < roles.length; j++) {
                    html += '<option value="' + roles[j] + '"' + (roles[j] === role ? ' selected' : '') + '>' + (icons[roles[j]]||'') + ' ' + roles[j] + '</option>';
                }
                html += '</select></div>';
            }
        }
        safeHTML(byId('mainContent'), html);
    }).catch(function(e) {
        console.error('Fetch error:', e);
        safeHTML(byId('mainContent'), '<div class="text-center py-10 text-red-500">فشل تحميل بيانات الفريق</div>');
    });
},

    updateRole: function(userId, newRole) {
        var self = this;
        Swal.showLoading();
        supabase.from('users').update({ active_warehouse_role: newRole }).eq('id', userId).then(function(res) {
            Swal.close();
            if (res.error) { Swal.fire({ title: 'خطأ', text: res.error.message, icon: 'error' }); }
            else {
                for (var i = 0; i < self.staffList.length; i++) {
                    if (self.staffList[i].id === userId) { self.staffList[i].active_warehouse_role = newRole; break; }
                }
                self.renderRoster();
            }
        });
    },

    // ==================== العرض الحي ====================
    renderLiveView: function() {
        var html = '<h2 class="text-lg font-black mb-4">🔴 مراقبة حية</h2>';
        html += '<div class="flex gap-2 overflow-x-auto pb-2 mb-4">';
        var cats = ['picking', 'loading', 'returns', 'receiving', 'unloading'];
        var labels = ['📋 تحضير', '🚛 تحميل', '↩️ مرتجعات', '📦 استلام', '🔄 تفريغ'];
        for (var i = 0; i < cats.length; i++) {
            var activeClass = (this.currentLiveCat === cats[i]) ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600';
            html += '<button onclick="App.switchLiveCat(\'' + cats[i] + '\')" class="whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm ' + activeClass + '">' + labels[i] + '</button>';
        }
        html += '</div><div id="liveContent"><div class="text-center py-10 text-gray-400">جاري التحميل...</div></div>';
        safeHTML(byId('mainContent'), html);
        this.switchLiveCat(this.currentLiveCat);
    },

    switchLiveCat: function(cat) {
        this.currentLiveCat = cat;
        var container = byId('liveContent');
        if (!container) return;
        safeHTML(container, '<div class="text-center py-10 text-gray-400"><i class="fa-solid fa-spinner fa-spin"></i></div>');
        var query;
        if (cat === 'receiving') {
            query = supabase.from('purchase_orders').select('id, po_code, supplier_name').in('status', ['Sent','Partially Received']);
        } else {
            var status = cat === 'picking' ? 'Picking' : cat === 'loading' ? 'Loading' : cat === 'returns' ? 'Returning' : 'Loaded';
            query = supabase.from('runsheets').select('id, runsheet_code, picker_id, loader_id, return_handler_id, picker_start, loader_start, return_start').eq('status', status);
        }
        query.then(function(res) {
            var items = res.data || [];
            var html = '';
            if (!items.length) { html = '<div class="card text-center text-gray-500">لا توجد عمليات جارية</div>'; }
            else {
                var staffMap = {};
                for (var s = 0; s < App.staffList.length; s++) { staffMap[App.staffList[s].id] = App.staffList[s].name; }
                for (var i = 0; i < items.length; i++) {
                    var item = items[i];
                    var code = item.runsheet_code || item.po_code || '---';
                    var staffId = item.picker_id || item.loader_id || item.return_handler_id || null;
                    var startTime = item.picker_start || item.loader_start || item.return_start || null;
                    var elapsed = '---';
                    if (startTime) { var diff = Math.floor((new Date() - new Date(startTime)) / 1000); var m = Math.floor(diff / 60), s = diff % 60; elapsed = m + ':' + String(s).padStart(2, '0'); }
                    html += '<div class="card mb-3"><div class="flex justify-between items-center"><div><span class="font-bold">' + code + '</span></div><span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold pulse">⏱️ ' + elapsed + '</span></div><div class="mt-2 text-sm text-gray-600"><i class="fa-solid fa-user ml-1"></i> ' + (staffId ? (staffMap[staffId] || staffId) : 'غير معين') + '</div></div>';
                }
            }
            safeHTML(container, html);
        }).catch(function() { safeHTML(container, '<div class="text-center py-10 text-red-500">فشل التحميل</div>'); });
    }
};

// ============================================================
// بدء التشغيل
// ============================================================
document.addEventListener('DOMContentLoaded', function() { App.init(); });
</script>
</body>
</html>
