<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>مشرف المخازن | الروائع ERP</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.107.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f3f4f6; height: 100vh; overflow: hidden; }
        .card { background: white; border-radius: 20px; padding: 1.25rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .stat-card { background: white; border-radius: 16px; padding: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: transform 0.2s; }
        .stat-card:active { transform: scale(0.98); }
        .btn-primary { background: #2563eb; color: white; padding: 0.75rem 1.5rem; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; width: 100%; }
        .btn-primary:active { background: #1d4ed8; }
        .role-select { width: 100%; padding: 0.5rem; border: 1px solid #e5e7eb; border-radius: 10px; font-weight: 600; font-size: 0.875rem; background: #f9fafb; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: white; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 10; }
        .tabs { display: flex; gap: 0.5rem; overflow-x: auto; padding: 0.75rem 1rem; background: white; border-bottom: 1px solid #e5e7eb; }
        .tab-btn { padding: 0.5rem 1rem; border-radius: 20px; font-weight: 700; font-size: 0.8rem; white-space: nowrap; background: #f3f4f6; color: #4b5563; border: none; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: #2563eb; color: white; }
        .progress-bar { width: 100%; height: 6px; background: #e5e7eb; border-radius: 3px; margin-top: 0.5rem; }
        .progress-fill { height: 100%; border-radius: 3px; background: #2563eb; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Header -->
    <div class="header">
        <div>
            <h1 class="text-xl font-black text-gray-800">مشرف المخازن</h1>
            <p class="text-xs text-gray-500" id="header-date"></p>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-sm font-bold text-gray-600" id="user-name-display"></span>
            <button onclick="handleLogout()" class="text-red-500 hover:text-red-700 p-2">
                <i class="fa-solid fa-right-from-bracket text-lg"></i>
            </button>
        </div>
    </div>

    <!-- Main Tabs -->
    <div class="tabs" id="main-tabs" style="display:none;">
        <button class="tab-btn active" onclick="switchTab('dashboard')" id="tab-dashboard">📊 لوحة التحكم</button>
        <button class="tab-btn" onclick="switchTab('roster')" id="tab-roster">👥 الفريق</button>
    </div>

    <!-- Live View Tabs -->
    <div class="tabs" id="live-tabs" style="display:none;">
        <button class="tab-btn active" onclick="switchLiveTab('receiving')" id="ltab-receiving">📦 استلام</button>
        <button class="tab-btn" onclick="switchLiveTab('picking')" id="ltab-picking">📋 تحضير</button>
        <button class="tab-btn" onclick="switchLiveTab('loading')" id="ltab-loading">🚛 تحميل</button>
        <button class="tab-btn" onclick="switchLiveTab('returns')" id="ltab-returns">↩️ مرتجعات</button>
        <button class="tab-btn" onclick="switchLiveTab('unloading')" id="ltab-unloading">🔄 تفريغ</button>
    </div>

    <!-- Content -->
    <div class="flex-1 overflow-y-auto p-4" id="main-content"></div>

    <!-- Bottom Bar -->
    <div class="bg-white border-t p-3 flex justify-around md:hidden">
        <button onclick="switchTab('dashboard')" class="flex flex-col items-center text-blue-600" id="mob-dashboard">
            <i class="fa-solid fa-chart-pie text-lg"></i><span class="text-xs font-bold">التحكم</span>
        </button>
        <button onclick="switchTab('roster')" class="flex flex-col items-center text-gray-400" id="mob-roster">
            <i class="fa-solid fa-users text-lg"></i><span class="text-xs font-bold">الفريق</span>
        </button>
    </div>

<script>
// ============================================================
// SAFE ENGINE – متغيرات أساسية
// ============================================================
var SUPABASE_URL = 'https://fiilmooggumokxanwiyx.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpaWxtb29nZ3Vtb2t4YW53aXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDkwOTIsImV4cCI6MjA5NDI4NTA5Mn0.LZScCxnCiRrTSCCBmTryszQpY1AwBgR2dkTBbC5kOc4';
var supabase = null;
var currentUser = null;
var staffList = [];
var dashboardData = {};
var currentLiveTab = 'picking';
var liveRefreshInterval = null;

// ============================================================
// دوال مساعدة
// ============================================================
function byId(id) { return document.getElementById(id); }
function showLoader(msg) { Swal.fire({ title: msg || 'جاري التحميل...', allowOutsideClick: false, didOpen: function() { Swal.showLoading(); } }); }
function hideLoader() { Swal.close(); }
function showToast(msg, icon) { Swal.fire({ title: msg, icon: icon || 'success', timer: 2000, showConfirmButton: false }); }

// ============================================================
// التهيئة الأولية
// ============================================================
function initApp() {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: true, autoRefreshToken: true }
    });
    checkSession();
    document.getElementById('header-date').innerText = new Date().toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

async function checkSession() {
    var ses = await supabase.auth.getSession();
    if (ses.data && ses.data.session) {
        currentUser = ses.data.session.user;
        var userRes = await supabase.from('users').select('permissions').eq('email', currentUser.email).maybeSingle();
        var perms = (userRes.data && userRes.data.permissions) ? userRes.data.permissions : [];
        if (perms.indexOf('warehouse_supervisor') !== -1 || perms.indexOf('*') !== -1) {
            document.getElementById('user-name-display').innerText = currentUser.user_metadata.name || currentUser.email;
            document.getElementById('main-tabs').style.display = 'flex';
            switchTab('dashboard');
        } else {
            showToast('ليس لديك صلاحية الوصول لهذا التطبيق', 'error');
            setTimeout(function() { supabase.auth.signOut(); }, 2000);
        }
    } else {
        showLoginScreen();
    }
}

// ============================================================
// تسجيل الدخول
// ============================================================
function showLoginScreen() {
    var html = '<div class="flex items-center justify-center h-full p-6">';
    html += '<div class="w-full max-w-sm bg-white rounded-3xl shadow-xl p-8">';
    html += '<h1 class="text-2xl font-black text-center mb-6">مشرف المخازن</h1>';
    html += '<input id="login-email" type="email" placeholder="البريد الإلكتروني" class="w-full p-3 bg-gray-50 border rounded-xl mb-3 text-sm">';
    html += '<input id="login-pass" type="password" placeholder="كلمة المرور" class="w-full p-3 bg-gray-50 border rounded-xl mb-6 text-sm">';
    html += '<button onclick="handleLogin()" class="btn-primary">دخول</button>';
    html += '</div></div>';
    document.getElementById('main-content').innerHTML = html;
    document.getElementById('main-tabs').style.display = 'none';
    document.getElementById('live-tabs').style.display = 'none';
}

async function handleLogin() {
    var email = document.getElementById('login-email').value;
    var pass = document.getElementById('login-pass').value;
    if (!email || !pass) { showToast('أدخل البريد وكلمة المرور', 'warning'); return; }
    showLoader('جاري الدخول...');
    var authRes = await supabase.auth.signInWithPassword({ email: email, password: pass });
    hideLoader();
    if (authRes.error) {
        showToast(authRes.error.message, 'error');
    } else {
        currentUser = authRes.data.user;
        document.getElementById('main-tabs').style.display = 'flex';
        switchTab('dashboard');
    }
}

function handleLogout() {
    supabase.auth.signOut().then(function() {
        currentUser = null;
        showLoginScreen();
    });
}

// ============================================================
// التبويبات والتنقل
// ============================================================
function switchTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(function(btn) { btn.classList.remove('active'); });
    var activeTab = document.getElementById('tab-' + tabId);
    if (activeTab) activeTab.classList.add('active');

    // إخفاء Live View Tabs إذا كنا في لوحة التحكم أو الفريق
    if (tabId === 'dashboard' || tabId === 'roster') {
        document.getElementById('live-tabs').style.display = 'none';
        if (liveRefreshInterval) { clearInterval(liveRefreshInterval); liveRefreshInterval = null; }
    }

    if (tabId === 'dashboard') renderDashboard();
    else if (tabId === 'roster') renderRoster();
}

// ============================================================
// لوحة التحكم (محسّنة)
// ============================================================
async function renderDashboard() {
    showLoader('جاري تحميل العمليات...');
    try {
        var [receivingRes, pickingRes, loadingRes, returnRes, unloadingRes] = await Promise.all([
            supabase.from('purchase_orders').select('id, po_code, supplier_name').in('status', ['Sent','Partially Received']),
            supabase.from('runsheets').select('id, runsheet_code, picker_id, picker_start').eq('status', 'Picking'),
            supabase.from('runsheets').select('id, runsheet_code, loader_id, loader_start').eq('status', 'Loading'),
            supabase.from('runsheets').select('id, runsheet_code, return_handler_id, return_start').eq('status', 'Returning'),
            supabase.from('runsheets').select('id, runsheet_code, driver_id').eq('status', 'Loaded')
        ]);

        dashboardData = {
            receiving: { count: receivingRes.data ? receivingRes.data.length : 0, items: receivingRes.data || [] },
            picking: { count: pickingRes.data ? pickingRes.data.length : 0, items: pickingRes.data || [] },
            loading: { count: loadingRes.data ? loadingRes.data.length : 0, items: loadingRes.data || [] },
            returns: { count: returnRes.data ? returnRes.data.length : 0, items: returnRes.data || [] },
            unloading: { count: unloadingRes.data ? unloadingRes.data.length : 0, items: unloadingRes.data || [] }
        };

        var html = '<div class="space-y-4">';
        html += '<h2 class="text-lg font-black text-gray-800">نظرة عامة على العمليات الجارية</h2>';
        html += '<div class="grid grid-cols-2 gap-3">';
        var keys = ['receiving', 'picking', 'loading', 'returns', 'unloading'];
        for (var i = 0; i < keys.length; i++) {
            var item = dashboardData[keys[i]];
            var icon = keys[i] === 'receiving' ? '📦' : keys[i] === 'picking' ? '📋' : keys[i] === 'loading' ? '🚛' : keys[i] === 'returns' ? '↩️' : '🔄';
            var label = keys[i] === 'receiving' ? 'أوامر استلام' : keys[i] === 'picking' ? 'قيد التحضير' : keys[i] === 'loading' ? 'قيد التحميل' : keys[i] === 'returns' ? 'قيد المرتجعات' : 'جاهز للتفريغ';
            html += '<div class="stat-card cursor-pointer" onclick="showLiveView(\'' + keys[i] + '\')">';
            html += '<div class="text-2xl mb-1">' + icon + '</div>';
            html += '<div class="text-2xl font-black text-gray-800">' + item.count + '</div>';
            html += '<div class="text-xs text-gray-500">' + label + '</div>';
            if (item.count > 0) {
                html += '<div class="progress-bar mt-2"><div class="progress-fill pulse" style="width:' + Math.min(100, item.count * 20) + '%"></div></div>';
            }
            html += '</div>';
        }
        html += '</div>';
        html += '<button onclick="switchTab(\'roster\')" class="btn-primary mt-4"><i class="fa-solid fa-users ml-2"></i> إدارة الفريق</button>';
        html += '</div>';
        document.getElementById('main-content').innerHTML = html;
        hideLoader();
    } catch(e) {
        hideLoader();
        document.getElementById('main-content').innerHTML = '<div class="text-center py-10 text-red-500">فشل تحميل البيانات</div>';
    }
}

// ============================================================
// عرض تفاصيل العمليات (Live View)
// ============================================================
function showLiveView(category) {
    currentLiveTab = category;
    document.getElementById('live-tabs').style.display = 'flex';
    document.querySelectorAll('#live-tabs .tab-btn').forEach(function(btn) { btn.classList.remove('active'); });
    var activeLtab = document.getElementById('ltab-' + category);
    if (activeLtab) activeLtab.classList.add('active');
    if (liveRefreshInterval) clearInterval(liveRefreshInterval);
    liveRefreshInterval = setInterval(function() { switchLiveTab(currentLiveTab); }, 30000);
    switchLiveTab(category);
}

async function switchLiveTab(category) {
    currentLiveTab = category;
    var content = document.getElementById('main-content');
    if (!content) return;
    showLoader('جاري تحميل التفاصيل...');

    var titleMap = { 'receiving': '📦 أوامر الاستلام الجارية', 'picking': '📋 عمليات التحضير الجارية', 'loading': '🚛 عمليات التحميل الجارية', 'returns': '↩️ عمليات المرتجعات الجارية', 'unloading': '🔄 الرانشيتات الجاهزة للتفريغ' };

    var staffMap = {};
    for (var s = 0; s < staffList.length; s++) { staffMap[staffList[s].id] = staffList[s].name; }

    var html = '<div class="space-y-4">';
    html += '<button onclick="switchTab(\'dashboard\')" class="text-blue-600 font-bold text-sm mb-4"><i class="fa-solid fa-arrow-right ml-1"></i> العودة للوحة التحكم</button>';
    html += '<h2 class="text-lg font-black text-gray-800">' + (titleMap[category] || 'تفاصيل العمليات') + '</h2>';

    if (!dashboardData[category] || !dashboardData[category].items || dashboardData[category].items.length === 0) {
        html += '<div class="card text-center text-gray-500">لا توجد عمليات جارية حالياً في هذا القسم</div>';
    } else {
        var items = dashboardData[category].items;
        for (var i = 0; i < items.length; i++) {
            var item = items[i];
            var code = item.runsheet_code || item.po_code || '---';
            var staffId = item.picker_id || item.loader_id || item.return_handler_id || item.driver_id || null;
            var staffName = staffId ? (staffMap[staffId] || 'غير معروف') : 'غير معين';
            var startTime = item.picker_start || item.loader_start || item.return_start || null;
            var elapsed = calculateElapsed(startTime);
            html += '<div class="card"><div class="flex justify-between items-center">';
            html += '<div><span class="font-bold text-gray-800">' + code + '</span>';
            if (category === 'receiving') { html += '<br><span class="text-xs text-gray-500">المورد: ' + (item.supplier_name || '---') + '</span>'; }
            html += '</div>';
            html += '<span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold pulse">⏱️ ' + elapsed + '</span>';
            html += '</div>';
            html += '<div class="mt-2 text-sm text-gray-600"><i class="fa-solid fa-user ml-1"></i> ' + staffName + '</div>';
            html += '</div>';
        }
    }
    html += '</div>';
    content.innerHTML = html;
    hideLoader();
}

function calculateElapsed(startTime) {
    if (!startTime) return '---';
    var start = new Date(startTime);
    var now = new Date();
    var diffMs = now - start;
    if (diffMs < 0) return '0:00';
    var totalSec = Math.floor(diffMs / 1000);
    var hours = Math.floor(totalSec / 3600);
    var minutes = Math.floor((totalSec % 3600) / 60);
    var seconds = totalSec % 60;
    if (hours > 0) { return hours + ':' + String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0'); }
    return minutes + ':' + String(seconds).padStart(2, '0');
}

// ============================================================
// إدارة الفريق (محسّنة)
// ============================================================
async function renderRoster() {
    showLoader('جاري تحميل الفريق...');
    try {
        var res = await supabase.from('users').select('id, name, email, active_warehouse_role').contains('permissions', ['warehouse']);
        staffList = res.data || [];
        var html = '<div class="space-y-4">';
        html += '<h2 class="text-lg font-black text-gray-800">👥 فريق المخازن – تعديل الأدوار</h2>';
        html += '<p class="text-sm text-gray-500">اختر دوراً جديداً لكل موظف من القائمة المنسدلة. التغيير فوري.</p>';
        if (staffList.length === 0) {
            html += '<div class="card text-center text-gray-500">لا يوجد موظفون مخزنيون</div>';
        } else {
            var roles = ['استلام', 'تحضير', 'تحميل', 'مرتجعات', 'تفريغ', 'جرد', 'أذونات', 'احتياطي'];
            var roleIcons = { 'استلام': '📦', 'تحضير': '📋', 'تحميل': '🚛', 'مرتجعات': '↩️', 'تفريغ': '🔄', 'جرد': '🔍', 'أذونات': '📄', 'احتياطي': '🪑' };
            for (var i = 0; i < staffList.length; i++) {
                var emp = staffList[i];
                var currentRole = emp.active_warehouse_role || 'احتياطي';
                var icon = roleIcons[currentRole] || '👤';
                html += '<div class="card">';
                html += '<div class="flex justify-between items-center mb-3">';
                html += '<div><span class="font-bold text-gray-800">' + emp.name + '</span><br><span class="text-xs text-gray-400">' + emp.email + '</span></div>';
                html += '<span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold">' + icon + ' ' + currentRole + '</span>';
                html += '</div>';
                html += '<select class="role-select" onchange="updateStaffRole(\'' + emp.id + '\', this.value)">';
                for (var j = 0; j < roles.length; j++) {
                    var sel = (roles[j] === currentRole) ? ' selected' : '';
                    html += '<option value="' + roles[j] + '"' + sel + '>' + roleIcons[roles[j]] + ' ' + roles[j] + '</option>';
                }
                html += '</select>';
                html += '</div>';
            }
        }
        html += '</div>';
        document.getElementById('main-content').innerHTML = html;
        hideLoader();
    } catch(e) {
        hideLoader();
        document.getElementById('main-content').innerHTML = '<div class="text-center py-10 text-red-500">فشل تحميل بيانات الفريق</div>';
    }
}

async function updateStaffRole(userId, newRole) {
    var emp = staffList.find(function(e) { return e.id === userId; });
    if (!emp) return;
    showLoader('جاري تحديث الدور...');
    var res = await supabase.from('users').update({ active_warehouse_role: newRole }).eq('id', userId);
    hideLoader();
    if (res.error) {
        showToast('فشل التحديث: ' + res.error.message, 'error');
    } else {
        emp.active_warehouse_role = newRole;
        showToast('تم تحديث دور ' + emp.name + ' إلى ' + newRole, 'success');
        renderRoster();
    }
}

// ============================================================
// بدء التشغيل
// ============================================================
initApp();
</script>
</body>
</html>
