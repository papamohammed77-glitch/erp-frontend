<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>الروائع ERP | نظام متكامل</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Cairo',sans-serif;background:#f8fafc;overflow-x:hidden;color:#111827}:root{--rw-primary:#2563eb;--rw-primary-dark:#1d4ed8}
    .rw-login-page{width:100%;min-height:100vh;display:flex;position:relative;background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 35%,#2563eb 100%)}
    .rw-login-left{width:50%;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:80px 90px;position:relative;z-index:2}
    .rw-brand-badge{width:fit-content;padding:12px 22px;border-radius:999px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.15);color:white;font-size:14px;font-weight:700;backdrop-filter:blur(12px);margin-bottom:28px}
    .rw-login-title{font-size:64px;line-height:1.2;font-weight:900;color:white;margin-bottom:28px}
    .rw-login-description{color:rgba(255,255,255,0.78);font-size:20px;line-height:2;margin-bottom:48px;max-width:620px}
    .rw-login-features{display:flex;flex-direction:column;gap:18px}
    .rw-login-feature{display:flex;align-items:center;gap:16px;color:white;font-size:18px;font-weight:700}
    .rw-login-feature-icon{width:52px;height:52px;border-radius:18px;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:22px}
    .rw-login-right{width:50%;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;z-index:2}
    .rw-login-card{width:100%;max-width:520px;background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);border-radius:36px;padding:48px 42px;box-shadow:0 30px 80px rgba(0,0,0,0.18)}
    .rw-login-logo-area{display:flex;flex-direction:column;align-items:center;margin-bottom:38px}
    .rw-login-logo{width:120px;height:120px;border-radius:32px;background:linear-gradient(135deg,#2563eb,#1d4ed8);display:flex;align-items:center;justify-content:center;color:white;font-size:42px;font-weight:900;margin-bottom:22px}
    .rw-login-form{display:flex;flex-direction:column;gap:24px}
    .rw-input{width:100%;height:64px;border-radius:20px;border:2px solid #e5e7eb;background:white;padding:0 58px 0 20px;font-size:16px;font-weight:700}
    .rw-input:focus{border-color:#2563eb;box-shadow:0 0 0 5px rgba(37,99,235,0.10)}
    .rw-login-btn{width:100%;height:64px;border-radius:22px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;font-size:18px;font-weight:900;cursor:pointer}
    .rw-main-shell{width:100%;min-height:100vh;display:flex;background:#f8fafc}
    .rw-sidebar{width:280px;min-width:280px;height:100vh;background:#fff;display:flex;flex-direction:column;position:fixed;top:0;right:0;z-index:500;border-left:1px solid #e5e7eb;overflow-y:auto}
    .rw-sidebar-top{padding:60px 24px 18px;border-bottom:1px solid #f1f5f9;text-align:center}
    .rw-sidebar-company-name{font-size:20px;font-weight:900}
    .rw-sidebar-nav{flex:1;padding:18px 16px}
    .rw-sidebar-link{width:100%;height:52px;border-radius:16px;display:flex;align-items:center;gap:16px;padding:0 18px;margin-bottom:6px;color:#475569;cursor:pointer;font-weight:600;transition:0.2s}
    .rw-sidebar-link:hover{background:#f1f5f9;color:#0f172a}
    .rw-sidebar-link.active{background:#eff6ff;color:#2563eb;font-weight:800}
    .rw-sidebar-link-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:#f1f5f9;font-size:16px;color:#64748b}
    .rw-sidebar-link.active .rw-sidebar-link-icon{background:#2563eb;color:white}
    .rw-main-content{width:100%;margin-right:280px;min-height:100vh;display:flex;flex-direction:column}
    .rw-header{height:96px;background:white;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;padding:0 34px;position:sticky;top:0;z-index:100}
    .rw-header-title{font-size:28px;font-weight:900}
    .rw-page-container{flex:1;padding:34px}
    .rw-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-bottom:28px}
    .rw-kpi-card{background:white;border-radius:30px;padding:28px;box-shadow:0 8px 30px rgba(0,0,0,0.04)}
    .rw-card{background:white;border-radius:30px;padding:28px;box-shadow:0 8px 30px rgba(0,0,0,0.04)}
    @media(max-width:992px){.rw-login-left{display:none}.rw-login-right{width:100%}.rw-sidebar{transform:translateX(100%)}.rw-main-content{margin-right:0}}
  </style>
</head>
<body>
<div id="rw-login-page" class="rw-login-page">
  <div class="rw-login-left"><div class="rw-brand-badge">RAWAEA ERP ENTERPRISE</div><h1 class="rw-login-title">منصة إدارة الأعمال الذكية</h1><div class="rw-login-description">نظام ERP متكامل لإدارة المبيعات والمخزون والحسابات</div><div class="rw-login-features"><div class="rw-login-feature"><div class="rw-login-feature-icon">📦</div><div>إدارة المخزون</div></div><div class="rw-login-feature"><div class="rw-login-feature-icon">🚚</div><div>إدارة التوزيع</div></div></div></div>
  <div class="rw-login-right"><div class="rw-login-card"><div class="rw-login-logo-area"><div class="rw-login-logo">ر</div><div class="rw-company-name">الروائع ERP</div></div><form class="rw-login-form" id="rw-login-form"><input type="text" class="rw-input" id="rw-username" placeholder="اسم المستخدم"><input type="password" class="rw-input" id="rw-password" placeholder="كلمة المرور"><button type="submit" class="rw-login-btn">تسجيل الدخول</button></form></div></div>
</div>
<div id="rw-main-shell" class="rw-main-shell" style="display:none">
  <aside class="rw-sidebar" id="rw-sidebar"><div class="rw-sidebar-top"><div class="rw-sidebar-company-name" id="rw-sidebar-company-name">الروائع ERP</div></div><nav class="rw-sidebar-nav" id="rw-sidebar-nav"></nav></aside>
  <main class="rw-main-content" id="rw-main-content">
    <header class="rw-header"><div class="rw-header-title" id="rw-header-title">لوحة التحكم</div></header>
    <div class="rw-page-container" id="rw-page-container"></div>
  </main>
</div>
<script>
// ==================== الأساسيات ====================
var SUPABASE_URL='https://fiilmooggumokxanwiyx.supabase.co';
var SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpaWxtb29nZ3Vtb2t4YW53aXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDkwOTIsImV4cCI6MjA5NDI4NTA5Mn0.LZScCxnCiRrTSCCBmTryszQpY1AwBgR2dkTBbC5kOc4';
var supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

function byId(id){return document.getElementById(id);}
function safeHTML(el,html){if(!el)return;try{el.innerHTML=html;}catch(e){console.error(e);}}
function safeText(el,text){if(!el)return;try{el.innerText=text;}catch(e){console.error(e);}}
function showLoader(t){t=t||'جاري التحميل...';try{Swal.fire({title:t,allowOutsideClick:false,didOpen:function(){Swal.showLoading();}});}catch(e){console.error(e);}}
function hideLoader(){try{Swal.close();}catch(e){}}
function showToast(m,t){t=t||'success';try{Swal.fire({title:m,icon:t,timer:2000,showConfirmButton:false});}catch(e){alert(m);}}

var RW_STATE={app:{initialized:false,authenticated:false,currentView:'dashboard',currentUser:null,company:{name:'الروائع ERP'}},data:{items:[],customers:[],suppliers:[],branches:[]},permissions:[]};

var RW_Auth={
  login:async function(u,p){
    if(!u||!p){showToast('يرجى إدخال اسم المستخدم وكلمة المرور','error');return;}
    showLoader('جاري تسجيل الدخول...');
    try{
      var res=await supabase.auth.signInWithPassword({email:u,password:p});
      if(res.error){hideLoader();showToast('فشل تسجيل الدخول: '+res.error.message,'error');return;}
      var user=res.data.user;
      RW_STATE.app.authenticated=true;
      RW_STATE.app.currentUser={name:user.user_metadata?.name||user.email,email:user.email,role:user.user_metadata?.role||'مدير النظام',isOwner:(user.user_metadata?.isOwner)==='true'||(user.user_metadata?.isOwner)===true};
      RW_STATE.permissions=(user.user_metadata?.permissions)||['*'];
      RW_STATE.app.company={name:(user.user_metadata?.companyName)||'الروائع ERP'};
      this.enterSystem();
    }catch(e){hideLoader();showToast('حدث خطأ أثناء الاتصال','error');console.error(e);}
  },
  enterSystem:function(){
    hideLoader();
    try{
      byId('rw-login-page').style.display='none';byId('rw-main-shell').style.display='flex';
      safeText(byId('rw-sidebar-company-name'),RW_STATE.app.company.name||'الروائع ERP');
      RW_Navigation.buildSidebar();RW_Navigation.navigate('dashboard');
    }catch(e){console.error(e);}
  },
  logout:async function(){try{await supabase.auth.signOut();RW_STATE.app.authenticated=false;byId('rw-main-shell').style.display='none';byId('rw-login-page').style.display='flex';}catch(e){console.error(e);}}
};

var RW_Data={
  loadItems:async function(){try{var res=await supabase.from('items').select('*');if(res.error)throw res.error;RW_STATE.data.items=res.data||[];return RW_STATE.data.items;}catch(e){console.error(e);return[];}},
  loadCustomers:async function(){try{var res=await supabase.from('customers').select('*');if(res.error)throw res.error;RW_STATE.data.customers=res.data||[];return RW_STATE.data.customers;}catch(e){console.error(e);return[];}},
  loadSuppliers:async function(){try{var res=await supabase.from('suppliers').select('*');if(res.error)throw res.error;RW_STATE.data.suppliers=res.data||[];return RW_STATE.data.suppliers;}catch(e){console.error(e);return[];}},
  loadBranches:async function(){try{var res=await supabase.from('branches').select('*');if(res.error)throw res.error;RW_STATE.data.branches=res.data||[];return RW_STATE.data.branches;}catch(e){console.error(e);return[];}}
};

var RW_Navigation={
  menuTree:[
    {view:'dashboard',icon:'fa-chart-pie',label:'لوحة التحكم'},
    {icon:'fa-chart-line',label:'إدارة المبيعات',submenu:[{view:'customers',label:'العملاء'},{view:'pos',label:'نقطة البيع'},{view:'orders',label:'الأوردرات'}]},
    {icon:'fa-truck',label:'إدارة المشتريات',submenu:[{view:'suppliers',label:'الموردين'}]},
    {icon:'fa-warehouse',label:'المخازن',submenu:[{view:'items',label:'الأصناف'},{view:'branches',label:'الفروع'}]},
    {icon:'fa-coins',label:'الحسابات',submenu:[{view:'finance',label:'المالية'}]},
    {action:'logout',icon:'fa-right-from-bracket',label:'تسجيل الخروج'}
  ],
  _buildMenuHTML:function(items){var h='<ul style="list-style:none;padding:0;margin:0">';items.forEach(function(item){if(item.submenu){h+='<li style="margin-bottom:4px"><div class="rw-sidebar-link" style="justify-content:space-between" onclick="event.stopPropagation();var s=this.nextElementSibling;if(s)s.style.display=s.style.display===\'none\'?\'block\':\'none\'"><div style="display:flex;align-items:center;gap:16px"><div class="rw-sidebar-link-icon"><i class="fa-solid '+(item.icon||'fa-folder')+'"></i></div><div class="rw-sidebar-link-text">'+item.label+'</div></div><i class="fa-solid fa-chevron-down" style="font-size:11px;color:#94a3b8"></i></div><div style="display:none;padding-right:16px">'+this._buildMenuHTML(item.submenu)+'</div></li>';}else if(item.action){h+='<li style="margin-bottom:4px"><button class="rw-sidebar-link" onclick="RW_Navigation._handleAction(\''+item.action+'\')"><div class="rw-sidebar-link-icon"><i class="fa-solid '+(item.icon||'fa-cog')+'"></i></div><div class="rw-sidebar-link-text">'+item.label+'</div></button></li>';}else{h+='<li style="margin-bottom:4px"><button class="rw-sidebar-link" data-view="'+item.view+'"><div class="rw-sidebar-link-icon"><i class="fa-solid '+(item.icon||'fa-file')+'"></i></div><div class="rw-sidebar-link-text">'+item.label+'</div></button></li>';}});return h+'</ul>';},
  _handleAction:function(a){if(a==='logout'){RW_Auth.logout();}},
  buildSidebar:function(){try{var nav=byId('rw-sidebar-nav');if(!nav)return;var tree=this.menuTree;safeHTML(nav,this._buildMenuHTML(tree));nav.querySelectorAll('.rw-sidebar-link[data-view]').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();RW_Navigation.navigate(btn.dataset.view);});});}catch(e){console.error(e);}},
  navigate:function(view){try{RW_STATE.app.currentView=view;document.querySelectorAll('.rw-sidebar-link').forEach(function(el){el.classList.remove('active');});var act=document.querySelector('.rw-sidebar-link[data-view="'+view+'"]');if(act)act.classList.add('active');RW_Views.render(view);}catch(e){console.error(e);}}
};
var RW_Views = {
  render: async function(view) {
    var c = byId('rw-page-container'); if (!c) return;
    var titles = {
      'dashboard':'لوحة التحكم','items':'الأصناف','customers':'العملاء',
      'suppliers':'الموردين','branches':'المخازن والفروع','pos':'نقطة البيع',
      'orders':'أوردرات المبيعات','finance':'الحسابات والمالية'
    };
    safeText(byId('rw-header-title'), titles[view] || view);

    if (view === 'dashboard') { RW_Dashboard.render(); return; }
    if (view === 'items') { RW_Items.render(); return; }
    if (view === 'customers') { RW_Customers.render(); return; }
    if (view === 'suppliers') { RW_Suppliers.render(); return; }
    if (view === 'branches') { RW_Branches.render(); return; }

    safeHTML(c, '<div class="rw-card" style="text-align:center;padding:60px"><h2>'+(titles[view]||view)+'</h2><p style="color:#6b7280">قيد التطوير</p></div>');
  }
};

var RW_Dashboard = {
  render: async function() {
    var c = byId('rw-page-container'); if (!c) return;
    safeHTML(c, '<div class="rw-kpi-grid"><div class="rw-kpi-card"><div class="rw-kpi-title">إجمالي الأصناف</div><div class="rw-kpi-value" id="stat-items">---</div></div><div class="rw-kpi-card"><div class="rw-kpi-title">العملاء</div><div class="rw-kpi-value" id="stat-customers">---</div></div><div class="rw-kpi-card"><div class="rw-kpi-title">الموردين</div><div class="rw-kpi-value" id="stat-suppliers">---</div></div><div class="rw-kpi-card"><div class="rw-kpi-title">الفروع</div><div class="rw-kpi-value" id="stat-branches">---</div></div></div><div class="rw-card" style="text-align:center;padding:40px"><h3>مرحباً بك في الروائع ERP</h3></div>');
    try {
      var items = await RW_Data.loadItems();
      var customers = await RW_Data.loadCustomers();
      var suppliers = await RW_Data.loadSuppliers();
      var branches = await RW_Data.loadBranches();
      safeText(byId('stat-items'), items.length);
      safeText(byId('stat-customers'), customers.length);
      safeText(byId('stat-suppliers'), suppliers.length);
      safeText(byId('stat-branches'), branches.length);
    } catch(e) { console.error(e); }
  }
};

var RW_Items = (function() {
  var sortField = 'item_code', sortAsc = true, itemsData = [];

  function render() {
    var c = byId('rw-page-container'); if (!c) return;
    safeText(byId('rw-header-title'), 'الأصناف');
    safeHTML(c, '<div class="flex flex-col h-full"><div class="flex flex-wrap gap-3 mb-4"><input type="text" id="items-search" placeholder="بحث..." class="flex-1 p-3 bg-white rounded-xl border"><button id="btn-add-item" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold">صنف جديد</button></div><div class="flex-1 bg-white rounded-2xl shadow-sm border overflow-y-auto" id="items-table-wrapper"></div></div>');
    byId('items-search').addEventListener('input', filterTable);
    byId('btn-add-item').addEventListener('click', function() { openModal(null); });
    showLoader('جاري تحميل الأصناف...');
    RW_Data.loadItems().then(function(data) { itemsData = data; hideLoader(); renderTable(itemsData); });
  }

  function renderTable(data) {
    var w = byId('items-table-wrapper'); if (!w) return;
    if (!data.length) { safeHTML(w, '<div class="text-center p-10">لا توجد أصناف</div>'); return; }
    var sorted = data.slice().sort(function(a,b) {
      var va = a[sortField]||'', vb = b[sortField]||'';
      if (['qty','sales_price','max_qty'].indexOf(sortField) !== -1) { va = Number(va); vb = Number(vb); }
      else { va = String(va).toLowerCase(); vb = String(vb).toLowerCase(); }
      return (va<vb?-1:va>vb?1:0) * (sortAsc?1:-1);
    });
    var cols = [{field:'name',label:'المنتج'},{field:'category',label:'التصنيف'},{field:'unit',label:'الوحدة'},{field:'qty',label:'المخزون'},{field:'sales_price',label:'السعر'}];
    var h = '<table class="w-full text-sm"><thead class="sticky top-0 bg-gray-100 z-20"><tr>';
    for (var i = 0; i < cols.length; i++) {
      var col = cols[i];
      var icon = sortField===col.field ? (sortAsc?'fa-sort-up':'fa-sort-down') : 'fa-sort';
      h += '<th class="p-4 cursor-pointer font-bold" onclick="RW_Items._sort(\''+col.field+'\')">'+col.label+' <i class="fa-solid '+icon+'"></i></th>';
    }
    h += '</tr></thead><tbody>';
    for (var j = 0; j < sorted.length; j++) {
      var item = sorted[j];
      var img = item.image_url || 'https://via.placeholder.com/60';
      h += '<tr class="hover:bg-blue-50 cursor-pointer" onclick="RW_Items._openModal(\''+item.item_code+'\')"><td class="p-4"><div class="flex items-center gap-3"><img src="'+img+'" class="h-12 w-12 rounded-lg object-cover border" onerror="this.src=\'https://via.placeholder.com/60\'"><span class="font-medium">'+(item.name||'')+'</span></div></td><td class="p-4">'+(item.category||'-')+'</td><td class="p-4">'+(item.unit||'-')+'</td><td class="p-4">'+(item.qty||0)+'</td><td class="p-4 font-bold text-blue-600">'+Number(item.sales_price||0).toLocaleString()+' EGP</td></tr>';
    }
    h += '</tbody></table>';
    safeHTML(w, h);
  }

  function filterTable() {
    var q = (byId('items-search').value || '').toLowerCase();
    var filtered = itemsData.filter(function(i) { return (i.name||'').toLowerCase().indexOf(q)!==-1 || (i.item_code||'').toLowerCase().indexOf(q)!==-1; });
    renderTable(filtered);
  }

  function _sort(f) { if (sortField===f) sortAsc=!sortAsc; else { sortField=f; sortAsc=true; } renderTable(itemsData); }

  function openModal(itemCode) {
    var item = itemCode ? itemsData.find(function(i){ return i.item_code===itemCode; }) : null;
    var isEdit = !!item;
    var title = isEdit ? 'تعديل الصنف' : 'إضافة صنف جديد';
    var h = '<div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" dir="rtl"><div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl overflow-hidden"><div class="bg-blue-600 px-6 py-4 flex justify-between text-white"><h3 class="text-xl font-bold">'+title+'</h3><button onclick="Swal.close()">&times;</button></div><form class="p-6 space-y-6" style="max-height:70vh;overflow-y:auto"><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><input type="hidden" id="item-code-hidden" value="'+(item&&item.item_code||'')+'"><div class="flex flex-col"><label>الباركود</label><input id="item-barcode" value="'+(item&&item.barcode||'')+'" class="p-2.5 bg-gray-50 border rounded-lg"></div><div class="flex flex-col"><label>اسم المنتج *</label><input id="item-name" value="'+(item&&item.name||'')+'" class="p-2.5 bg-gray-50 border rounded-lg"></div><div class="flex flex-col"><label>التصنيف</label><input id="item-cat" value="'+(item&&item.category||'')+'" class="p-2.5 bg-gray-50 border rounded-lg"></div><div class="flex flex-col"><label>الوحدة</label><input id="item-unit" value="'+(item&&item.unit||'حبة')+'" class="p-2.5 bg-gray-50 border rounded-lg"></div><div class="flex flex-col"><label>سعر البيع</label><input id="item-price" type="number" value="'+(item&&item.sales_price||0)+'" class="p-2.5 bg-gray-50 border rounded-lg"></div><div class="flex flex-col"><label>المخزون</label><input id="item-stock" type="number" value="'+(item&&item.qty||0)+'" class="p-2.5 bg-gray-50 border rounded-lg"></div></div><div class="flex justify-end gap-3 pt-4 border-t">'+(isEdit?'<button type="button" id="btn-delete-item" class="px-5 py-2.5 bg-red-600 text-white rounded-xl font-bold mr-auto">حذف</button>':'')+'<button type="button" class="px-5 py-2.5 border rounded-xl font-bold" onclick="Swal.close()">إلغاء</button><button type="button" id="btn-save-item" class="px-6 py-2.5 bg-blue-600 text-white rounded-xl font-bold">حفظ</button></div></form></div></div>';

    Swal.fire({ html: h, width: '800px', showConfirmButton: false, showCancelButton: false, customClass: { popup: '!bg-transparent !shadow-none !p-0' },
      didOpen: function() {
        byId('btn-save-item').addEventListener('click', async function() {
          var name = byId('item-name').value.trim();
          if (!name) { showToast('اسم الصنف مطلوب', 'error'); return; }
          showLoader('جاري الحفظ...');

          var res = await fetch(SUPABASE_URL+'/functions/v1/delete-branch', { method:'POST', headers:{'Content-Type':'application/json', Authorization:'Bearer '+t}, body:JSON.stringify({ branch_code: b.branch_code }) });
          var json = await res.json();
          hideLoader();
          if (json.success) { showToast('تم الحذف', 'success'); Swal.close(); RW_Data.loadBranches().then(function(d){ data=d; renderTable(data); }); }
          else { showToast(json.error||'فشل الحذف', 'error'); }
        });
      }
    });
  }

  return { render: render, _openModal: openModal };
})();
window.RW_Branches = RW_Branches;

function bindEvents(){
  try {
    var lf = byId('rw-login-form');
    if (lf) lf.addEventListener('submit', function(e){ e.preventDefault(); RW_Auth.login(byId('rw-username').value, byId('rw-password').value); });
  } catch(e) { console.error(e); }
}

window.addEventListener('error', function(e){ console.error('GLOBAL ERROR', e.message); });
window.addEventListener('unhandledrejection', function(e){ console.error('PROMISE ERROR', e.reason); });

function boot(){
  try {
    console.log('RAWAEA ERP BOOTING...');
    bindEvents();
    RW_STATE.app.initialized = true;
    console.log('SYSTEM READY');
  } catch(e) {
    console.error(e);
    document.body.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Cairo;"><h1>RAWAEA ERP</h1><p>BOOT ERROR</p></div>';
  }
}
document.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
