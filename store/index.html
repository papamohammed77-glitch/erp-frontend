<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>متجر الروائع</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.min.js"></script>
    
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Tahoma,sans-serif;background:#f1f5f9;-webkit-tap-highlight-color:transparent}
        
        .cart-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:45;display:none}
        .cart-overlay.show{display:block}
        .cart-panel{position:fixed;top:0;right:0;bottom:0;width:100%;max-width:420px;background:#fff;z-index:50;box-shadow:-10px 0 30px rgba(0,0,0,.1);transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column}
        .cart-panel.open{transform:translateX(0)}
        
        .line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .scrollbar-none::-webkit-scrollbar{display:none}
        .scrollbar-none{-ms-overflow-style:none;scrollbar-width:none}
        
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .animate-fadeIn{animation:fadeIn .35s ease forwards}
        
        .pulse-dot{animation:pulse 1.5s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<!-- شاشة التحميل -->
<div id="splashScreen" class="fixed inset-0 bg-white z-[100] flex items-center justify-center">
    <div class="text-center">
        <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center mb-4">
            <i class="fa-solid fa-store text-white text-3xl"></i>
        </div>
        <h1 class="text-2xl font-black text-gray-800" id="storeName">متجر الروائع</h1>
        <p class="text-gray-400 text-sm mt-2">جاري تحميل المتجر...</p>
    </div>
</div>

<!-- الشريط العلوي -->
<header class="bg-white border-b sticky top-0 z-30 shadow-sm flex-shrink-0" id="mainHeader" style="display:none;">
    <div class="max-w-7xl mx-auto px-4 py-3">
        <div class="flex items-center gap-3">
            <button onclick="Tracker.show()" class="w-10 h-10 flex items-center justify-center text-gray-600 text-sm font-bold" title="تتبع الطلب">
                <i class="fa-solid fa-magnifying-glass-location"></i>
            </button>
            
            <div class="flex items-center gap-2">
                <img id="storeLogo" src="" alt="شعار المتجر" class="w-8 h-8 rounded-lg object-cover hidden">
                <span class="font-black text-lg text-gray-800" id="headerStoreName">متجر الروائع</span>
            </div>
            
            <div class="flex-1"></div>
            
            <button onclick="Store.openCart()" class="relative w-10 h-10 flex items-center justify-center">
                <i class="fa-solid fa-cart-shopping text-xl text-gray-700"></i>
                <span id="cartBadge" class="absolute -top-1 -left-1 w-5 h-5 bg-red-500 text-white text-[10px] font-black rounded-full flex items-center justify-center hidden">0</span>
            </button>
        </div>
        
        <div class="mt-3 relative">
            <i class="fa-solid fa-search absolute right-3 top-3 text-gray-400"></i>
            <input type="text" id="searchInput" oninput="Store.searchProducts(this.value)" placeholder="ابحث عن منتج..." class="w-full bg-gray-100 border-0 rounded-xl py-2.5 pr-10 pl-4 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-200">
        </div>
    </div>
</header>

<!-- المحتوى الرئيسي -->
<main class="flex-1 overflow-y-auto" id="mainContent" style="display:none;">
    <div class="max-w-7xl mx-auto px-4 py-4">
        <!-- شريط العروض الخاص -->
        <div id="dealsBanner" class="hidden bg-gradient-to-r from-red-500 to-orange-500 text-white rounded-2xl p-4 mb-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-fire text-2xl"></i>
                <div>
                    <p class="font-black text-lg">عروض اليوم 🔥</p>
                    <p class="text-xs text-red-100">خصومات تصل إلى 50% – لفترة محدودة</p>
                </div>
            </div>
            <button onclick="Store.filterDailyDeals()" class="bg-white text-red-500 px-4 py-2 rounded-xl font-black text-sm">تسوق الآن</button>
        </div>
        
        <!-- شريط التصنيفات -->
        <div id="categoryBar" class="flex gap-2 overflow-x-auto pb-3 mb-4 scrollbar-none"></div>
        
        <!-- شبكة المنتجات -->
        <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"></div>
        
        <!-- مؤشر تحميل المزيد -->
        <div id="loadMoreIndicator" class="text-center py-6 hidden">
            <button onclick="Store.loadMore()" class="bg-white border-2 border-blue-600 text-blue-600 px-8 py-3 rounded-2xl font-black hover:bg-blue-50 transition">
                عرض المزيد من المنتجات
            </button>
        </div>
    </div>
</main>

<!-- خلفية السلة -->
<div id="cartOverlay" class="cart-overlay" onclick="Store.closeCart()"></div>

<!-- السلة المنزلقة -->
<div id="cartPanel" class="cart-panel">
    <!-- رأس السلة -->
    <div class="p-4 border-b flex justify-between items-center bg-gray-50">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-cart-shopping text-blue-600"></i>
            <span class="font-black text-gray-800">سلة التسوق</span>
            <span id="cartCount" class="bg-blue-600 text-white text-[11px] font-black w-5 h-5 rounded-full flex items-center justify-center">0</span>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="Store.clearCart()" class="text-xs text-red-500 font-bold hover:text-red-700">مسح الكل</button>
            <button onclick="Store.closeCart()" class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-gray-500 hover:bg-red-100 hover:text-red-500">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>
    
    <!-- محتوى السلة -->
    <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-3">
        <div class="flex flex-col items-center justify-center h-full text-center py-12">
            <i class="fa-solid fa-cart-shopping text-5xl text-gray-200 mb-4"></i>
            <p class="font-black text-gray-400">السلة فارغة</p>
            <p class="text-sm text-gray-300 mt-1">أضف منتجاتك المفضلة</p>
        </div>
    </div>
    
    <!-- تذييل السلة -->
    <div class="p-4 border-t bg-gray-50 space-y-3">
        <!-- كوبون -->
        <div class="flex gap-2">
            <input type="text" id="couponInput" placeholder="كود الخصم..." class="flex-1 text-sm font-bold bg-white border rounded-xl px-3 py-2 outline-none focus:border-blue-500" oninput="this.value=this.value.toUpperCase()">
            <button onclick="Store.applyCoupon()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-black text-sm px-4 rounded-xl transition">تطبيق</button>
        </div>
        <div id="couponMsg" class="text-xs font-bold hidden"></div>
        
        <!-- ملخص الأسعار -->
        <div class="space-y-1.5 text-sm">
            <div class="flex justify-between text-gray-500 font-bold">
                <span>المجموع الفرعي</span><span id="cartSubtotal">0.00 ر.س</span>
            </div>
            <div id="cartSavingsRow" class="flex justify-between text-emerald-600 font-bold hidden">
                <span>التوفير من العروض</span><span id="cartSavings">0.00 ر.س</span>
            </div>
            <div id="cartCouponRow" class="flex justify-between text-purple-600 font-bold hidden">
                <span id="cartCouponLabel">خصم الكوبون</span><span id="cartCouponDiscount">0.00 ر.س</span>
            </div>
            <div class="flex justify-between text-gray-500 font-bold">
                <span>رسوم التوصيل</span><span id="cartDelivery">مجاني</span>
            </div>
            <div id="cartTaxRow" class="flex justify-between text-gray-500 font-bold hidden">
                <span>ضريبة القيمة المضافة</span><span id="cartTax">0.00 ر.س</span>
            </div>
            <div class="flex justify-between text-lg font-black text-gray-800 pt-2 border-t">
                <span>الإجمالي النهائي</span><span id="cartTotal" class="text-blue-700">0.00 ر.س</span>
            </div>
        </div>
        
        <!-- معلومات العميل -->
        <div class="space-y-2 pt-2 border-t">
            <input type="text" id="custName" placeholder="الاسم الكامل *" class="w-full text-sm font-bold bg-white border rounded-xl px-3 py-2.5 outline-none focus:border-blue-500">
            <input type="text" id="custPhone" placeholder="رقم الهاتف *" class="w-full text-sm font-bold bg-white border rounded-xl px-3 py-2.5 outline-none focus:border-blue-500">
            <input type="email" id="custEmail" placeholder="البريد الإلكتروني" class="w-full text-sm font-bold bg-white border rounded-xl px-3 py-2.5 outline-none focus:border-blue-500">
            <input type="text" id="custArea" placeholder="المنطقة / العنوان *" class="w-full text-sm font-bold bg-white border rounded-xl px-3 py-2.5 outline-none focus:border-blue-500">
            <textarea id="custNotes" placeholder="ملاحظات إضافية (اختياري)" rows="2" class="w-full text-sm font-bold bg-white border rounded-xl px-3 py-2.5 outline-none focus:border-blue-500"></textarea>
        </div>
        
        <button onclick="Store.checkout()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3.5 rounded-xl transition">
            <i class="fa-solid fa-check ml-1"></i> إتمام الطلب
        </button>
    </div>
</div>

<script>
// ============================================================
// المتجر الإلكتروني – الروائع ERP – النسخة الاحترافية
// ============================================================
var SUPABASE_URL = 'https://fiilmooggumokxanwiyx.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpaWxtb29nZ3Vtb2t4YW53aXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDkwOTIsImV4cCI6MjA5NDI4NTA5Mn0.LZScCxnCiRrTSCCBmTryszQpY1AwBgR2dkTBbC5kOc4';

var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var db = new Dexie('RW_Store');
db.version(1).stores({
    products: 'item_code, name, category, sales_price, discount_percent, is_daily_deal, show_in_store, is_active',
    settings: 'key'
});

// حفظ بيانات العميل
function saveCustomerData(data) {
    try { localStorage.setItem('rw_store_customer', JSON.stringify(data)); } catch(e) {}
}
function loadCustomerData() {
    try { var d = localStorage.getItem('rw_store_customer'); return d ? JSON.parse(d) : {}; } catch(e) { return {}; }
}
// تنسيق العملة
function formatCurrency(amount, currency) {
    var symbol = 'ر.س';
    var locale = 'ar-SA';
    
    if (currency === 'SAR') { symbol = 'ر.س'; locale = 'ar-SA'; }
    else if (currency === 'EGP') { symbol = 'ج.م'; locale = 'ar-EG'; }
    else if (currency === 'AED') { symbol = 'د.إ'; locale = 'ar-AE'; }
    else if (currency === 'KWD') { symbol = 'د.ك'; locale = 'ar-KW'; }
    else if (currency === 'QAR') { symbol = 'ر.ق'; locale = 'ar-QA'; }
    else if (currency === 'BHD') { symbol = 'د.ب'; locale = 'ar-BH'; }
    else if (currency === 'OMR') { symbol = 'ر.ع'; locale = 'ar-OM'; }
    else if (currency === 'USD') { symbol = '$'; locale = 'en-US'; }
    
    return Number(amount).toFixed(2) + ' ' + symbol;
}
var Store = {
    cart: [],
    products: [],
    categories: [],
    activeCategory: 'الكل',
    currentPage: 0,
    pageSize: 20,
    settings: {},
    couponCode: '',
    couponDiscount: 0,

    init: function() {
        var self = this;
        this.loadSettings().then(function() {
            self.syncProducts().then(function() {
                self.showApp();
                self.loadCustomerToForm();
                self.checkDailyDeals();
            });
        });
    },

    loadSettings: function() {
        var self = this;
        return supabase.from('app_settings').select('*').limit(1).single().then(function(res) {
            if (res.data) {
                self.settings = {
                    storeName: res.data.store_name || res.data.company_name || 'متجر الروائع',
                    storeLogo: res.data.store_logo || res.data.company_logo || '',
                    primaryColor: res.data.store_primary_color || '#2563eb',
                    deliveryFee: Number(res.data.delivery_fee) || 0,
                    taxRate: Number(res.data.tax_rate) || 0,
                    minInvoiceAmount: Number(res.data.min_invoice_amount) || 0,
                    freeShippingThreshold: Number(res.data.free_shipping_threshold) || 0,
                    paymentMethod: res.data.payment_method || 'both',
currency: res.data.currency || 'SAR'                   
                };
                document.getElementById('storeName').textContent = self.settings.storeName;
                document.getElementById('headerStoreName').textContent = self.settings.storeName;
                if (self.settings.storeLogo) {
                    var logo = document.getElementById('storeLogo');
                    logo.src = self.settings.storeLogo;
                    logo.classList.remove('hidden');
                }
            }
        });
    },

    syncProducts: function() {
        var self = this;
        return supabase.from('items')
            .select('*')
            .eq('show_in_store', true)
            .eq('is_active', true)
            .order('sort_order', { ascending: true })
            .then(function(res) {
                if (res.data && res.data.length > 0) {
                    self.products = res.data;
                    db.products.clear().then(function() { db.products.bulkPut(res.data); });
                    self.extractCategories();
                    self.renderCategoryBar();
                    self.loadPage();
                }
            });
    },

    checkDailyDeals: function() {
        var hasDeals = false;
        for (var i = 0; i < this.products.length; i++) {
            if (this.products[i].is_daily_deal) { hasDeals = true; break; }
        }
        if (hasDeals) { document.getElementById('dealsBanner').classList.remove('hidden'); }
    },

    extractCategories: function() {
        var cats = {}, unique = ['الكل'];
        for (var i = 0; i < this.products.length; i++) {
            var cat = this.products[i].category || 'أخرى';
            if (!cats[cat]) { cats[cat] = true; unique.push(cat); }
        }
        // إضافة فلاتر خاصة
        unique.push('عروض اليوم');
        unique.push('توصيل مجاني');
        this.categories = unique;
    },

    showApp: function() {
        document.getElementById('splashScreen').style.display = 'none';
        document.getElementById('mainHeader').style.display = '';
        document.getElementById('mainContent').style.display = '';
    },

    loadCustomerToForm: function() {
        var d = loadCustomerData();
        var nameEl = document.getElementById('custName');
        var phoneEl = document.getElementById('custPhone');
        var emailEl = document.getElementById('custEmail');
        var areaEl = document.getElementById('custArea');
        if (nameEl && d.name) nameEl.value = d.name;
        if (phoneEl && d.phone) phoneEl.value = d.phone;
        if (emailEl && d.email) emailEl.value = d.email;
        if (areaEl && d.area) areaEl.value = d.area;
    },

    renderCategoryBar: function() {
        var bar = document.getElementById('categoryBar');
        if (!bar) return;
        var html = '';
        for (var i = 0; i < this.categories.length; i++) {
            var cat = this.categories[i];
            var isActive = cat === this.activeCategory;
            var specialClass = '';
            if (cat === 'عروض اليوم') specialClass = 'bg-red-50 text-red-600 border-red-200';
            else if (cat === 'توصيل مجاني') specialClass = 'bg-green-50 text-green-600 border-green-200';
            
            html += '<button onclick="Store.filterByCategory(\'' + cat.replace(/'/g, "\\'") + '\')" class="whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition border ' + (isActive ? 'bg-blue-600 text-white border-blue-600' : 'bg-gray-100 text-gray-600 border-gray-100 hover:bg-gray-200 ' + specialClass) + '">' + cat + '</button>';
        }
        bar.innerHTML = html;
    },

    filterByCategory: function(cat) {
        this.activeCategory = cat;
        this.currentPage = 0;
        this.renderCategoryBar();
        this.loadPage();
    },

    filterDailyDeals: function() {
        this.filterByCategory('عروض اليوم');
    },

    getFilteredProducts: function() {
        var filtered = this.products;
        
        if (this.activeCategory === 'عروض اليوم') {
            filtered = filtered.filter(function(p) { return p.is_daily_deal === true || p.discount_percent > 0; });
        } else if (this.activeCategory === 'توصيل مجاني') {
            filtered = filtered.filter(function(p) { return Number(p.sales_price) >= (Store.settings.freeShippingThreshold || 200); });
        } else if (this.activeCategory !== 'الكل') {
            filtered = filtered.filter(function(p) { return (p.category || 'أخرى') === Store.activeCategory; });
        }
        
        var q = (document.getElementById('searchInput') ? document.getElementById('searchInput').value : '').toLowerCase();
        if (q) {
            filtered = filtered.filter(function(p) {
                return (p.name || '').toLowerCase().indexOf(q) !== -1 || (p.item_code || '').toLowerCase().indexOf(q) !== -1;
            });
        }
        return filtered;
    },

    loadPage: function() {
        var filtered = this.getFilteredProducts();
        var start = this.currentPage * this.pageSize;
        var end = start + this.pageSize;
        var pageData = filtered.slice(start, end);
        
        if (start === 0) { document.getElementById('productsGrid').innerHTML = ''; }
        
        var grid = document.getElementById('productsGrid');
        for (var i = 0; i < pageData.length; i++) {
            grid.insertAdjacentHTML('beforeend', this.buildProductCard(pageData[i]));
        }
        
        var loadMore = document.getElementById('loadMoreIndicator');
        if (end < filtered.length) { loadMore.classList.remove('hidden'); }
        else { loadMore.classList.add('hidden'); }
    },

    loadMore: function() { this.currentPage++; this.loadPage(); },
    searchProducts: function(query) { this.currentPage = 0; this.loadPage(); },

    // ==================== بطاقة المنتج الاحترافية ====================
    buildProductCard: function(item) {
        var price = Number(item.sales_price) || 0;
        var oldPrice = Number(item.old_price) || 0;
        var hasDiscount = item.discount_percent > 0;
        var now = new Date();
        var discountActive = hasDiscount;
        var stockAvailable = Number(item.available_qty) || Number(item.qty) || 0;
        
        if (item.discount_start && now < new Date(item.discount_start)) discountActive = false;
        if (item.discount_end && now > new Date(item.discount_end)) discountActive = false;
        
        var finalPrice = price;
        var discountPercent = 0;
        var savedAmount = 0;
        
        if (discountActive && hasDiscount) {
            discountPercent = Number(item.discount_percent);
            finalPrice = price - (price * discountPercent / 100);
            savedAmount = price - finalPrice;
        } else if (oldPrice > price) {
            discountPercent = Math.round(((oldPrice - price) / oldPrice) * 100);
            savedAmount = oldPrice - price;
            finalPrice = price;
        }
        
        var img = item.image_url || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22%3E%3Crect fill=%22%23e2e8f0%22 width=%22300%22 height=%22300%22/%3E%3Ctext fill=%22%2394a3b8%22 font-size=%2220%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3E📦%3C/text%3E%3C/svg%3E';
        var freeShipping = price >= (this.settings.freeShippingThreshold || 200);
        
        var html = '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col animate-fadeIn hover:shadow-md transition-shadow cursor-pointer" onclick="Store.showProductDetail(\'' + item.item_code + '\')">';
        
        // صورة المنتج مع الشارات
        html += '<div class="relative pt-[100%] bg-gray-50 overflow-hidden">';
        html += '<img src="' + img + '" alt="' + (item.name || '') + '" class="absolute inset-0 w-full h-full object-contain p-3 hover:scale-105 transition-transform duration-300" loading="lazy">';
        
        // شارة الخصم (أعلى اليمين)
        if (discountActive && discountPercent > 0) {
            html += '<span class="absolute top-2 right-2 bg-red-500 text-white text-[10px] font-black px-2 py-1 rounded-full shadow">-' + discountPercent + '%</span>';
        } else if (item.badge_text) {
            html += '<span class="absolute top-2 right-2 bg-blue-500 text-white text-[10px] font-black px-2 py-1 rounded-full shadow">' + item.badge_text + '</span>';
        }
        
        // عرض اليوم (أعلى اليسار)
        if (item.is_daily_deal) {
            html += '<span class="absolute top-2 left-2 bg-amber-500 text-white text-[10px] font-black px-2 py-1 rounded-full shadow pulse-dot"><i class="fa-solid fa-fire ml-1"></i>عرض اليوم</span>';
        }
        
        // توصيل مجاني (أسفل اليسار)
        if (freeShipping) {
            html += '<span class="absolute bottom-2 left-2 bg-green-500 text-white text-[10px] font-black px-2 py-1 rounded-full shadow"><i class="fa-solid fa-truck-fast ml-1"></i>توصيل مجاني</span>';
        }
        
        // مؤشر نفاد المخزون
        if (stockAvailable <= 10 && stockAvailable > 0) {
            html += '<span class="absolute bottom-2 right-2 bg-red-500 text-white text-[10px] font-black px-2 py-1 rounded-full shadow">تبقت ' + stockAvailable + ' فقط!</span>';
        }
        
        html += '</div>';
        
        // تفاصيل المنتج
        html += '<div class="p-3 flex flex-col flex-1">';
        html += '<h3 class="text-sm font-bold text-gray-800 line-clamp-2 mb-2 min-h-[2.5rem]">' + (item.name || '') + '</h3>';
        
        // السعر
        html += '<div class="mt-auto">';
        if (savedAmount > 0) {
            html += '<div class="flex items-baseline gap-1.5">';
            html += '<span class="text-lg font-black text-red-600">' + finalPrice.toFixed(2) + '</span>';
            html += '<span class="text-xs font-bold text-red-600">' + (Store.settings.currency||'SAR') + '</span>';
            html += '</div>';
            html += '<div class="flex items-center gap-2 mt-0.5">';

    // ==================== تفاصيل المنتج ====================

        html += '<h2 class="text-xl font-black text-gray-800 mb-2">' + (product.name || '') + '</h2>';
        
        if (product.description) { html += '<p class="text-sm text-gray-500 mb-4">' + product.description + '</p>'; }
        
        html += '<div class="bg-gray-50 p-4 rounded-xl mb-4">';

            html += '<div class="flex items-baseline gap-3 mb-2">';

            html += '</div>';

        } else {

        }
        html += '</div>';
        
        html += '<div class="flex items-center gap-2 text-sm text-gray-500 mb-4"><i class="fa-solid fa-star text-yellow-400"></i><span>متوفر</span><span class="mx-2">|</span><span>' + (product.unit || 'حبة') + '</span></div>';
        
        if (inCart > 0) {
            html += '<div class="flex items-center justify-center gap-3 bg-blue-50 rounded-xl p-3">';

            html += '<span class="font-black text-blue-700 text-xl">' + inCart + '</span>';

            html += '</div>';
        } else {
            html += '<button onclick="Store.addToCart(\'' + code + '\');Store.showProductDetail(\'' + code + '\');" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3.5 rounded-xl transition text-lg"><i class="fa-solid fa-cart-plus ml-2"></i> أضف للسلة</button>';
        }
        html += '</div>';
        
        Swal.fire({ html: html, width: '600px', showCloseButton: true, showConfirmButton: false, customClass: { popup: 'rounded-2xl' } });
    },

    // ==================== السلة ====================
    addToCart: function(code) {
        var product = null;
        for (var i = 0; i < this.products.length; i++) { if (this.products[i].item_code === code) { product = this.products[i]; break; } }
        if (!product) return;
        var existing = null;
        for (var j = 0; j < this.cart.length; j++) { if (this.cart[j].code === code) { existing = this.cart[j]; break; } }
        if (existing) { existing.qty++; }
        else { this.cart.push({ code: product.item_code, name: product.name, price: Number(product.sales_price)||0, oldPrice: Number(product.old_price)||0, discountPercent: Number(product.discount_percent)||0, image: product.image_url||'', unit: product.unit||'حبة', qty: 1 }); }
        this.refreshProductCards();
        this.updateCartBadge();
        this.renderCartItems();
    },

    updateCart: function(code, delta) {
        for (var i = 0; i < this.cart.length; i++) { if (this.cart[i].code === code) { this.cart[i].qty += delta; if (this.cart[i].qty <= 0) { this.cart.splice(i, 1); } break; } }
        this.refreshProductCards();
        this.updateCartBadge();
        this.renderCartItems();
    },

    removeFromCart: function(code) {
        for (var i = 0; i < this.cart.length; i++) { if (this.cart[i].code === code) { this.cart.splice(i, 1); break; } }
        this.refreshProductCards();
        this.updateCartBadge();
        this.renderCartItems();
    },

    clearCart: function() {
        if (this.cart.length === 0) return;
        var self = this;
        Swal.fire({ title: 'مسح السلة', text: 'هل تريد مسح جميع المنتجات؟', icon: 'warning', showCancelButton: true, confirmButtonText: 'نعم', cancelButtonText: 'لا' }).then(function(r) { if (r.isConfirmed) { self.cart = []; self.couponCode = ''; self.couponDiscount = 0; document.getElementById('couponInput').value = ''; document.getElementById('couponMsg').classList.add('hidden'); self.updateCartBadge(); self.refreshProductCards(); self.renderCartItems(); } });
    },

    refreshProductCards: function() { this.currentPage = 0; this.loadPage(); },

    updateCartBadge: function() {
        var total = 0;
        for (var i = 0; i < this.cart.length; i++) { total += this.cart[i].qty; }
        var badge = document.getElementById('cartBadge');
        if (total > 0) { badge.classList.remove('hidden'); badge.textContent = total > 99 ? '99+' : total; }
        else { badge.classList.add('hidden'); }
        document.getElementById('cartCount').textContent = total;
    },

    openCart: function() {
        document.getElementById('cartOverlay').classList.add('show');
        document.getElementById('cartPanel').classList.add('open');
        document.body.style.overflow = 'hidden';
        this.loadCustomerToForm();
        this.renderCartItems();
    },

    closeCart: function() {
        document.getElementById('cartOverlay').classList.remove('show');
        document.getElementById('cartPanel').classList.remove('open');
        document.body.style.overflow = '';
    },

    renderCartItems: function() {
        var container = document.getElementById('cartItems');
        if (!container) return;
        if (this.cart.length === 0) {
            container.innerHTML = '<div class="flex flex-col items-center justify-center h-full text-center py-12"><i class="fa-solid fa-cart-shopping text-5xl text-gray-200 mb-4"></i><p class="font-black text-gray-400">السلة فارغة</p></div>';
            this.updateCartTotals();
            return;
        }
        var html = '';
        for (var i = 0; i < this.cart.length; i++) {
            var item = this.cart[i];
            var itemPrice = item.price;
            var hasItemDiscount = item.discountPercent > 0;
            var finalItemPrice = hasItemDiscount ? itemPrice - (itemPrice * item.discountPercent / 100) : itemPrice;
            var lineTotal = finalItemPrice * item.qty;
            
            html += '<div class="flex gap-3 bg-gray-50 p-3 rounded-2xl">';
            html += '<img src="' + (item.image || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2264%22 height=%2264%22%3E%3Crect fill=%22%23e2e8f0%22 width=%2264%22 height=%2264%22/%3E%3C/svg%3E') + '" class="w-16 h-16 object-contain rounded-xl bg-white border shrink-0" onclick="Store.showProductDetail(\'' + item.code + '\')" style="cursor:pointer">';
            html += '<div class="flex-1 min-w-0">';
            html += '<div class="text-sm font-bold text-gray-700 line-clamp-2 leading-snug cursor-pointer" onclick="Store.showProductDetail(\'' + item.code + '\')">' + item.name + '</div>';
            if (hasItemDiscount) { html += '<div class="text-[10px] text-gray-400 line-through">' + itemPrice.toFixed(2) + ' ' + (Store.settings.currency||'SAR') + '</div>'; }
            html += '<div class="text-sm font-black text-blue-700 mt-1">' + finalItemPrice.toFixed(2) + ' ' + (Store.settings.currency||'SAR') + '</div>';
            html += '<div class="flex items-center gap-2 mt-2">';
            html += '<button onclick="Store.updateCart(\'' + item.code + '\', -1)" class="w-7 h-7 rounded-lg bg-white border font-black text-gray-600 flex items-center justify-center">−</button>';
            html += '<span class="w-6 text-center font-black text-sm">' + item.qty + '</span>';
            html += '<button onclick="Store.updateCart(\'' + item.code + '\', 1)" class="w-7 h-7 rounded-lg bg-white border font-black text-gray-600 flex items-center justify-center">+</button>';
            html += '<button onclick="Store.removeFromCart(\'' + item.code + '\')" class="mr-auto text-gray-300 hover:text-red-500"><i class="fa-solid fa-trash text-sm"></i></button>';
            html += '</div></div></div>';
        }
        container.innerHTML = html;
        this.updateCartTotals();
    },

    updateCartTotals: function() {
        var subtotal = 0, totalSaved = 0;
        for (var i = 0; i < this.cart.length; i++) {
            var item = this.cart[i];
            var itemPrice = item.price;
            var hasItemDiscount = item.discountPercent > 0;
            var finalItemPrice = hasItemDiscount ? itemPrice - (itemPrice * item.discountPercent / 100) : itemPrice;
            subtotal += finalItemPrice * item.qty;
            if (hasItemDiscount) { totalSaved += (itemPrice - finalItemPrice) * item.qty; }
            else if (item.oldPrice > itemPrice) { totalSaved += (item.oldPrice - itemPrice) * item.qty; }
        }
        
        var delivery = this.settings.deliveryFee || 0;
        var freeThreshold = this.settings.freeShippingThreshold || 0;
        if (freeThreshold > 0 && subtotal >= freeThreshold) { delivery = 0; }
        
        var afterCoupon = subtotal - this.couponDiscount;
        if (afterCoupon < 0) afterCoupon = 0;
        
        var taxRate = this.settings.taxRate || 0;
        var taxAmount = taxRate > 0 ? Math.round(afterCoupon * taxRate) / 100 : 0;
        var grandTotal = afterCoupon + delivery + taxAmount;
        
        document.getElementById('cartSubtotal').textContent = subtotal.toFixed(2) + ' ' + (Store.settings.currency||'SAR');
        
        var savingsRow = document.getElementById('cartSavingsRow');
        if (totalSaved > 0) { savingsRow.classList.remove('hidden'); document.getElementById('cartSavings').textContent = totalSaved.toFixed(2) + ' ' + (Store.settings.currency||'SAR'); }
        else { savingsRow.classList.add('hidden'); }
        
        var couponRow = document.getElementById('cartCouponRow');
        if (this.couponDiscount > 0) { couponRow.classList.remove('hidden'); document.getElementById('cartCouponDiscount').textContent = this.couponDiscount.toFixed(2) + ' ' + (Store.settings.currency||'SAR'); }
        else { couponRow.classList.add('hidden'); }
        
        document.getElementById('cartDelivery').textContent = delivery > 0 ? delivery.toFixed(2) + ' ' + (Store.settings.currency||'SAR') : '🚚 مجاني';
        
        var taxRow = document.getElementById('cartTaxRow');
        if (taxRate > 0) { taxRow.classList.remove('hidden'); document.getElementById('cartTax').textContent = taxAmount.toFixed(2) + ' ' + (Store.settings.currency||'SAR'); }
        else { taxRow.classList.add('hidden'); }
        
        document.getElementById('cartTotal').textContent = grandTotal.toFixed(2) + ' ' + (Store.settings.currency||'SAR');
    },

    applyCoupon: function() {
        var code = (document.getElementById('couponInput').value || '').trim().toUpperCase();
        if (!code) { Swal.fire({ icon: 'warning', title: 'أدخل كود الكوبون' }); return; }
        var self = this;
        supabase.from('coupons').select('*').eq('code', code).eq('is_active', true).single().then(function(res) {
            var msg = document.getElementById('couponMsg');
            if (!res.data) { msg.classList.remove('hidden'); msg.className = 'text-xs font-bold text-red-600'; msg.textContent = '❌ كوبون غير صالح أو منتهي'; self.couponDiscount = 0; self.couponCode = ''; self.updateCartTotals(); return; }
            var coupon = res.data;
            var subtotal = 0;
            for (var i = 0; i < self.cart.length; i++) { var ip = self.cart[i].price; if (self.cart[i].discountPercent > 0) ip = ip - (ip * self.cart[i].discountPercent / 100); subtotal += ip * self.cart[i].qty; }
            if (coupon.min_cart_amount && subtotal < coupon.min_cart_amount) { msg.classList.remove('hidden'); msg.className = 'text-xs font-bold text-red-600'; msg.textContent = '❌ الحد الأدنى للطلب: ' + coupon.min_cart_amount + ' ر.س'; return; }
            
            if (coupon.type === 'percentage') { self.couponDiscount = subtotal * coupon.value / 100; if (coupon.max_discount && self.couponDiscount > coupon.max_discount) { self.couponDiscount = coupon.max_discount; } }
            else { self.couponDiscount = coupon.value; }
            self.couponCode = code;
            self.updateCartTotals();
            msg.classList.remove('hidden');
            msg.className = 'text-xs font-bold text-emerald-600';
            msg.textContent = '✅ تم تطبيق الكوبون! خصم ' + self.couponDiscount.toFixed(2) + ' ر.س';
        });
    },

    checkout: function() {
        var name = (document.getElementById('custName').value || '').trim();
        var phone = (document.getElementById('custPhone').value || '').trim();
        var area = (document.getElementById('custArea').value || '').trim();
        if (!name || !phone || !area) { Swal.fire({ icon: 'warning', title: 'الرجاء إكمال بيانات العميل في السلة' }); return; }
        if (this.cart.length === 0) { Swal.fire({ icon: 'warning', title: 'السلة فارغة' }); return; }
        
        // حفظ بيانات العميل
        saveCustomerData({ name: name, phone: phone, email: (document.getElementById('custEmail').value||'').trim(), area: area });
        
        var subtotal = 0;
        for (var i = 0; i < this.cart.length; i++) { var ip = this.cart[i].price; if (this.cart[i].discountPercent > 0) ip = ip - (ip * this.cart[i].discountPercent / 100); subtotal += ip * this.cart[i].qty; }
        var delivery = this.settings.deliveryFee || 0;
        var freeThreshold = this.settings.freeShippingThreshold || 0;
        if (freeThreshold > 0 && subtotal >= freeThreshold) delivery = 0;
        var afterCoupon = subtotal - this.couponDiscount; if (afterCoupon < 0) afterCoupon = 0;
        var taxRate = this.settings.taxRate || 0;
        var taxAmount = taxRate > 0 ? Math.round(afterCoupon * taxRate) / 100 : 0;
        var total = afterCoupon + delivery + taxAmount;
        if (this.settings.minInvoiceAmount > 0 && total < this.settings.minInvoiceAmount) { Swal.fire({ icon: 'warning', title: 'الحد الأدنى للطلب: ' + this.settings.minInvoiceAmount + ' ر.س' }); return; }
        
        var self = this;
        Swal.fire({ title: 'تأكيد الطلب', html: '<div class="text-right"><p>الإجمالي: <strong>' + total.toFixed(2) + ' ر.س</strong></p><p class="text-sm text-gray-500 mt-2">الاسم: ' + name + '</p><p class="text-sm text-gray-500">الهاتف: ' + phone + '</p><p class="text-sm text-gray-500">المنطقة: ' + area + '</p></div>', showCancelButton: true, confirmButtonText: 'تأكيد', cancelButtonText: 'رجوع' }).then(function(r) { if (r.isConfirmed) self.submitOrder({ name: name, phone: phone, email: (document.getElementById('custEmail').value||'').trim(), area: area, notes: (document.getElementById('custNotes').value||'').trim() }, total); });
    },

    submitOrder: function(customer, total) {
        var self = this;
        Swal.fire({ title: 'جاري إرسال الطلب...', allowOutsideClick: false, didOpen: function() { Swal.showLoading(); } });
        var itemsList = [];
        for (var i = 0; i < this.cart.length; i++) { itemsList.push({ code: this.cart[i].code, name: this.cart[i].name, price: this.cart[i].price, qty: this.cart[i].qty, unit: this.cart[i].unit }); }
        supabase.functions.invoke('submit-online-order', { body: { user: customer, cartItems: itemsList, total: total, delivery: this.settings.deliveryFee || 0 } }).then(function(res) {
            Swal.close();
            if (!res.error) {
                Swal.fire({ icon: 'success', title: 'تم إرسال الطلب بنجاح!', text: 'سنقوم بالتواصل معك قريباً', confirmButtonText: 'حسناً' });
                self.cart = []; self.couponCode = ''; self.couponDiscount = 0;
                document.getElementById('couponInput').value = '';
                document.getElementById('couponMsg').classList.add('hidden');
                self.updateCartBadge(); self.refreshProductCards(); self.closeCart();
            } else { Swal.fire({ icon: 'error', title: 'فشل إرسال الطلب' }); }
        }).catch(function() { Swal.close(); Swal.fire({ icon: 'error', title: 'فشل الاتصال' }); });
    }
};

// ==================== تتبع الطلب ====================
var Tracker = {
    show: function() {
        Swal.fire({ title: 'تتبع الطلب', html: '<div class="text-right"><input id="trackOrderCode" class="swal2-input mb-3" placeholder="رقم الطلب (مثلاً: ORD-...)"><p class="text-xs text-gray-500">أدخل رقم الطلب الذي وصل في بريدك الإلكتروني</p></div>', showCancelButton: true, confirmButtonText: 'استعلام', cancelButtonText: 'إلغاء', preConfirm: function() { var oc = document.getElementById('trackOrderCode').value.trim(); if (!oc) { Swal.showValidationMessage('أدخل رقم الطلب'); return false; } return oc; } }).then(function(result) { if (result.isConfirmed) Tracker.lookup(result.value); });
    },
    lookup: function(orderCode) {
        Swal.fire({ title: 'جاري البحث...', allowOutsideClick: false, didOpen: function() { Swal.showLoading(); } });
        Promise.all([supabase.from('orders').select('*').eq('order_code', orderCode).maybeSingle(), supabase.from('order_details').select('*').eq('order_code', orderCode)]).then(function(results) {
            Swal.close();
            var orderRes = results[0], detailsRes = results[1];
            if (!orderRes.data) { Swal.fire({ icon: 'error', title: 'الطلب غير موجود' }); return; }
            Tracker.showStatus(orderRes.data, detailsRes.data || []);
        }).catch(function() { Swal.close(); Swal.fire({ icon: 'error', title: 'فشل الاتصال' }); });
    },
    showStatus: function(order, details) {
        var statusLabels = {'Draft':'قيد المراجعة','Confirmed':'تم التأكيد','Pending':'قيد الانتظار','Picking':'جاري التجهيز','Picked':'تم التجهيز','Loading':'جاري التحميل','Loaded':'تم التحميل','Delivering':'خارج للتوصيل','Delivered':'تم التسليم','Cancelled':'ملغي'};
        var statusLabel = statusLabels[order.order_status] || order.order_status;
        var steps = [{key:'Confirmed',label:'تم التأكيد'},{key:'Picked',label:'تم التجهيز'},{key:'Loaded',label:'تم التحميل'},{key:'Delivering',label:'خارج للتوصيل'},{key:'Delivered',label:'تم التسليم'}];
        var currentStep = 0;
        if (order.order_status === 'Delivered') currentStep = 4;
        else if (order.order_status === 'Delivering') currentStep = 3;
        else if (order.order_status === 'Loaded') currentStep = 2;
        else if (order.order_status === 'Picked' || order.order_status === 'Picking') currentStep = 1;
        
        var progressHtml = '<div class="flex items-center justify-between relative mb-6"><div class="absolute top-4 right-0 left-0 h-1 bg-gray-200 z-0"></div><div class="absolute top-4 right-0 h-1 bg-green-500 z-10 transition-all" style="width:' + (currentStep / 4 * 100) + '%"></div>';
        for (var s = 0; s < steps.length; s++) {
            var isDone = s <= currentStep, isCur = s === currentStep;
            progressHtml += '<div class="flex flex-col items-center z-20"><div class="w-8 h-8 rounded-full flex items-center justify-center font-black text-xs shadow ' + (isDone && !isCur ? 'bg-green-500 text-white' : isCur ? 'bg-blue-500 text-white ring-4 ring-blue-100' : 'bg-gray-200 text-gray-400') + '">' + (isDone && !isCur ? '<i class="fa-solid fa-check"></i>' : (s+1)) + '</div><span class="text-[10px] font-bold mt-1 ' + (isDone ? 'text-green-600' : 'text-gray-400') + '">' + steps[s].label + '</span></div>';
        }
        progressHtml += '</div>';
        
        var itemsHtml = '';
        if (details.length > 0) {
            itemsHtml = '<table class="w-full text-sm mt-4"><thead><tr class="bg-gray-100"><th class="p-2">الصنف</th><th class="p-2 text-center">الكمية</th><th class="p-2 text-center">السعر</th><th class="p-2 text-center">الإجمالي</th></tr></thead><tbody>';
            for (var d = 0; d < details.length; d++) { var lt = (Number(details[d].qty)||0) * (Number(details[d].unit_price)||0); itemsHtml += '<tr><td class="p-2 font-semibold">' + (details[d].item_name||'') + '</td><td class="p-2 text-center">' + details[d].qty + '</td><td class="p-2 text-center">' + Number(details[d].unit_price||0).toFixed(2) + '</td><td class="p-2 text-center font-bold">' + lt.toFixed(2) + '</td></tr>'; }
            itemsHtml += '</tbody></table>';
        }
        
        var html = '<div class="text-right"><div class="bg-blue-50 p-4 rounded-2xl mb-4"><p><strong>رقم الطلب:</strong> ' + order.order_code + '</p><p><strong>التاريخ:</strong> ' + (order.order_date ? new Date(order.order_date).toLocaleDateString('ar-EG') : '') + '</p><p><strong>العميل:</strong> ' + (order.customer_name||'') + '</p><p><strong>المنطقة:</strong> ' + (order.area||'') + '</p><p><strong>الإجمالي:</strong> ' + Number(order.total_amount||0).toLocaleString() + ' ر.س</p><p><strong>الحالة:</strong> <span class="font-bold text-blue-600">' + statusLabel + '</span></p></div>' + progressHtml + itemsHtml + '</div>';
        Swal.fire({ title: 'حالة الطلب', html: html, width: '700px', showCloseButton: true, showConfirmButton: false });
    }
};

// تثبيت PWA
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) { e.preventDefault(); deferredPrompt = e; });

// بدء التشغيل
document.addEventListener('DOMContentLoaded', function() { Store.init(); });
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(function() {}); }
</script>
