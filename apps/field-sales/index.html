<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مندوب الروائع</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Tahoma,sans-serif;background:#f1f5f9;-webkit-tap-highlight-color:transparent}
        .role-view{display:none}.role-view.active{display:block}
        .cart-sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -10px 30px rgba(0,0,0,.1);transform:translateY(105%);transition:transform .25s;z-index:50;max-height:70vh;display:flex;flex-direction:column}
        .cart-sheet.open{transform:translateY(0)}
        .cart-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:45;display:none}
        .cart-overlay.show{display:block}
        .drawer{position:fixed;top:0;right:-100%;width:280px;height:100%;background:#fff;box-shadow:-2px 0 10px rgba(0,0,0,.1);z-index:1001;transition:right .3s ease-in-out;overflow-y:auto}
        .drawer.open{right:0}
        .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none}
        .drawer-overlay.show{display:block}
        .barcode-scanner{position:fixed;inset:0;background:#000;z-index:120;display:none;flex-direction:column}
        .barcode-scanner.active{display:flex}
        .barcode-scanner video{width:100%;height:100%;object-fit:cover}
        .credit-green{background:#dcfce7;color:#166534;border:1px solid #86efac}
        .credit-yellow{background:#fef9c3;color:#854d0e;border:1px solid #fde047}
        .credit-red{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .animate-fadeIn{animation:fadeIn .3s}
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<!-- شاشة الدخول -->
<div id="loginScreen" class="fixed inset-0 z-[100] flex items-center justify-center bg-gradient-to-br from-blue-900 to-blue-700">
    <div class="bg-white rounded-[28px] shadow-2xl p-8 w-[90%] max-w-sm">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-blue-700 rounded-2xl mx-auto flex items-center justify-center mb-3"><i class="fa-solid fa-truck-fast text-white text-2xl"></i></div>
            <h1 class="font-black text-xl text-gray-800">مندوب الروائع</h1>
            <p class="text-xs text-gray-400 font-bold mt-1">تطبيق المبيعات الميدانية</p>
        </div>
        <input id="loginEmail" type="email" placeholder="البريد الإلكتروني" class="w-full p-3 bg-gray-50 rounded-xl border-2 border-transparent focus:border-blue-600 outline-none font-bold text-sm mb-3">
        <input id="loginPass" type="password" placeholder="كلمة المرور" class="w-full p-3 bg-gray-50 rounded-xl border-2 border-transparent focus:border-blue-600 outline-none font-bold text-sm mb-4">
        <button onclick="App.doLogin()" class="w-full bg-blue-700 text-white py-3 rounded-xl font-black">دخول</button>
        <p id="loginMsg" class="text-center text-xs text-red-500 font-bold mt-3 hidden"></p>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="mainApp" class="hidden flex flex-col h-full">

    <header class="bg-blue-700 text-white p-4 flex items-center justify-between sticky top-0 z-30 shadow-md flex-shrink-0">
        <div class="flex items-center gap-2">
            <button onclick="App.toggleDrawer()" class="text-white text-xl"><i class="fa-solid fa-bars"></i></button>
            <span class="font-black text-sm" id="headerTitle">الروائع</span>
        </div>
        <div class="flex items-center gap-2">
            <span id="connDot" class="w-2.5 h-2.5 rounded-full bg-emerald-400"></span>
            <span id="connLabel" class="text-[11px] font-bold">متصل</span>
            <button onclick="App.syncData()" class="relative bg-white/10 w-8 h-8 rounded-full"><i class="fa-solid fa-rotate text-xs"></i></button>
            <button onclick="App.doLogout()" class="bg-white/10 w-8 h-8 rounded-full"><i class="fa-solid fa-arrow-right-from-bracket text-xs"></i></button>
        </div>
    </header>

    <div id="creditBanner" class="hidden text-center py-2 text-sm font-bold flex-shrink-0"></div>
    <main id="mainContent" class="flex-1 overflow-y-auto pb-20"></main>

    <nav id="bottomNav" class="bg-white border-t fixed bottom-0 left-0 right-0 z-30 h-16 flex justify-around items-center text-gray-400 text-xs flex-shrink-0"></nav>

    <div id="drawerOverlay" class="drawer-overlay" onclick="App.toggleDrawer()"></div>
    <div id="mainDrawer" class="drawer">
        <div class="p-4 bg-blue-700 text-white">
            <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center text-2xl mb-2"><i class="fa-solid fa-user"></i></div>
            <div id="drawerUserName" class="font-bold"></div>
            <div id="drawerUserRole" class="text-xs text-blue-200"></div>
        </div>
        <nav class="p-2" id="drawerNav"></nav>
    </div>

    <div class="cart-overlay" id="cartOverlay" onclick="App.closeCart()"></div>
    <div class="cart-sheet" id="cartSheet">
        <div class="p-4 border-b flex justify-between items-center"><span class="font-black">السلة</span><button onclick="App.closeCart()" class="w-8 h-8 bg-gray-100 rounded-full"><i class="fa-solid fa-xmark"></i></button></div>
        <div id="cartBody" class="p-4 overflow-y-auto flex-1"></div>
        <div class="p-4 border-t"><button onclick="App.closeCart();App.goToReview()" class="w-full bg-blue-700 text-white py-3 rounded-xl font-black">مراجعة وإتمام</button></div>
    </div>

    <div id="barcodeScanner" class="barcode-scanner">
        <div class="p-4 bg-gray-900 text-white flex justify-between items-center"><span class="font-black"><i class="fa-solid fa-barcode text-blue-400 ml-2"></i> جاري مسح الباركود</span><button onclick="App.stopBarcodeScanner()" class="bg-red-600 text-white px-4 py-1.5 rounded-xl text-xs font-bold">إغلاق</button></div>
        <div class="flex-1 relative"><video id="scannerVideo" class="w-full h-full object-cover" playsinline></video><div class="absolute inset-0 border-4 border-blue-500 border-dashed rounded-2xl opacity-70 m-8 pointer-events-none"></div></div>
    </div>

</div>

<script>
// ============================================================
// تهيئة Supabase و Dexie
// ============================================================
var SUPABASE_URL = 'https://fiilmooggumokxanwiyx.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpaWxtb29nZ3Vtb2t4YW53aXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDkwOTIsImV4cCI6MjA5NDI4NTA5Mn0.LZScCxnCiRrTSCCBmTryszQpY1AwBgR2dkTBbC5kOc4';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var db = new Dexie('RW_FieldSales');
db.version(2).stores({
    customers: 'customer_code, name, area, phone, visit_day',
    items: 'item_code, name, sales_price, unit, max_qty, barcode, category, image_url',
    stock: '[item_id+branch_id], qty, allocated_qty',
    branches: 'branch_code, name',
    meta: 'key',
    orders: '++id, status, created_at',
    pending_updates: '++id, type, status'
});

function byId(id) { return document.getElementById(id); }
function safeText(el, text) { if (el) el.textContent = text; }
function safeHTML(el, html) { if (el) el.innerHTML = html; }
function fmtNum(n) { return Number(n || 0).toLocaleString('ar-EG', {minimumFractionDigits: 2}); }
function toast(m, t) { Swal.fire({ toast: true, position: 'top', icon: t || 'info', title: m, showConfirmButton: false, timer: 2000 }); }

// ============================================================
// التطبيق الرئيسي
// ============================================================
var App = {
    currentUser: null,
    currentRole: null,
    cart: [],
    selCust: null,
    selBranch: null,
    branchMap: {},
    delFee: 0,
    taxRate: 0,
    minAmt: 0,
    companyName: 'الروائع',
    scannerStream: null,
    scannerActive: false,
    lastScanned: '',
    lastScanTime: 0,
    currentCategory: 'الكل',

    init: function() {
        var self = this;
        supabase.auth.getSession().then(function(res) {
            if (res.data && res.data.session) {
                self.currentUser = res.data.session.user;
                supabase.from('users').select('*').eq('email', self.currentUser.email).single().then(function(uRes) {
                    if (uRes.data) { self.currentUser = uRes.data; self.currentRole = uRes.data.role || 'تلي سيلز'; }
                    else { self.currentRole = 'تلي سيلز'; }
                    self.enterApp();
                });
            } else { byId('loginScreen').classList.remove('hidden'); }
        });
    },

    enterApp: function() {
        byId('loginScreen').classList.add('hidden');
        byId('mainApp').classList.remove('hidden');
        this.loadSettings();
        this.updateConnectionStatus();
        window.addEventListener('online', function() { App.updateConnectionStatus(); });
        window.addEventListener('offline', function() { App.updateConnectionStatus(); });
        this.renderDrawer();
        this.renderBottomNav();
        this.syncDown().then(function() { App.loadBranches(); });
    },

    doLogin: function() {
        var email = byId('loginEmail').value, pass = byId('loginPass').value;
        if (!email || !pass) { toast('أدخل البيانات', 'warning'); return; }
        var self = this;
        Swal.showLoading();
        supabase.auth.signInWithPassword({ email: email, password: pass }).then(function(res) {
            Swal.close();
            if (res.error) { byId('loginMsg').innerText = res.error.message; byId('loginMsg').classList.remove('hidden'); }
            else { self.init(); }
        });
    },

    doLogout: function() {
        var self = this;
        supabase.auth.signOut().then(function() {
            self.cart = []; self.selCust = null;
            byId('mainApp').classList.add('hidden');
            byId('loginScreen').classList.remove('hidden');
        });
    },

    updateConnectionStatus: function() {
        var dot = byId('connDot'), label = byId('connLabel');
        if (navigator.onLine) { dot.className = 'w-2.5 h-2.5 rounded-full bg-emerald-400'; label.innerText = 'متصل'; }
        else { dot.className = 'w-2.5 h-2.5 rounded-full bg-red-500'; label.innerText = 'غير متصل'; }
    },

    syncDown: function() {
        return Promise.all([
            supabase.from('customers').select('*').then(function(r) { return db.customers.clear().then(function() { return db.customers.bulkPut(r.data || []); }); }),
            supabase.from('items').select('*').then(function(r) { return db.items.clear().then(function() { return db.items.bulkPut(r.data || []); }); }),
            supabase.from('stock_branches').select('*').then(function(r) { return db.stock.clear().then(function() { return db.stock.bulkPut(r.data || []); }); }),
            supabase.from('branches').select('*').then(function(r) { return db.branches.clear().then(function() { return db.branches.bulkPut(r.data || []); }); }),
            supabase.from('app_settings').select('*').limit(1).single().then(function(r) {
                if (r.data) { db.meta.put({ key: 'settings', del: Number(r.data.delivery_fee) || 0, tax: Number(r.data.tax_rate) || 0, min: Number(r.data.min_invoice_amount) || 0, name: r.data.company_name || 'الروائع', logo: r.data.company_logo || '' }); }
            })
        ]);
    },

    syncData: function() {
        if (!navigator.onLine) { toast('لا يوجد اتصال', 'warning'); return; }
        var self = this;
        Swal.showLoading();
        this.syncDown().then(function() { Swal.close(); self.loadBranches(); self.loadSettings(); toast('تمت المزامنة', 'success'); }).catch(function() { Swal.close(); toast('فشلت المزامنة', 'error'); });
    },

    loadSettings: function() {
        var self = this;
        db.meta.get('settings').then(function(s) {
            if (s) { self.delFee = s.del || 0; self.taxRate = s.tax || 0; self.minAmt = s.min || 0; self.companyName = s.name || 'الروائع'; safeText(byId('headerTitle'), self.companyName + ' - ' + (self.currentRole || '')); }
        });
    },

    toggleDrawer: function() { byId('mainDrawer').classList.toggle('open'); byId('drawerOverlay').classList.toggle('show'); },

    renderDrawer: function() {
        safeText(byId('drawerUserName'), this.currentUser.name || this.currentUser.email);
        safeText(byId('drawerUserRole'), this.currentRole || '');
        var html = '';
        html += '<button onclick="App.switchRole(\'تلي سيلز\')" class="w-full text-right p-3 hover:bg-gray-100 rounded-lg"><i class="fa-solid fa-headset ml-2"></i> التلي سيلز</button>';
        html += '<button onclick="App.switchRole(\'مندوب مبيعات\')" class="w-full text-right p-3 hover:bg-gray-100 rounded-lg"><i class="fa-solid fa-user-tie ml-2"></i> مندوب المبيعات</button>';
        html += '<button onclick="App.switchRole(\'كاشير\')" class="w-full text-right p-3 hover:bg-gray-100 rounded-lg"><i class="fa-solid fa-cash-register ml-2"></i> الكاشير</button>';
        html += '<button onclick="App.switchRole(\'مندوب بيع مباشر\')" class="w-full text-right p-3 hover:bg-gray-100 rounded-lg"><i class="fa-solid fa-truck-field ml-2"></i> مندوب بيع مباشر</button>';
        html += '<hr class="my-2">';
        html += '<button onclick="App.toggleDrawer();App.showMap()" class="w-full text-right p-3 hover:bg-gray-100 rounded-lg"><i class="fa-solid fa-map-location-dot ml-2"></i> خريطة العملاء</button>';
        html += '<button onclick="App.syncData()" class="w-full text-right p-3 hover:bg-gray-100 rounded-lg"><i class="fa-solid fa-sync ml-2"></i> مزامنة</button>';
        html += '<button onclick="App.doLogout()" class="w-full text-right p-3 hover:bg-red-50 text-red-600 rounded-lg"><i class="fa-solid fa-right-from-bracket ml-2"></i> تسجيل الخروج</button>';
        safeHTML(byId('drawerNav'), html);
    },

    switchRole: function(role) { this.currentRole = role; this.toggleDrawer(); this.renderBottomNav(); safeText(byId('headerTitle'), this.companyName + ' - ' + role); },

    renderBottomNav: function() {
        var role = this.currentRole || 'تلي سيلز';
        var html = '';
        if (role === 'تلي سيلز') {
            html += '<button onclick="App.showView(\'customers\')" class="flex flex-col items-center p-2 text-blue-600" id="nav-customers"><i class="fa-solid fa-users text-lg mb-1"></i><span>العملاء</span></button>';
            html += '<button onclick="App.showView(\'catalog\')" class="flex flex-col items-center p-2" id="nav-catalog"><i class="fa-solid fa-box text-lg mb-1"></i><span>المنتجات</span></button>';
            html += '<button onclick="App.showView(\'review\')" class="flex flex-col items-center p-2" id="nav-review"><i class="fa-solid fa-cart-shopping text-lg mb-1"></i><span>المراجعة</span></button>';
            html += '<button onclick="App.showView(\'orders\')" class="flex flex-col items-center p-2" id="nav-orders"><i class="fa-solid fa-list-check text-lg mb-1"></i><span>أوردراتي</span></button>';
        } else if (role === 'مندوب مبيعات') {
            html += '<button onclick="App.showView(\'customers\')" class="flex flex-col items-center p-2 text-blue-600" id="nav-customers"><i class="fa-solid fa-users text-lg mb-1"></i><span>عملائي</span></button>';
            html += '<button onclick="App.showView(\'catalog\')" class="flex flex-col items-center p-2" id="nav-catalog"><i class="fa-solid fa-box text-lg mb-1"></i><span>المنتجات</span></button>';
            html += '<button onclick="App.showView(\'review\')" class="flex flex-col items-center p-2" id="nav-review"><i class="fa-solid fa-cart-shopping text-lg mb-1"></i><span>أوردر</span></button>';
            html += '<button onclick="App.showView(\'orders\')" class="flex flex-col items-center p-2" id="nav-orders"><i class="fa-solid fa-list-check text-lg mb-1"></i><span>أوردراتي</span></button>';
        } else if (role === 'كاشير') {
            html += '<button onclick="App.showView(\'pos\')" class="flex flex-col items-center p-2 text-blue-600" id="nav-pos"><i class="fa-solid fa-cash-register text-lg mb-1"></i><span>البيع</span></button>';
            html += '<button onclick="App.startBarcodeScanner()" class="flex flex-col items-center p-2" id="nav-scan"><i class="fa-solid fa-camera text-lg mb-1"></i><span>مسح</span></button>';
            html += '<button onclick="App.showView(\'posInvoices\')" class="flex flex-col items-center p-2" id="nav-invoices"><i class="fa-solid fa-file-invoice text-lg mb-1"></i><span>فواتير اليوم</span></button>';
        } else if (role === 'مندوب بيع مباشر') {
            html += '<button onclick="App.showView(\'vanStock\')" class="flex flex-col items-center p-2 text-blue-600" id="nav-stock"><i class="fa-solid fa-truck-ramp-box text-lg mb-1"></i><span>العهدة</span></button>';
            html += '<button onclick="App.showView(\'customers\')" class="flex flex-col items-center p-2" id="nav-customers"><i class="fa-solid fa-users text-lg mb-1"></i><span>العملاء</span></button>';
            html += '<button onclick="App.showView(\'catalog\')" class="flex flex-col items-center p-2" id="nav-catalog"><i class="fa-solid fa-box text-lg mb-1"></i><span>البيع</span></button>';
            html += '<button onclick="App.showView(\'vanInventory\')" class="flex flex-col items-center p-2" id="nav-inventory"><i class="fa-solid fa-clipboard-check text-lg mb-1"></i><span>جرد</span></button>';
        }
        safeHTML(byId('bottomNav'), html);
        this.showView(role === 'كاشير' ? 'pos' : 'customers');
    },

    showView: function(view) {
        var container = byId('mainContent');
        if (!container) return;
        var btns = document.querySelectorAll('#bottomNav button');
        for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('text-blue-600'); btns[i].classList.add('text-gray-400'); }
        var activeBtn = byId('nav-' + view);
        if (activeBtn) { activeBtn.classList.remove('text-gray-400'); activeBtn.classList.add('text-blue-600'); }
        if (view === 'customers') this.renderCustomerView();
        else if (view === 'catalog') this.renderCatalogView();
        else if (view === 'review') this.renderReviewView();
        else if (view === 'orders') this.renderOrdersView();
        else if (view === 'pos') this.renderPOSView();
        else if (view === 'posInvoices') this.renderPOSInvoicesView();
        else if (view === 'vanStock') this.renderVanStockView();
        else if (view === 'vanInventory') this.renderVanInventoryView();
    },

    // ==================== العملاء ====================
    renderCustomerView: function() {
        var html = '<div class="p-4 animate-fadeIn"><h2 class="text-xl font-bold mb-4">العملاء</h2>';
        html += '<input type="text" id="custSearch" oninput="App.searchCustomers(this.value)" placeholder="ابحث باسم، كود، هاتف..." class="w-full p-3 bg-white rounded-xl border-2 border-transparent focus:border-blue-600 outline-none font-bold text-sm mb-4">';
        html += '<div id="custResults" class="space-y-2"></div></div>';
        safeHTML(byId('mainContent'), html);
    },

    searchCustomers: function(q) {
        if (!q || !q.trim()) { safeHTML(byId('custResults'), ''); return; }
        var s = q.toLowerCase();
        var self = this;
        db.customers.toArray().then(function(all) {
            var filtered = [];
            for (var i = 0; i < all.length; i++) {
                var c = all[i];
                if ((c.name || '').toLowerCase().indexOf(s) !== -1 || (c.customer_code || '').toLowerCase().indexOf(s) !== -1 || (c.phone || '').indexOf(s) !== -1 || (c.area || '').toLowerCase().indexOf(s) !== -1) { filtered.push(c); }
                if (filtered.length >= 15) break;
            }
            var html = '';
            if (!filtered.length) { html = '<div class="text-center text-gray-400 p-4">لا توجد نتائج</div>'; }
            else {
                for (var j = 0; j < filtered.length; j++) {
                    var cu = filtered[j];
                    var debtClass = Number(cu.debt) > 0 ? 'text-red-500' : 'text-green-600';
                    html += '<div onclick="App.selectCustomer(\'' + cu.customer_code + '\')" class="bg-white p-4 rounded-xl shadow-sm border cursor-pointer hover:bg-blue-50">';
                    html += '<div class="font-bold">' + (cu.name || '') + '</div><div class="text-xs text-gray-400">' + (cu.customer_code || '') + ' - ' + (cu.area || '') + '</div>';
                    html += '<div class="text-xs ' + debtClass + ' font-bold mt-1">الرصيد: ' + fmtNum(cu.debt) + ' EGP</div></div>';
                }
            }
            safeHTML(byId('custResults'), html);
        });
    },

    selectCustomer: function(code) {
        var self = this;
        db.customers.get(code).then(function(c) {
            if (!c) return;
            self.selCust = c;
            var limit = Number(c.credit_limit) || 0, debt = Number(c.debt) || 0, pct = limit > 0 ? (debt / limit) * 100 : 0;
            var banner = byId('creditBanner');
            if (pct >= 90) { banner.className = 'text-center py-2 text-sm font-bold credit-red'; banner.innerHTML = '⚠️ تحذير: تجاوز الحد الائتماني (' + fmtNum(debt) + ' / ' + fmtNum(limit) + ')'; banner.classList.remove('hidden'); }
            else if (pct >= 60) { banner.className = 'text-center py-2 text-sm font-bold credit-yellow'; banner.innerHTML = 'تنبيه: اقترب من الحد الائتماني (' + fmtNum(debt) + ' / ' + fmtNum(limit) + ')'; banner.classList.remove('hidden'); }
            else { banner.classList.add('hidden'); }
            toast('تم اختيار: ' + (c.name || code), 'success');
        });
    },

    // ==================== المنتجات ====================
    extractAndRenderCategories: function() {
        var self = this;
        db.items.toArray().then(function(allItems) {
            var cats = {}, uniqueCats = ['الكل'];
            for (var i = 0; i < allItems.length; i++) { var cat = allItems[i].category || 'بدون تصنيف'; if (!cats[cat]) { cats[cat] = true; uniqueCats.push(cat); } }
            var html = '<div class="flex gap-2 overflow-x-auto pb-2 mb-3" id="catTabs">';
            for (var j = 0; j < uniqueCats.length; j++) {

            self.branchMap = {};

            for (var i = 0; i < br.length; i++) { self.branchMap[br[i].branch_code] = br[i].id; html += '<option value="' + br[i].branch_code + '">' + (br[i].name || br[i].branch_code) + '</option>'; }

    onBranchChange: function(v) { this.selBranch = v || null; this.searchItems(byId('itemSearch') ? byId('itemSearch').value : (byId('posSearch') ? byId('posSearch').value : '')); },

    getAvail: function(itemId) {
        var self = this;
        var bid = this.selBranch ? this.branchMap[this.selBranch] : null;
        return db.stock.where('item_id').equals(itemId).toArray().then(function(r) {
            if (bid) { for (var i = 0; i < r.length; i++) { if (r[i].branch_id === bid) return Math.max(0, (Number(r[i].qty) || 0) - (Number(r[i].allocated_qty) || 0)); } return 0; }
            var t = 0; for (var j = 0; j < r.length; j++) t += Math.max(0, (Number(r[j].qty) || 0) - (Number(r[j].allocated_qty) || 0)); return t;
        });
    },

    searchItems: function(q) {
        if (!this.selBranch) { safeHTML(byId('itemResults'), '<div class="col-span-2 text-center text-amber-500 p-4 bg-white rounded-xl">اختر فرعاً أولاً</div>'); return; }
        var self = this;
        db.items.toArray().then(function(all) {
            var filtered = all;
            if (q && q.trim()) {
                var s = q.toLowerCase();
                filtered = [];
                for (var i = 0; i < all.length; i++) { var it = all[i]; if ((it.name || '').toLowerCase().indexOf(s) !== -1 || (it.item_code || '').toLowerCase().indexOf(s) !== -1 || (it.barcode || '').indexOf(s) !== -1) { filtered.push(it); } }
            }
            if (self.currentCategory && self.currentCategory !== 'الكل') { filtered = filtered.filter(function(it) { return (it.category || 'بدون تصنيف') === self.currentCategory; }); }
            filtered = filtered.slice(0, 24);
            var promises = [];
            for (var j = 0; j < filtered.length; j++) promises.push(self.getAvail(filtered[j].id));
            Promise.all(promises).then(function(avails) {
                var html = '';
                if (!filtered.length) { html = '<div class="col-span-2 text-center text-gray-400 p-4">لا توجد منتجات</div>'; }
                else {
                    for (var k = 0; k < filtered.length; k++) {
                        var it = filtered[k], avail = avails[k];
                        var inCart = 0;
                        for (var x = 0; x < self.cart.length; x++) { if (self.cart[x].code === it.item_code) { inCart = self.cart[x].qty; break; } }
                        var imgSrc = it.image_url || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22150%22%3E%3Crect fill=%22%23e2e8f0%22 width=%22150%22 height=%22150%22/%3E%3Ctext fill=%22%2394a3b8%22 font-family=%22Arial%22 font-size=%2214%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3E📦%3C/text%3E%3C/svg%3E';
                        html += '<div class="bg-white p-3 rounded-2xl shadow-sm border flex flex-col">';
                        html += '<div class="w-full h-24 bg-gray-100 rounded-xl mb-2 overflow-hidden"><img src="' + imgSrc + '" alt="' + (it.name || '') + '" class="w-full h-full object-cover cursor-pointer" onerror="this.src=\'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22150%22%3E%3Crect fill=%22%23e2e8f0%22 width=%22150%22 height=%22150%22/%3E%3Ctext fill=%22%2394a3b8%22 font-family=%22Arial%22 font-size=%2214%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3E📦%3C/text%3E%3C/svg%3E\'" onclick="event.stopPropagation();App.viewImage(\'' + imgSrc + '\',\'' + (it.name || '').replace(/'/g, "\\'") + '\')"></div>';
                        html += '<div class="font-black text-sm text-slate-700 leading-snug mb-1">' + (it.name || '') + '</div>';
                        html += '<div class="text-[11px] text-slate-400 font-bold mb-2">' + (it.item_code || '') + '</div>';
                        html += '<div class="flex justify-between items-center mt-auto">';
                        html += '<div><span class="text-blue-600 font-black">' + fmtNum(it.sales_price) + '</span><span class="text-[10px] text-gray-400 block">متاح: ' + avail + '</span></div>';
                        if (inCart > 0) {
                            html += '<div class="flex items-center gap-1"><button onclick="event.stopPropagation();App.decCart(\'' + it.item_code + '\')" class="w-7 h-7 bg-gray-100 rounded-full font-black">-</button><span class="w-5 text-center font-black">' + inCart + '</span><button onclick="event.stopPropagation();App.addToCart(\'' + it.item_code + '\')" class="w-7 h-7 bg-blue-600 text-white rounded-full font-black">+</button></div>';
                        } else {
                            html += '<button onclick="event.stopPropagation();App.addToCart(\'' + it.item_code + '\')" class="w-8 h-8 bg-blue-600 text-white rounded-full"><i class="fa-solid fa-plus"></i></button>';
                        }
                        html += '</div></div>';
                    }
                }
                safeHTML(byId('itemResults'), html);
            });
        });
    },

    viewImage: function(src, name) {
        Swal.fire({ imageUrl: src, imageAlt: name || 'صورة المنتج', imageWidth: 400, showCloseButton: true, showConfirmButton: false, customClass: { popup: '!bg-transparent !shadow-none !p-0' } });
    },

    // ==================== السلة ====================
    addToCart: function(code) {
        var self = this;
        db.items.get(code).then(function(it) {
            if (!it) return;
            self.getAvail(it.id).then(function(avail) {
                var existing = null;
                for (var i = 0; i < self.cart.length; i++) { if (self.cart[i].code === code) { existing = self.cart[i]; break; } }
                var cur = existing ? existing.qty : 0, nq = cur + 1;
                var mx = it.max_qty ? Number(it.max_qty) : 0;
                if (mx > 0 && nq > mx) { toast('الحد الأقصى: ' + mx, 'warning'); return; }
                if (nq > avail) { toast('المتاح: ' + avail, 'warning'); return; }
                if (existing) { existing.qty = nq; }
                else { self.cart.push({ code: it.item_code, name: it.name, price: Number(it.sales_price) || 0, unit: it.unit || 'حبة', qty: 1 }); }
                self.searchItems(byId('itemSearch') ? byId('itemSearch').value : (byId('posSearch') ? byId('posSearch').value : ''));
                if (typeof self.renderPOSCart === 'function') self.renderPOSCart();
            });
        });
    },

    decCart: function(code) {
        for (var i = 0; i < this.cart.length; i++) { if (this.cart[i].code === code) { this.cart[i].qty--; if (this.cart[i].qty <= 0) this.cart.splice(i, 1); break; } }
        this.searchItems(byId('itemSearch') ? byId('itemSearch').value : (byId('posSearch') ? byId('posSearch').value : ''));
        if (typeof this.renderPOSCart === 'function') this.renderPOSCart();
    },

    calcTotals: function() {
        var sub = 0;
        for (var i = 0; i < this.cart.length; i++) sub += this.cart[i].price * this.cart[i].qty;
        if (sub === 0) return { sub: 0, del: 0, tax: 0, total: 0 };
        var d = this.delFee, beforeTax = sub + d, tx = Math.round(beforeTax * this.taxRate) / 100;
        return { sub: sub, del: d, tax: tx, total: beforeTax + tx };
    },

    openCart: function() { this.renderCartContent(); byId('cartSheet').classList.add('open'); byId('cartOverlay').classList.add('show'); },
    closeCart: function() { byId('cartSheet').classList.remove('open'); byId('cartOverlay').classList.remove('show'); },

    renderCartContent: function() {
        var html = '';
        for (var i = 0; i < this.cart.length; i++) {
            var item = this.cart[i];
            html += '<div class="flex justify-between items-center bg-white p-3 rounded-xl border mb-2">';
            html += '<div><div class="font-black text-sm">' + item.name + '</div><div class="text-xs text-gray-400">' + fmtNum(item.price) + ' × ' + item.qty + '</div></div>';
            html += '<div class="flex items-center gap-1"><button onclick="App.decCart(\'' + item.code + '\');App.renderCartContent()" class="w-7 h-7 bg-gray-100 rounded-full font-black">-</button><span class="w-5 text-center font-black">' + item.qty + '</span><button onclick="App.addToCart(\'' + item.code + '\');App.renderCartContent()" class="w-7 h-7 bg-blue-600 text-white rounded-full font-black">+</button></div></div>';
        }
        safeHTML(byId('cartBody'), html || '<div class="text-center text-gray-400 p-4">السلة فارغة</div>');
    },

    goToReview: function() { this.showView('review'); },

    // ==================== المراجعة والحفظ ====================
    renderReviewView: function() {
        var self = this;
        var t = this.calcTotals();
        var html = '<div class="p-4 animate-fadeIn"><h2 class="text-xl font-bold mb-4">مراجعة الأوردر</h2>';
        if (this.selCust) { html += '<div class="bg-blue-50 p-4 rounded-2xl mb-4"><div class="font-black text-blue-800">' + (this.selCust.name || '') + '</div><div class="text-sm text-blue-600">' + (this.selCust.customer_code || '') + ' - ' + (this.selCust.area || '') + '</div></div>'; }
        
        html += '<div class="bg-white p-4 rounded-2xl shadow-sm border mb-4">';
        html += '<h3 class="font-bold text-sm text-gray-500 mb-3">الأصناف</h3>';
        
        if (!this.cart.length) {
            html += '<div class="text-center text-gray-400 py-4">السلة فارغة</div>';
        } else {
            for (var i = 0; i < this.cart.length; i++) {
                var item = this.cart[i];
                var lineTotal = item.price * item.qty;
                html += '<div class="flex items-center justify-between py-3 border-b last:border-b-0">';
                html += '<div class="flex-1 min-w-0"><div class="font-black text-sm text-gray-800">' + item.name + '</div><div class="text-xs text-gray-400">' + fmtNum(item.price) + ' × ' + item.qty + ' = <span class="font-bold text-blue-600">' + fmtNum(lineTotal) + '</span></div></div>';
                html += '<div class="flex items-center gap-2 mr-3">';
                html += '<button onclick="App.decCart(\'' + item.code.replace(/'/g, "\\'") + '\');App.renderReviewView();" class="w-8 h-8 bg-gray-100 hover:bg-gray-200 rounded-full font-black text-gray-600 flex items-center justify-center text-sm">−</button>';
                html += '<span class="w-6 text-center font-black text-sm">' + item.qty + '</span>';
                html += '<button onclick="App.addToCart(\'' + item.code.replace(/'/g, "\\'") + '\');App.renderReviewView();" class="w-8 h-8 bg-blue-600 hover:bg-blue-700 rounded-full font-black text-white flex items-center justify-center text-sm">+</button>';
                html += '</div>';
                html += '</div>';
            }
        }
        html += '</div>';
        
        html += '<div class="bg-white p-4 rounded-2xl shadow-sm border space-y-2"><div class="flex justify-between"><span>المجموع:</span><span>' + fmtNum(t.sub) + '</span></div><div class="flex justify-between"><span>التوصيل:</span><span class="text-blue-600">' + fmtNum(t.del) + '</span></div><div class="flex justify-between"><span>الضريبة:</span><span class="text-red-600">' + fmtNum(t.tax) + '</span></div><div class="flex justify-between font-black text-lg pt-2 border-t"><span>الإجمالي:</span><span class="text-emerald-600">' + fmtNum(t.total) + '</span></div></div>';
        html += '<button onclick="App.submitOrder()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-black mt-4">حفظ الأوردر</button></div>';
        safeHTML(byId('mainContent'), html);
    },

    submitOrder: function() {
        if (!this.selCust) { toast('اختر عميلاً', 'warning'); return; }
        if (!this.cart.length) { toast('السلة فارغة', 'warning'); return; }
        if (!this.selBranch) { toast('اختر فرعاً', 'warning'); return; }
        var t = this.calcTotals();
        if (this.minAmt > 0 && t.total < this.minAmt) { toast('الحد الأدنى للفاتورة: ' + fmtNum(this.minAmt), 'warning'); return; }
        var status = (this.currentRole === 'كاشير') ? 'Invoiced' : 'Confirmed';
        var items = [];
        for (var i = 0; i < this.cart.length; i++) { items.push({ code: this.cart[i].code, name: this.cart[i].name, price: this.cart[i].price, qty: this.cart[i].qty, unit: this.cart[i].unit }); }
        var hdr = { customer_code: this.selCust.customer_code, custName: this.selCust.name, area: this.selCust.area || '', total: t.total, deliveryFees: t.del, status: status, paymentType: this.selCust.payment_type || 'أجل', taxAmount: t.tax, taxRate: this.taxRate };
        var self = this;
        Swal.showLoading();
        supabase.auth.getSession().then(function(ses) {
            var token = (ses && ses.data && ses.data.session) ? ses.data.session.access_token : null;
            return fetch(SUPABASE_URL + '/functions/v1/save-sales-invoice', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token }, body: JSON.stringify({ orderHeader: hdr, itemsList: items, branchCode: self.selBranch }) });
        }).then(function(r) { return r.json(); }).then(function(json) {
            Swal.close();
            if (json.success) { toast('تم الحفظ: ' + (json.orderID || ''), 'success'); self.cart = []; self.selCust = null; byId('creditBanner').classList.add('hidden'); self.showView(self.currentRole === 'كاشير' ? 'pos' : 'customers'); }
            else { toast(json.msg || 'فشل الحفظ', 'error'); }
        }).catch(function() { Swal.close(); toast('فشل الاتصال', 'error'); });
    },

        var html = '<div class="p-4 animate-fadeIn"><h2 class="text-xl font-bold mb-4">نقطة البيع</h2>';

    renderOrdersList: function() {
        var self = this;
        var container = byId('ordersListContainer');
        if (!container) return;
        safeHTML(container, '<div class="text-center text-gray-400 py-8">جاري التحميل...</div>');
        var query = supabase.from('orders').select('*').eq('created_by', this.currentUser.email).order('order_date', { ascending: false }).limit(50);
        var statusFilter = byId('orderStatusFilter') ? byId('orderStatusFilter').value : '';
        var dateFilter = byId('orderDateFilter') ? byId('orderDateFilter').value : '';
        if (statusFilter) { query = query.eq('order_status', statusFilter); }
        if (dateFilter) { query = query.eq('order_date', dateFilter); }
        query.then(function(res) {
            var orders = res.data || [];
            if (!orders.length) { safeHTML(container, '<div class="text-center text-gray-400 py-8 bg-white rounded-2xl">لا توجد أوردرات</div>'); return; }
            var html = '';
            for (var i = 0; i < orders.length; i++) {
                var o = orders[i];
                var statusColor = '', statusLabel = o.order_status || '';
                if (o.order_status === 'Draft') { statusColor = 'bg-yellow-100 text-yellow-700'; statusLabel = 'مسودة'; }
                else if (o.order_status === 'Confirmed') { statusColor = 'bg-blue-100 text-blue-700'; statusLabel = 'مؤكد'; }
                else if (o.order_status === 'Pending') { statusColor = 'bg-purple-100 text-purple-700'; statusLabel = 'قيد الانتظار'; }
                else if (o.order_status === 'Invoiced') { statusColor = 'bg-green-100 text-green-700'; statusLabel = 'مفوتر'; }
                else if (o.order_status === 'Delivered') { statusColor = 'bg-emerald-100 text-emerald-700'; statusLabel = 'تم التوصيل'; }
                else if (o.order_status === 'Cancelled') { statusColor = 'bg-red-100 text-red-700'; statusLabel = 'ملغي'; }
                else { statusColor = 'bg-gray-100 text-gray-700'; }
                html += '<div onclick="App.showOrderDetail(\'' + o.id + '\')" class="bg-white p-4 rounded-2xl shadow-sm border cursor-pointer hover:bg-blue-50 transition">';
                html += '<div class="flex justify-between items-start mb-2"><div><span class="font-black text-blue-600 text-sm">' + (o.order_code || '') + '</span><span class="text-xs text-gray-400 mr-2">' + (o.order_date ? new Date(o.order_date).toLocaleDateString('ar-EG') : '') + '</span></div><span class="px-2 py-1 rounded-full text-xs font-bold ' + statusColor + '">' + statusLabel + '</span></div>';
                html += '<div class="flex justify-between items-center"><div><span class="font-bold text-sm">' + (o.customer_name || '') + '</span><span class="text-xs text-gray-400 mr-2">' + (o.area || '') + '</span></div><span class="font-black text-emerald-600 text-sm">' + fmtNum(o.total_amount) + ' EGP</span></div>';
                if (o.order_status === 'Draft') { html += '<div class="flex gap-2 mt-2 pt-2 border-t"><button onclick="event.stopPropagation();App.confirmOrder(\'' + o.order_code + '\')" class="flex-1 bg-blue-600 text-white text-xs py-1.5 rounded-lg font-bold">تأكيد</button><button onclick="event.stopPropagation();App.cancelOrder(\'' + o.order_code + '\')" class="flex-1 bg-red-100 text-red-600 text-xs py-1.5 rounded-lg font-bold">إلغاء</button></div>'; }
                else if (o.order_status === 'Confirmed') { html += '<div class="flex gap-2 mt-2 pt-2 border-t"><button onclick="event.stopPropagation();App.cancelOrder(\'' + o.order_code + '\')" class="flex-1 bg-red-100 text-red-600 text-xs py-1.5 rounded-lg font-bold">إلغاء</button></div>'; }
                html += '</div>';
            }
            safeHTML(container, html);
        }).catch(function(e) { console.error('Failed to load orders:', e); safeHTML(container, '<div class="text-center text-red-400 py-8 bg-white rounded-2xl">فشل تحميل الأوردرات</div>'); });
    },

    showOrderDetail: function(orderId) {
        var self = this;
        Swal.showLoading();
        supabase.from('orders').select('*').eq('id', orderId).single().then(function(oRes) {
            var order = oRes.data;
            if (!order) { Swal.close(); toast('الأوردر غير موجود', 'error'); return; }
            supabase.from('order_details').select('*').eq('order_id', order.id).then(function(dRes) {
                Swal.close();
                var details = dRes.data || [];
                var statusLabel = order.order_status || '';
                if (order.order_status === 'Draft') statusLabel = 'مسودة';
                else if (order.order_status === 'Confirmed') statusLabel = 'مؤكد';
                else if (order.order_status === 'Pending') statusLabel = 'قيد الانتظار';
                else if (order.order_status === 'Invoiced') statusLabel = 'مفوتر';
                else if (order.order_status === 'Delivered') statusLabel = 'تم التوصيل';
                else if (order.order_status === 'Cancelled') statusLabel = 'ملغي';
                var html = '<div class="text-right">';
                html += '<div class="bg-gray-50 p-4 rounded-xl mb-4"><div class="flex justify-between mb-2"><span class="font-black text-lg">' + (order.order_code || '') + '</span><span class="text-sm font-bold">' + statusLabel + '</span></div>';
                html += '<p><strong>العميل:</strong> ' + (order.customer_name || '') + '</p><p><strong>المنطقة:</strong> ' + (order.area || '') + '</p><p><strong>التاريخ:</strong> ' + (order.order_date ? new Date(order.order_date).toLocaleDateString('ar-EG') : '') + '</p><p><strong>طريقة الدفع:</strong> ' + (order.payment_type || '') + '</p></div>';
                if (details.length > 0) {
                    html += '<div class="overflow-x-auto"><table class="w-full text-sm border"><thead><tr class="bg-gray-100"><th class="p-2">الصنف</th><th class="p-2 text-center">الكمية</th><th class="p-2 text-center">السعر</th><th class="p-2 text-center">الإجمالي</th></tr></thead><tbody>';
                    var total = 0;
                    for (var i = 0; i < details.length; i++) { var d = details[i]; var lt = Number(d.line_amount) || (Number(d.qty) * Number(d.unit_price)); total += lt; html += '<tr><td class="p-2 font-semibold">' + (d.item_name || '') + '</td><td class="p-2 text-center">' + d.qty + '</td><td class="p-2 text-center">' + fmtNum(d.unit_price) + '</td><td class="p-2 text-center font-bold">' + fmtNum(lt) + '</td></tr>'; }
                    html += '</tbody></table></div><div class="mt-3 text-left font-bold text-lg">الإجمالي: ' + fmtNum(order.total_amount || total) + ' EGP</div>';
                }
                if (order.order_status === 'Invoiced' || order.order_status === 'Delivered') { html += '<div class="text-center mt-4 pt-4 border-t"><p class="font-bold text-sm mb-2">رمز الفاتورة</p><div id="orderQrCode" class="inline-block"></div></div>'; }
                html += '</div>';
                Swal.fire({ title: 'تفاصيل الأوردر', html: html, width: '700px', showCloseButton: true, showConfirmButton: false,
                    didOpen: function() {
                        if (order.order_status === 'Invoiced' || order.order_status === 'Delivered') {
                            setTimeout(function() { var qrContainer = document.getElementById('orderQrCode'); if (qrContainer && typeof QRCode !== 'undefined') { var qrText = (order.order_code || '') + '\n' + (order.customer_name || '') + '\n' + (order.total_amount || '') + '\n' + (order.order_date || ''); qrContainer.innerHTML = ''; new QRCode(qrContainer, { text: qrText, width: 120, height: 120 }); } }, 300);
                        }
                    }
                });
            });
        }).catch(function(e) { Swal.close(); console.error('Failed to load order detail:', e); });
    },

    confirmOrder: function(orderCode) {
        var self = this;
        Swal.fire({ title: 'تأكيد الأوردر', text: 'تحويل ' + orderCode + ' إلى مؤكد؟', icon: 'question', showCancelButton: true, confirmButtonText: 'تأكيد', cancelButtonText: 'إلغاء' }).then(function(cf) {
            if (!cf.isConfirmed) return;
            Swal.showLoading();
            supabase.auth.getSession().then(function(ses) { var t = ses.data.session && ses.data.session.access_token; return fetch(SUPABASE_URL + '/functions/v1/confirm-order', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + t }, body: JSON.stringify({ order_code: orderCode }) }).then(function(res) { return res.json(); }); }).then(function(json) { Swal.close(); if (json.success) { toast('تم التأكيد', 'success'); self.renderOrdersList(); } else { toast(json.msg || 'فشل التأكيد', 'error'); } }).catch(function() { Swal.close(); toast('فشل الاتصال', 'error'); });
        });
    },

    cancelOrder: function(orderCode) {
        var self = this;
        Swal.fire({ title: 'إلغاء الأوردر', text: 'هل أنت متأكد من إلغاء ' + orderCode + '؟', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'نعم، ألغِ', cancelButtonText: 'تراجع' }).then(function(cf) {
            if (!cf.isConfirmed) return;
            Swal.showLoading();
            supabase.auth.getSession().then(function(ses) { var t = ses.data.session && ses.data.session.access_token; return fetch(SUPABASE_URL + '/functions/v1/delete-order', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + t }, body: JSON.stringify({ order_code: orderCode }) }).then(function(res) { return res.json(); }); }).then(function(json) { Swal.close(); if (json.success) { toast('تم الإلغاء', 'success'); self.renderOrdersList(); } else { toast(json.msg || 'فشل الإلغاء', 'error'); } }).catch(function() { Swal.close(); toast('فشل الاتصال', 'error'); });
        });
    },

    // ==================== فواتير اليوم ====================
    renderPOSInvoicesView: function() {
        var self = this;
        var today = new Date().toISOString().split('T')[0];
        var html = '<div class="p-4 animate-fadeIn"><h2 class="text-xl font-bold mb-4">فواتير اليوم</h2>';
        html += '<div class="grid grid-cols-2 gap-3 mb-4" id="posSummary"></div>';
        html += '<div class="bg-white p-3 rounded-2xl shadow-sm border mb-4"><div class="flex gap-2"><input type="date" id="posInvDateFilter" value="' + today + '" onchange="App.renderPOSInvoicesList()" class="p-2 bg-gray-50 border rounded-lg text-sm font-bold"><button onclick="byId(\'posInvDateFilter\').value=\'' + today + '\';App.renderPOSInvoicesList();" class="p-2 bg-gray-100 border rounded-lg text-sm font-bold">اليوم</button></div></div>';
        html += '<div id="posInvoicesList" class="space-y-3"><div class="text-center text-gray-400 py-8">جاري التحميل...</div></div></div>';
        safeHTML(byId('mainContent'), html);
        this.renderPOSInvoicesList();
    },

    renderPOSInvoicesList: function() {
        var self = this;
        var container = byId('posInvoicesList');
        var summaryContainer = byId('posSummary');
        if (!container) return;
        safeHTML(container, '<div class="text-center text-gray-400 py-8">جاري التحميل...</div>');
        var dateFilter = byId('posInvDateFilter') ? byId('posInvDateFilter').value : new Date().toISOString().split('T')[0];
        supabase.from('orders').select('*').eq('created_by', this.currentUser.email).eq('order_date', dateFilter).order('order_date', { ascending: false }).then(function(res) {
            var invoices = res.data || [];
            if (!invoices.length) { safeHTML(container, '<div class="text-center text-gray-400 py-8 bg-white rounded-2xl">لا توجد فواتير لهذا اليوم</div>'); if (summaryContainer) safeHTML(summaryContainer, ''); return; }
            var totalAmount = 0, countCash = 0, countCredit = 0;
            for (var i = 0; i < invoices.length; i++) { totalAmount += Number(invoices[i].total_amount) || 0; if (invoices[i].payment_type === 'نقدي') countCash++; else countCredit++; }
            if (summaryContainer) { safeHTML(summaryContainer, '<div class="bg-white p-3 rounded-2xl shadow-sm border text-center"><span class="text-xs text-gray-400">عدد الفواتير</span><div class="text-2xl font-black text-blue-600">' + invoices.length + '</div></div><div class="bg-white p-3 rounded-2xl shadow-sm border text-center"><span class="text-xs text-gray-400">إجمالي اليوم</span><div class="text-2xl font-black text-emerald-600">' + fmtNum(totalAmount) + '</div></div><div class="bg-white p-3 rounded-2xl shadow-sm border text-center"><span class="text-xs text-gray-400">نقدي</span><div class="text-xl font-black text-green-600">' + countCash + '</div></div><div class="bg-white p-3 rounded-2xl shadow-sm border text-center"><span class="text-xs text-gray-400">آجل</span><div class="text-xl font-black text-orange-600">' + countCredit + '</div></div>'); }
            var html = '';
            for (var j = 0; j < invoices.length; j++) { var inv = invoices[j]; html += '<div onclick="App.showOrderDetail(\'' + inv.id + '\')" class="bg-white p-4 rounded-2xl shadow-sm border cursor-pointer hover:bg-blue-50 transition"><div class="flex justify-between items-start"><div><span class="font-black text-blue-600 text-sm">' + (inv.order_code || '') + '</span><span class="text-xs text-gray-400 mr-2">' + (inv.order_date || '') + '</span></div><span class="font-black text-emerald-600">' + fmtNum(inv.total_amount) + ' EGP</span></div><div class="flex justify-between items-center mt-1"><span class="text-sm font-bold">' + (inv.customer_name || '') + '</span><span class="text-xs px-2 py-0.5 rounded-full ' + (inv.payment_type === 'نقدي' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700') + '">' + (inv.payment_type || '') + '</span></div></div>'; }
            safeHTML(container, html);
        }).catch(function(e) { console.error('Failed to load POS invoices:', e); safeHTML(container, '<div class="text-center text-red-400 py-8 bg-white rounded-2xl">فشل تحميل الفواتير</div>'); });
    },

    // ==================== فان سيلز (قيد التطوير) ====================
    renderVanStockView: function() { safeHTML(byId('mainContent'), '<div class="p-4 animate-fadeIn"><h2 class="text-xl font-bold mb-4">العهدة</h2><div class="text-center text-gray-400 p-4">قيد التطوير</div></div>'); },
    renderVanInventoryView: function() { safeHTML(byId('mainContent'), '<div class="p-4 animate-fadeIn"><h2 class="text-xl font-bold mb-4">الجرد اليومي</h2><div class="text-center text-gray-400 p-4">قيد التطوير</div></div>'); },

    // ==================== الخريطة ====================
    showMap: function() {
        var self = this;
        db.customers.toArray().then(function(list) {
            if (!list.length) { toast('لا يوجد عملاء', 'info'); return; }
            var base = 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(list[0].name || '');
            window.open(base, '_blank');
        });
    },

    // ==================== باركود ====================
    startBarcodeScanner: function() {
        var self = this;
        byId('barcodeScanner').classList.add('active');
        if ('BarcodeDetector' in window) {
            var detector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'code_128', 'code_39', 'qr_code'] });
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(function(stream) {
                var video = byId('scannerVideo'); video.srcObject = stream; video.play();
                self.scannerStream = stream; self.scannerActive = true;
                function scanLoop() { if (!self.scannerActive) return; detector.detect(video).then(function(barcodes) { if (barcodes.length > 0) { var code = barcodes[0].rawValue, now = Date.now(); if (code !== self.lastScanned || (now - self.lastScanTime) > 2000) { self.lastScanned = code; self.lastScanTime = now; self.handleBarcode(code); } } requestAnimationFrame(scanLoop); }).catch(function() { requestAnimationFrame(scanLoop); }); }
                requestAnimationFrame(scanLoop);
            }).catch(function() { toast('تعذر الوصول للكاميرا', 'error'); self.stopBarcodeScanner(); });
        } else { toast('المتصفح لا يدعم الماسح', 'warning'); self.stopBarcodeScanner(); }
    },

    stopBarcodeScanner: function() { this.scannerActive = false; if (this.scannerStream) { var tracks = this.scannerStream.getTracks(); for (var i = 0; i < tracks.length; i++) tracks[i].stop(); this.scannerStream = null; } byId('barcodeScanner').classList.remove('active'); },

    handleBarcode: function(code) {
        var self = this;
        db.items.filter(function(i) { return i.barcode === code || i.item_code === code; }).first().then(function(item) { if (item) { self.addToCart(item.item_code); toast('تم: ' + (item.name || code), 'success'); } else { toast('صنف غير معروف: ' + code, 'warning'); } });
    }
};

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(function() {}); }
document.addEventListener('DOMContentLoaded', function() { App.init(); });
</script>
